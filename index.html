<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#b00000"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="然仔66660">
  <title>然仔66660 M1 / M1.1</title>
  <style>
    :root{
      --bg:#0b0b0f;
      --card:#11111a;
      --line:rgba(255,255,255,.10);
      --text:#f5f5f7;
      --muted:rgba(255,255,255,.50);
      --red:#ff2d2d;
    }
    *{box-sizing:border-box;margin:0;padding:0;}

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(800px 400px at 50% 15%,rgba(255,45,45,.20),transparent 60%),
        radial-gradient(900px 500px at 50% 110%,rgba(176,0,0,.25),transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
      padding:12px;
    }

    .app{width:min(430px,100%);}

    .title{
      font-size:16px;
      font-weight:900;
      margin:0 0 12px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .title::before{
      content:"";
      flex-shrink:0;
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--red);
      box-shadow:0 0 12px rgba(255,45,45,.9);
    }
    .version{
      font-size:10px;
      color:rgba(255,45,45,.6);
      margin-left:4px;
      font-weight:400;
    }

    .panel{
      background:linear-gradient(160deg,rgba(255,45,45,.07),transparent 55%),var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      box-shadow:0 20px 60px rgba(0,0,0,.55);
    }

    input{
      width:100%;
      padding:12px 14px;
      font-size:22px;
      letter-spacing:5px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.40);
      color:var(--text);
      outline:none;
      text-align:center;
      font-weight:700;
    }
    input:focus{
      border-color:rgba(255,45,45,.65);
      box-shadow:0 0 0 3px rgba(255,45,45,.12);
    }
    input::placeholder{
      font-size:13px;
      letter-spacing:1px;
      font-weight:400;
    }

    .btn-wrap{
      display:flex;
      justify-content:center;
      margin:14px 0 8px;
    }
    .btn-circle{
      width:66px;
      height:66px;
      border-radius:50%;
      border:2px solid rgba(255,45,45,.55);
      background:radial-gradient(circle at 38% 32%,rgba(255,90,90,.95),rgba(155,0,0,.95));
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:1px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 18px rgba(255,45,45,.40),inset 0 1px 0 rgba(255,255,255,.18);
      transition:transform .1s,box-shadow .1s;
    }
    .btn-circle:active{transform:scale(.92);}

    .msg{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      min-height:14px;
      margin-bottom:8px;
    }

    .result{
      display:none;
      margin-top:4px;
    }
    .result-hdr{
      text-align:center;
      font-size:10px;
      color:var(--muted);
      margin-bottom:8px;
      letter-spacing:.3px;
    }
    .hit-list{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .hit{
      display:grid;
      grid-template-columns:auto 52px 1fr auto;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(0,0,0,.22);
    }
    .hit.r1{border-color:rgba(80,255,140,.45);background:rgba(80,255,140,.08);}
    .hit.r2{border-color:rgba(255,45,45,.50);background:rgba(255,45,45,.10);}
    .hit.r3{border-color:rgba(255,140,0,.38);background:rgba(255,140,0,.08);}
    .hit.r4{border-color:rgba(255,255,255,.10);background:rgba(255,255,255,.03);}
    .hit.r5{border-color:rgba(120,180,255,.40);background:rgba(80,120,255,.08);}

    .hit-lbl{
      font-size:9px;
      font-weight:900;
      padding:2px 6px;
      border-radius:999px;
      background:rgba(255,45,45,.20);
      color:#ff8080;
      white-space:nowrap;
      letter-spacing:.2px;
    }
    .hit.r1 .hit-lbl{
      background:rgba(80,255,140,.20);
      color:rgba(120,255,170,.95);
    }
    .hit.r2 .hit-lbl{
      background:rgba(255,45,45,.38);
      color:#ff9090;
    }
    .hit.r3 .hit-lbl{
      background:rgba(255,140,0,.26);
      color:#ffbd6b;
    }
    .hit.r5 .hit-lbl{
      background:rgba(120,180,255,.20);
      color:rgba(160,200,255,.95);
    }

    .hit-seat{
      font-size:21px;
      font-weight:1000;
      color:var(--red);
      text-shadow:0 0 12px rgba(255,45,45,.35);
      line-height:1.05;
      text-align:center;
      white-space:nowrap;
    }

    .hit.r1 .hit-seat{
      color:rgba(80,255,140,.95);
      text-shadow:0 0 12px rgba(80,255,140,.25);
    }
    .hit.r3 .hit-seat{
      color:#ff9f1c;
      text-shadow:0 0 12px rgba(255,159,28,.25);
    }
    .hit.r5 .hit-seat{
      color:rgba(160,200,255,.95);
      text-shadow:0 0 12px rgba(120,180,255,.25);
    }

    .hit-body{
      line-height:1.4;
      min-width:0;
    }
    .hit-body .row1{
      font-size:11px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hit-body .row2{
      font-size:10px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hit-body .row3{
      font-size:9px;
      color:rgba(255,255,255,.30);
      margin-top:1px;
      line-height:1.25;
    }

    .hit-right{
      text-align:right;
      min-width:42px;
    }
    .hit-wr{
      font-size:11px;
      font-weight:900;
      color:rgba(80,255,140,.85);
    }
    .hit-avg{
      font-size:9px;
      color:rgba(255,255,255,.35);
      margin-top:1px;
    }

    .skip{
      display:none;
      text-align:center;
      padding:18px;
      font-size:30px;
      font-weight:1000;
      color:rgba(255,255,255,.18);
      letter-spacing:4px;
    }

    .history{
      margin-top:12px;
      padding:10px 11px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
    }
    .histHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:7px;
    }
    .histTitle{
      font-size:11px;
      font-weight:800;
      color:var(--muted);
    }
    .clearBtn{
      font-size:10px;
      padding:4px 8px;
      border-radius:7px;
      cursor:pointer;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      color:rgba(255,100,100,.85);
    }
    .histList{
      display:flex;
      flex-direction:column;
      gap:5px;
      max-height:180px;
      overflow:auto;
    }
    .histItem{
      border:1px solid rgba(255,255,255,.05);
      border-radius:9px;
      padding:7px 9px;
      background:rgba(0,0,0,.14);
    }
    .histTop{
      display:flex;
      justify-content:space-between;
      font-size:10px;
      color:rgba(255,255,255,.35);
      margin-bottom:2px;
    }
    .histMain{
      font-size:11px;
      color:rgba(255,255,255,.60);
      line-height:1.35;
    }
    .pill{
      display:inline-block;
      padding:1px 6px;
      border-radius:999px;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      font-weight:800;
      color:var(--red);
      margin-right:3px;
    }

    .tiny{
      margin-top:12px;
      padding-top:10px;
      border-top:1px solid var(--line);
      font-size:10px;
      color:rgba(255,255,255,.28);
      line-height:1.6;
      white-space:pre-line;
    }

    @media (max-width: 430px){
      body{padding:10px;}
      .app{width:100%;}
      .panel{padding:10px;border-radius:15px;}
      .hit{
        grid-template-columns:auto 46px 1fr auto;
        gap:6px;
        padding:7px 8px;
      }
      .hit-seat{font-size:19px;}
      .result-hdr{font-size:10px;}
      .histMain{font-size:10px;}
      .tiny{font-size:9px;}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="title">然仔66660<span class="version">M1 / M1.1 双模型</span></div>
  <div class="panel">

    <input id="room" inputmode="numeric" placeholder="输入5位房号" maxlength="5"/>

    <div class="btn-wrap">
      <button class="btn-circle" id="go">开干</button>
    </div>

    <div class="msg" id="msg"></div>

    <div class="result" id="result">
      <div class="result-hdr" id="resultHdr">— 然仔66660 M1 / M1.1结果 —</div>
      <div class="hit-list" id="hitList"></div>
    </div>
    <div class="skip" id="skip">跳</div>

    <div class="history">
      <div class="histHead">
        <span class="histTitle">最近记录</span>
        <button class="clearBtn" id="clearBtn">清空</button>
      </div>
      <div class="histList" id="histList"></div>
    </div>

    <div class="tiny">
【模型1：M1】
S1.1原规则 + 6号S动能补位
回测：94局｜输出40局｜命中26局｜净分+21240｜≤-400大输命中0

【模型2：M1.1】
S1.1原规则 + 6号S动能补位 + 2号极窄保护位
回测：94局｜输出41局｜命中27局｜净分+22820｜≤-400大输命中0

M1.1的2号保护只在3/4/5/6和6号补位都未命中后才检查。
2号保护属于极窄结构，不重注。

亏损 ≤ -400 按大输统计。
    </div>

  </div>
</div>

<script>
const HISTORY_KEY = 'ranzai_66660_m1_m11';
const HISTORY_LIMIT = 30;

const roomEl     = document.getElementById('room');
const goEl       = document.getElementById('go');
const msgEl      = document.getElementById('msg');
const resultEl   = document.getElementById('result');
const resultHdr  = document.getElementById('resultHdr');
const hitListEl  = document.getElementById('hitList');
const skipEl     = document.getElementById('skip');
const histListEl = document.getElementById('histList');
const clearBtnEl = document.getElementById('clearBtn');

function getDigits(room){
  return room.split('').map(Number);
}

function rankDesc(x, digits){
  return digits.filter(n => n > x).length + 1;
}

function uniqueMax(value, arr){
  const max = Math.max(...arr);
  return value === max && arr.filter(n => n === max).length === 1;
}

function getBaseData(room5){
  const [A,B,C,D,E] = getDigits(room5);
  const digits = [A,B,C,D,E];

  const S1 = A+B;
  const S2 = B+C;
  const S3 = C+D;
  const S4 = D+E;

  const T1 = S2-S1;
  const T2 = S3-S2;
  const T3 = S4-S3;

  const FrontPower = S1+S2;
  const BackPower = S3+S4;
  const PowerDiff = BackPower-FrontPower;

  const MidPower = S2+S3;
  const TailPower = S3+S4;
  const TailLift = S4-S3;
  const HeadTailDiff = S4-S1;

  const SArr = [S1,S2,S3,S4];
  const SMax = Math.max(...SArr);
  const SMin = Math.min(...SArr);
  const SMaxPos = "S" + (SArr.indexOf(SMax)+1);
  const SMinPos = "S" + (SArr.indexOf(SMin)+1);

  const rankA = rankDesc(A,digits);
  const rankB = rankDesc(B,digits);
  const rankC = rankDesc(C,digits);
  const rankD = rankDesc(D,digits);
  const rankE = rankDesc(E,digits);

  return {
    A,B,C,D,E,digits,
    S1,S2,S3,S4,
    T1,T2,T3,
    FrontPower,BackPower,PowerDiff,
    MidPower,TailPower,TailLift,HeadTailDiff,
    SMax,SMin,SMaxPos,SMinPos,
    rankA,rankB,rankC,rankD,rankE
  };
}

function evaluateBaseS11(room5){
  const d = getBaseData(room5);
  const {A,B,C,D,E,S1,S2,S3,S4} = d;
  const candidates = [];

  function add(seat, score, source, reason, risk){
    candidates.push({seat, score, source, reason, risk});
  }

  // 3号
  if(S2 >= 13 && S3 >= 11){
    add(3, 90, "S1.1", "3号：S2>=13 且 S3>=11，中轴和值强", "正常试跑");
  }
  if(S1 >= 15 && S2 >= 12 && S4 >= 12){
    add(3, 88, "S1.1", "3号：S1>=15 且 S2>=12 且 S4>=12，首前高+尾承接", "正常试跑");
  }

  // 6号
  if(S4 >= 13 && S3 >= 7){
    add(6, 85, "S1.1", "6号：S4>=13 且 S3>=7，尾轴和值强", "正常试跑");
  }
  if(S1 >= 15 && S3 === 9 && S4 === 9){
    add(6, 82, "S1.1", "6号：S1>=15 且 S3=9 且 S4=9，首端强+尾端平衡", "正常试跑");
  }
  if(S1 <= 6 && S2 <= 3 && E > D){
    add(6, 82, "S1.1", "6号：S1<=6 且 S2<=3 且 E>D，低启修正版", "已过滤20030型风险");
  }

  // 5号
  if(S3 === 5 && S4 === 4){
    add(5, 80, "S1.1", "5号：S3=5 且 S4=4，尾位落点黄金组合", "5号窄进");
  }
  if(S3 === 9 && S4 === 10){
    add(5, 80, "S1.1", "5号：S3=9 且 S4=10，尾轴承接黄金组合", "5号窄进");
  }
  if(S3 === 6 && S4 === 9){
    add(5, 80, "S1.1", "5号：S3=6 且 S4=9，尾位爆发组合", "5号窄进");
  }

  // 4号
  if(S3 === 12 && (S4 === 5 || S4 === 6)){
    add(4, 70, "S1.1", "4号：S3=12 且 S4=5/6，后中轴精准组合", "4号精确组合");
  }
  if(S3 === 5 && S4 === 11){
    add(4, 70, "S1.1", "4号：S3=5 且 S4=11，后段反冲组合", "4号精确组合");
  }
  if(S3 === 4 && S4 === 10){
    add(4, 70, "S1.1", "4号：S3=4 且 S4=10，低中轴反冲组合", "4号精确组合");
  }
  if(S2 === 7 && S3 === 10 && S4 === 12){
    add(4, 72, "S1.1", "4号：S2=7 且 S3=10 且 S4=12，特殊和值反冲", "4号特殊结构");
  }

  if(!candidates.length){
    return {ok:false, data:d, candidates:[]};
  }

  const priority = {3:1,6:2,5:3,4:4};

  candidates.sort((a,b)=>{
    if(b.score !== a.score) return b.score-a.score;
    return priority[a.seat]-priority[b.seat];
  });

  return {
    ok:true,
    seat:candidates[0].seat,
    score:candidates[0].score,
    source:candidates[0].source,
    reason:candidates[0].reason,
    risk:candidates[0].risk,
    data:d,
    candidates
  };
}

function evaluateM1(room5, includeTwoProtect=false){
  const baseResult = evaluateBaseS11(room5);
  const d = baseResult.data;

  if(baseResult.ok){
    return {
      ok:true,
      model: includeTwoProtect ? "M1.1" : "M1",
      seat:baseResult.seat,
      score:baseResult.score,
      source:baseResult.source,
      label: includeTwoProtect ? "M1.1主推" : "M1主推",
      reason:baseResult.reason,
      risk:baseResult.risk,
      stage:"S1.1原规则",
      data:d
    };
  }

  const {A,B,C,D,E,S1,S2,S3,S4,rankB,rankE} = d;
  const sArr = [S1,S2,S3,S4];

  // M1：6号S动能补位
  if(uniqueMax(S4, sArr) && rankE <= 2 && S4 >= 10){
    return {
      ok:true,
      model: includeTwoProtect ? "M1.1" : "M1",
      seat:6,
      score:76,
      source:"M1补位",
      label: includeTwoProtect ? "M1.1补位" : "M1补位",
      reason:"6号：S4唯一最大 且 E排名第1/第2 且 S4>=10，尾段动能补位",
      risk:"补位结构，正常小注，不重注",
      stage:"6号M1动能补位",
      data:d
    };
  }

  // M1.1：2号极窄保护
  if(includeTwoProtect){
    if(
      uniqueMax(S2, sArr) &&
      rankB === 2 &&
      B >= 5 &&
      C === B + 1 &&
      A === E &&
      A <= 2 &&
      S4 <= 4
    ){
      return {
        ok:true,
        model:"M1.1",
        seat:2,
        score:68,
        source:"2号保护",
        label:"2号保护",
        reason:"2号极窄保护：S2唯一最大、B排名第2、B>=5、C=B+1、A=E<=2、S4<=4",
        risk:"极窄保护位，样本少，只能正常小注，不重注",
        stage:"2号极窄保护",
        data:d
      };
    }
  }

  return {
    ok:false,
    model: includeTwoProtect ? "M1.1" : "M1",
    seat:null,
    score:null,
    source:"跳",
    label: includeTwoProtect ? "M1.1跳" : "M1跳",
    reason: includeTwoProtect ? "M1.1未命中S1.1、6号补位、2号保护" : "M1未命中S1.1和6号补位",
    risk:"无命中，直接跳",
    stage:"跳",
    data:d
  };
}

function getRelation(m1,m11){
  if(m1.ok && m11.ok && m1.seat === m11.seat){
    return {
      title:`同向｜${m1.seat}号`,
      text:"M1与M1.1同向，说明2号保护未改变主判断；按M1主逻辑执行。",
      cls:"r5"
    };
  }

  if(!m1.ok && m11.ok && m11.seat === 2){
    return {
      title:"M1.1独有｜2号保护",
      text:"M1跳，M1.1触发2号极窄保护；样本少，不重注。",
      cls:"r3"
    };
  }

  if(m1.ok && !m11.ok){
    return {
      title:`M1命中｜${m1.seat}号`,
      text:"M1命中，M1.1异常未命中；按M1谨慎处理。",
      cls:"r2"
    };
  }

  return {
    title:"双模型均跳",
    text:"M1与M1.1均未命中，直接跳。",
    cls:"r4"
  };
}

function buildRelationCard(relation){
  const div = document.createElement('div');
  div.className = `hit ${relation.cls}`;
  div.innerHTML = `
    <div class="hit-lbl">总判断</div>
    <div class="hit-seat">${relation.title.includes('跳') ? '跳' : '看'}</div>
    <div class="hit-body">
      <div class="row1">${relation.title}</div>
      <div class="row2">${relation.text}</div>
      <div class="row3">规则：M1是基础主模型；M1.1额外加入2号极窄保护。</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">总</div>
      <div class="hit-avg">判断</div>
    </div>
  `;
  return div;
}

function buildModelCard(result, room5, rankClass){
  const div = document.createElement('div');
  div.className = `hit ${result.ok ? rankClass : 'r4'}`;
  const d = result.data;
  const seatText = result.ok ? `${result.seat}` : '跳';
  const wrText = result.ok ? `${result.score}分` : '—';
  const avgText = result.ok ? result.stage : '跳';

  div.innerHTML = `
    <div class="hit-lbl">${result.label}</div>
    <div class="hit-seat">${seatText}</div>
    <div class="hit-body">
      <div class="row1">${result.model}｜房号=${room5}　A${d.A} B${d.B} C${d.C} D${d.D} E${d.E}</div>
      <div class="row2">S1=${d.S1} S2=${d.S2} S3=${d.S3} S4=${d.S4}｜E排名=${d.rankE} B排名=${d.rankB}</div>
      <div class="row3">${result.reason}｜${result.risk}</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">${wrText}</div>
      <div class="hit-avg">${avgText}</div>
    </div>
  `;
  return div;
}

function render(room5){
  const m1 = evaluateM1(room5, false);
  const m11 = evaluateM1(room5, true);
  const relation = getRelation(m1,m11);

  resultEl.style.display = 'none';
  skipEl.style.display   = 'none';
  hitListEl.innerHTML    = '';

  resultHdr.textContent = `然仔66660｜M1=${m1.ok ? m1.seat + '号' : '跳'}｜M1.1=${m11.ok ? m11.seat + '号' : '跳'}`;

  hitListEl.appendChild(buildRelationCard(relation));
  hitListEl.appendChild(buildModelCard(m1, room5, 'r1'));
  hitListEl.appendChild(buildModelCard(m11, room5, 'r5'));

  resultEl.style.display = 'block';

  if(!m1.ok && !m11.ok){
    skipEl.style.display = 'block';
  }

  return {m1,m11,relation};
}

function run(){
  const raw = roomEl.value.trim().replace(/\s+/g, '');
  if(!/^\d{5}$/.test(raw)){
    msgEl.textContent = '请输入正确的5位数字';
    return;
  }
  msgEl.textContent = '';
  const results = render(raw);
  pushHistory(raw, results);
  setTimeout(() => { roomEl.value = ''; roomEl.focus(); }, 180);
}

function loadHist(){
  try{
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  }catch{
    return [];
  }
}

function saveHist(items){
  localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, HISTORY_LIMIT)));
}

function renderHist(){
  const items = loadHist();
  histListEl.innerHTML = '';
  if(!items.length){
    histListEl.innerHTML = `<div class="histItem"><div class="histMain" style="color:rgba(255,255,255,.2)">暂无记录</div></div>`;
    return;
  }
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'histItem';

    const m1Res = item.m1 && item.m1.ok ? `${item.m1.seat}号M1` : '跳';
    const m11Res = item.m11 && item.m11.ok ? `${item.m11.seat}号M1.1` : '跳';
    const relation = item.relationTitle || '—';

    div.innerHTML = `
      <div class="histTop"><span>房号 <span class="pill">${item.room}</span></span><span>${item.time}</span></div>
      <div class="histMain">${relation}<br>M1 → ${m1Res}｜M1.1 → ${m11Res}</div>`;
    histListEl.appendChild(div);
  });
}

function pushHistory(room, results){
  const items = loadHist();
  items.unshift({
    room,
    m1: {
      ok: results.m1.ok,
      seat: results.m1.seat,
      stage: results.m1.stage || '跳'
    },
    m11: {
      ok: results.m11.ok,
      seat: results.m11.seat,
      stage: results.m11.stage || '跳'
    },
    relationTitle: results.relation.title,
    time: new Date().toLocaleString('zh-CN', {hour12:false})
  });
  saveHist(items);
  renderHist();
}

goEl.addEventListener('click', run);
roomEl.addEventListener('keydown', e => { if(e.key === 'Enter') run(); });
roomEl.addEventListener('input', e => {
  e.target.value = e.target.value.replace(/\D/g, '').slice(0,5);
});

clearBtnEl.addEventListener('click', () => {
  localStorage.removeItem(HISTORY_KEY);
  renderHist();
});

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

renderHist();
roomEl.focus();
</script>
</body>
</html>
