<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>然仔｜v6终极封版系统</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC";
  background:radial-gradient(circle at 20% 20%, #1b1f3a, #0b0b0f 60%);
  color:#fff;
}

.container{
  max-width:520px;
  margin:0 auto;
  padding:18px;
}

.title{
  font-size:20px;
  font-weight:900;
  margin-bottom:10px;
}

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:14px;
  margin-top:12px;
}

input{
  width:100%;
  padding:14px;
  font-size:18px;
  text-align:center;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
  font-weight:700;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#00d4ff,#7a5cff);
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

.seatBox{
  display:flex;
  gap:10px;
}

.seat{
  width:80px;
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:16px;
  font-size:26px;
  font-weight:900;
}

.main{
  background:#00e5ff;
  color:#000;
}

.sub{
  background:#ffb020;
  color:#000;
}

.info{
  font-size:12px;
  opacity:0.8;
  line-height:1.6;
}
</style>
</head>

<body>
<div class="container">

<div class="title">🔥 然仔｜v6终极封版系统</div>

<input id="room" placeholder="输入5位房号"/>
<button onclick="run()">开始分析</button>

<div id="out"></div>

</div>

<script>

//////////////////////////////////////////////////////
// 🧠 组合检测（只负责识别，不评分）
//////////////////////////////////////////////////////

function detect(r){

  let d = r.split("").map(Number);

  let hits = [];

  for(let i=0;i<5;i++){
    for(let j=i+1;j<5;j++){

      let diff = Math.abs(d[i]-d[j]);
      let sum = d[i]+d[j];

      // 🔥 A2
      if(diff===6 && hasDiff1(d)) hits.push("A2");

      // 🔥 B2（必须重号 + 和9 + 差5）
      if(diff===5 && sum===9 && hasRepeat(d)) hits.push("B2");

      // 🔥 A1
      if(sum===7 && hasDiff2(d)) hits.push("A1");

      // 🔥 N类
      if(diff===1) hits.push("N1");
      if(diff===2) hits.push("N3");
      if(diff===4) hits.push("N4");
      if(diff===5) hits.push("N5");
      if(sum===9) hits.push("N2");

    }
  }

  return [...new Set(hits)];
}

//////////////////////////////////////////////////////
// 🧠 结构函数
//////////////////////////////////////////////////////

function hasRepeat(d){
  return new Set(d).size < 5;
}

function hasDiff1(d){
  for(let i=0;i<5;i++){
    for(let j=i+1;j<5;j++){
      if(Math.abs(d[i]-d[j])===1) return true;
    }
  }
  return false;
}

function hasDiff2(d){
  for(let i=0;i<5;i++){
    for(let j=i+1;j<5;j++){
      if(Math.abs(d[i]-d[j])===2) return true;
    }
  }
  return false;
}

//////////////////////////////////////////////////////
// 🧠 终极锁死决策（唯一组合）
//////////////////////////////////////////////////////

function decide(hits){

  // 🔥 终极优先级（锁死）
  const priority = [
    "B2",
    "A2",
    "A1",
    "N3",
    "N4",
    "N5",
    "N2",
    "N1"
  ];

  let mainCombo = null;

  // ✔ 只允许一个组合生效
  for(let p of priority){
    if(hits.includes(p)){
      mainCombo = p;
      break;
    }
  }

  // 🔥 固定映射（唯一输出）
  const map = {
    B2:{main:5,sub:3},
    A2:{main:2,sub:5},
    A1:{main:3,sub:2},
    N3:{main:2,sub:3},
    N4:{main:2,sub:3},
    N5:{main:2,sub:4},
    N2:{main:2,sub:4},
    N1:{main:1,sub:3}
  };

  return {
    combo: mainCombo,
    res: map[mainCombo] || {main:"无",sub:"无"}
  };
}

//////////////////////////////////////////////////////
// 🧠 主函数
//////////////////////////////////////////////////////

function run(){

  let r = document.getElementById("room").value.trim();
  if(r.length !== 5) return;

  let hits = detect(r);
  let out = decide(hits);

  document.getElementById("out").innerHTML = `

    <div class="card">
      <div class="seatBox">
        <div class="seat main">${out.res.main}</div>
        <div class="seat sub">${out.res.sub}</div>
      </div>
    </div>

    <div class="card info">
      ✔ 命中组合：${hits.join(",") || "无"}<br>
      ✔ 最终组合：${out.combo || "无"}<br>
      ✔ 模型：v6终极封版<br>
      ✔ 特性：单组合锁死 / 无漂移 / 无叠加
    </div>

  `;
}

</script>
</body>
</html>
