<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>然仔｜v9.2完整展示版</title>

<style>
body{
  margin:0;
  background:#f5f6f8;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC";
  color:#111;
}

.container{
  max-width:560px;
  margin:0 auto;
  padding:18px;
  text-align:center;
}

/* 输入 */
input{
  width:75%;
  padding:14px;
  font-size:18px;
  text-align:center;
  border-radius:12px;
  border:1px solid #ddd;
  background:#fff;
}

/* 开干按钮 */
button{
  margin-top:18px;
  width:100px;
  height:100px;
  border-radius:50%;
  border:none;
  background:radial-gradient(circle,#ff4d4d,#b30000);
  color:#fff;
  font-weight:900;
  cursor:pointer;
}

/* 卡片 */
.card{
  margin-top:16px;
  padding:14px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.06);
  text-align:left;
}

/* 组合展示 */
.box{
  font-size:13px;
  line-height:1.6;
  color:#333;
}

/* 历史记录 */
.history{
  margin-top:20px;
  padding:14px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.06);
  text-align:left;
  max-height:220px;
  overflow:auto;
}

.small{
  font-size:12px;
  color:#666;
}

.tag{
  display:inline-block;
  padding:2px 8px;
  font-size:12px;
  border-radius:999px;
  background:#eee;
  margin:2px;
}
</style>
</head>

<body>

<div class="container">

<h3>🔥 然仔｜v9.2完整展示版</h3>

<input id="room" placeholder="输入5位房号"/><br/>
<button onclick="run()">开干</button>

<div id="out"></div>

<!-- 🧠 组合说明区 -->
<div class="card">
  <b>📊 系统组合结构</b><br><br>

  🔥 强组合：
  <div class="box">
    <span class="tag">B2</span>
    <span class="tag">A2</span>
  </div><br>

  ⚡ 中组合：
  <div class="box">
    <span class="tag">A1</span>
    <span class="tag">N2</span>
    <span class="tag">N3</span>
  </div><br>

  ❌ 弱组合（兜底）：
  <div class="box">
    <span class="tag">N1</span>
    <span class="tag">N4</span>
    <span class="tag">N5</span>
  </div>
</div>

<!-- 📜 历史记录 -->
<div class="history">
  <b>📜 历史记录</b>
  <div id="log"></div>
</div>

</div>

<script>

//////////////////////////////////////////////////////
// 🧠 组合检测（v9逻辑）
//////////////////////////////////////////////////////

function detect(r){

  let d = r.split("").map(Number);

  let strong=[], mid=[], weak=[];

  for(let i=0;i<5;i++){
    for(let j=i+1;j<5;j++){

      let diff=Math.abs(d[i]-d[j]);
      let sum=d[i]+d[j];

      if(diff===6) strong.push("A2");
      if(diff===5 && sum===9) strong.push("B2");

      if(sum===7) mid.push("A1");
      if(sum===9) mid.push("N2");
      if(diff===2) mid.push("N3");

      if(diff===1) weak.push("N1");
      if(diff===4) weak.push("N4");
      if(diff===5) weak.push("N5");

    }
  }

  return {
    strong:[...new Set(strong)],
    mid:[...new Set(mid)],
    weak:[...new Set(weak)]
  };
}

//////////////////////////////////////////////////////
// 🧠 决策
//////////////////////////////////////////////////////

function decide(s,m,w){

  if(s.includes("B2")) return "B2";
  if(s.includes("A2")) return "A2";

  if(m.includes("A1")) return "A1";
  if(m.includes("N2")) return "N2";
  if(m.includes("N3")) return "N3";

  return "WEAK";
}

//////////////////////////////////////////////////////
// 🧠 位子系统
//////////////////////////////////////////////////////

function seat(room,combo){

  const hash=parseInt(room)%6;

  const map={
    B2:[5,3],
    A2:[2,5],
    A1:[3,2],
    N2:[2,4],
    N3:[3,1],
    WEAK:[1,0]
  };

  let arr=map[combo]||[0,0];

  return {
    main:arr[hash%arr.length],
    sub:arr[(hash+1)%arr.length]
  };
}

//////////////////////////////////////////////////////
// 🧠 历史记录
//////////////////////////////////////////////////////

function save(item){
  let log=JSON.parse(localStorage.getItem("log")||"[]");
  log.unshift(item);
  localStorage.setItem("log",JSON.stringify(log));
  render();
}

function render(){
  let log=JSON.parse(localStorage.getItem("log")||"[]");

  document.getElementById("log").innerHTML=
    log.map(l=>`
      <div class="small">
        房号：${l.room} ｜ ${l.combo} ｜ 主${l.main} / 副${l.sub}
      </div>
    `).join("");
}

//////////////////////////////////////////////////////
// 🧠 主运行
//////////////////////////////////////////////////////

function run(){

  let r=document.getElementById("room").value.trim();
  if(r.length!==5)return;

  let res=detect(r);
  let combo=decide(res.strong,res.mid,res.weak);
  let s=seat(r,combo);

  document.getElementById("out").innerHTML=`
    <div class="card">
      🔥 主推：<b>${s.main}</b><br>
      ⚡ 副推：<b>${s.sub}</b><br>
      📦 组合：${combo}<br>
    </div>
  `;

  save({
    room:r,
    combo:combo,
    main:s.main,
    sub:s.sub
  });

  document.getElementById("room").value="";
}

render();

</script>

</body>
</html>
