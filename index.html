<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>然仔66660｜X排名邻居黑白模型 v2.0</title>
<style>
  *{box-sizing:border-box;}
  body{
    margin:0;
    padding:14px;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
    background:#101418;
    color:#f5f5f5;
  }
  .wrap{max-width:820px;margin:0 auto;}
  .title{
    font-size:24px;
    font-weight:800;
    margin-bottom:6px;
    color:#fff;
  }
  .sub{
    font-size:13px;
    color:#b8c0cc;
    line-height:1.6;
    margin-bottom:14px;
  }
  .card{
    background:#1b222b;
    border:1px solid #2e3a46;
    border-radius:16px;
    padding:14px;
    margin-bottom:14px;
    box-shadow:0 8px 22px rgba(0,0,0,.28);
  }
  .section-title{
    font-size:17px;
    font-weight:800;
    margin-bottom:10px;
    color:#fff;
  }
  .note{
    background:#121820;
    border:1px solid #2a3541;
    border-radius:12px;
    padding:12px;
    font-size:13px;
    line-height:1.7;
    color:#d7dde6;
  }
  .input-row{
    display:flex;
    gap:10px;
  }
  input{
    flex:1;
    height:48px;
    border-radius:12px;
    border:1px solid #3a4655;
    background:#0f141a;
    color:#fff;
    font-size:22px;
    padding:0 14px;
    letter-spacing:2px;
    outline:none;
  }
  input:focus{border-color:#facc15;}
  button{
    height:48px;
    border:none;
    border-radius:12px;
    padding:0 18px;
    font-size:15px;
    font-weight:800;
    color:#101418;
    background:#facc15;
    cursor:pointer;
  }
  button.secondary{
    background:#334155;
    color:#fff;
  }
  button.danger{
    background:#ef4444;
    color:#fff;
  }
  .result-box{
    display:none;
    margin-top:14px;
    border-radius:16px;
    padding:14px;
    border:2px solid #334155;
  }
  .result-box.show{display:block;}
  .result-go{
    background:linear-gradient(135deg,#064e3b,#022c22);
    border-color:#10b981;
  }
  .result-watch{
    background:linear-gradient(135deg,#78350f,#451a03);
    border-color:#f59e0b;
  }
  .result-risk{
    background:linear-gradient(135deg,#7c2d12,#431407);
    border-color:#fb923c;
  }
  .result-skip{
    background:linear-gradient(135deg,#374151,#111827);
    border-color:#6b7280;
  }
  .result-invalid{
    background:linear-gradient(135deg,#7f1d1d,#450a0a);
    border-color:#ef4444;
  }
  .big{
    font-size:28px;
    font-weight:900;
    margin-bottom:8px;
  }
  .line{
    font-size:14px;
    line-height:1.75;
    color:#f1f5f9;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:8px;
    margin-top:12px;
  }
  .mini{
    background:rgba(15,23,42,.45);
    border:1px solid rgba(148,163,184,.25);
    border-radius:10px;
    padding:8px 4px;
    text-align:center;
    font-size:12px;
    color:#cbd5e1;
  }
  .mini b{
    display:block;
    color:#fff;
    font-size:17px;
    margin-top:3px;
  }
  .history{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .history-item{
    background:#111827;
    border:1px solid #2f3b4a;
    border-radius:12px;
    padding:10px;
    font-size:13px;
    line-height:1.65;
  }
  .history-top{
    display:flex;
    justify-content:space-between;
    gap:10px;
    font-weight:800;
    color:#fff;
    margin-bottom:4px;
  }
  .tag{
    display:inline-block;
    padding:2px 8px;
    border-radius:999px;
    font-size:12px;
    font-weight:800;
    background:#facc15;
    color:#111827;
  }
  .muted{color:#94a3b8;}
  .btn-row{
    display:flex;
    gap:8px;
    margin-top:10px;
    flex-wrap:wrap;
  }
  @media(max-width:560px){
    body{padding:10px;}
    .input-row{flex-direction:column;}
    button{width:100%;}
    .grid{grid-template-columns:repeat(2,1fr);}
    .big{font-size:25px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="title">然仔66660｜X排名邻居黑白模型 v2.0</div>
  <div class="sub">
    旧UI版｜只替换模型逻辑｜先排雷，再进房｜只输出一个主推位｜无主推直接跳
  </div>

  <div class="card">
    <div class="section-title">输入房号</div>
    <div class="input-row">
      <input id="roomInput" maxlength="5" inputmode="numeric" placeholder="请输入5位房号">
      <button onclick="runEvaluate()">开始则房</button>
    </div>

    <div id="resultBox" class="result-box"></div>
  </div>

  <div class="card">
    <div class="section-title">模型说明</div>
    <div class="note">
      <b>当前模型：</b>然仔66660 X排名邻居黑白模型 v2.0 试跑版<br>
      <b>核心逻辑：</b>先排雷，再进房；综合X排名、邻居承接、黑白结构评分。<br>
      <b>输出规则：</b>只输出一个主推位；无主推直接跳；不输出备选。<br>
      <b>大输口径：</b>亏损 ≤ -400 算大输。<br>
      <b>回测：</b>92局，输出52局，进房率56.5%，命中25局，命中后胜率88.0%，命中净分+19830，≤-400大输命中0。
    </div>
  </div>

  <div class="card">
    <div class="section-title">历史记录</div>
    <div class="btn-row">
      <button class="secondary" onclick="copyHistory()">复制历史</button>
      <button class="danger" onclick="clearHistory()">清空历史</button>
    </div>
    <div id="historyList" class="history" style="margin-top:12px;"></div>
  </div>

</div>

<script>
function evaluateRanZai66660(room){
  room=String(room).trim();

  if(!/^\d{5}$/.test(room)){
    return {
      status:"无效",
      seat:null,
      title:"房号格式错误",
      message:"请输入5位数字房号",
      reason:"房号必须是五位数字",
      risk:"无"
    };
  }

  const A=Number(room[0]);
  const B=Number(room[1]);
  const C=Number(room[2]);
  const D=Number(room[3]);
  const E=Number(room[4]);

  const RoomSum=A+B+C+D+E;

  const D1=A-B;
  const D2=B-C;
  const D3=C-D;
  const D4=D-E;
  const D5=E-A;

  const digits=[A,B,C,D,E];

  function digitRoot(sum){
    const r=sum%9;
    return r===0?9:r;
  }

  const root=digitRoot(RoomSum);

  function rankDesc(x){
    return digits.filter(n=>n>x).length+1;
  }

  function between(x,left,right){
    return (left>=x&&x>=right)||(left<=x&&x<=right);
  }

  const candidates=[];

  function addCandidate(seat,score,level,reason,risk){
    candidates.push({seat,score,level,reason,risk});
  }

  // =========================
  // 3号：X=C，邻居B/D
  // =========================
  const X3=C;
  const rank3=rankDesc(X3);
  const K3=RoomSum-X3;

  let black3Reason="";

  if(D4<=-8){
    black3Reason="3号黑结构：D4<=-8，尾端E强压D，3号容易被尾端抽走";
  }else if(B>C&&D>C){
    black3Reason="3号黑结构：邻居双压，B和D都压住C";
  }else if(D3>0&&D4>0){
    black3Reason="3号黑结构：D3/D4双正，历史3号大输风险高";
  }else if(D3<0&&D4>0){
    black3Reason="3号黑结构：D3负D4正，C被D压，3号承接弱";
  }

  if(!black3Reason){
    if(D3===0&&D4>0){
      addCandidate(3,7,"强结构","3号白结构：D3=0且D4>0，中轴反冲","正常试跑");
    }

    if(D3>=4&&D4>=-6&&D4<0){
      addCandidate(3,7,"强结构","3号白结构：D3>=4且-6<=D4<0，C强压D但尾端负不过深","正常试跑");
    }

    if(rank3===4&&D1>=0&&D3>0&&D4<0){
      addCandidate(3,8,"强结构","3号白结构：rank4低位承接爆发，D1>=0且D3>0且D4<0","正常试跑");
    }
  }

  // =========================
  // 4号：X=D，邻居C/E
  // =========================
  const X4=D;
  const rank4=rankDesc(X4);
  const K4=RoomSum-X4;

  let black4Reason="";

  if(rank4===1){
    black4Reason="4号黑结构：X排名第1，D过高，历史4号大输风险高";
  }else if(D3<0&&D4>0){
    black4Reason="4号黑结构：D3负D4正，4号承接断层";
  }else if(C<D&&E<D){
    black4Reason="4号黑结构：邻居双低，D孤高无承接";
  }else if(D3===0&&D4<0){
    black4Reason="4号黑结构：D3=0且D4<0，尾端压走4号";
  }

  if(!black4Reason){
    if(rank4===2&&D3>0&&D4>0){
      addCandidate(4,6,"强结构","4号白结构：rank2且D3/D4双正","正常试跑");
    }

    if(rank4===4&&between(D,C,E)&&D3<0&&D4<0){
      addCandidate(4,8,"强结构","4号白结构：rank4中承接双负，D在C/E之间承接","正常试跑");
    }

    if(D1>=3&&D2<=-4&&D3>0&&D4<0&&D5>0){
      addCandidate(4,8,"高波结构","4号特殊反冲：D1>=3、D2<=-4、D3>0、D4<0、D5>0","高波结构，小注观察；若实战亏≤-300需暂停复盘");
    }
  }

  // =========================
  // 5号：X=E，邻居D/A
  // =========================
  const X5=E;
  const rank5=rankDesc(X5);
  const K5=RoomSum-X5;

  let black5Reason="";

  if(D5===0){
    black5Reason="5号黑结构：D5=0，首尾闭死，5号历史大输风险高";
  }else if([1,2,5,9].includes(X5)){
    black5Reason="5号黑结构：X∈{1,2,5,9}，5号不稳定";
  }

  if(!black5Reason){
    if(X5===4&&rank5===3&&K5===15&&root===1){
      addCandidate(5,9,"强结构","5号白结构：X=4、rank3、K=15、数根=1","正常试跑");
    }

    if(X5===8&&rank5===1&&D3===5&&D4===-6){
      addCandidate(5,9,"强结构","5号白结构：X=8、rank1、D3=5、D4=-6，高位尾冲","正常试跑");
    }
  }

  // =========================
  // 6号：X=E，邻居D/A
  // =========================
  const X6=E;
  const rank6=rankDesc(X6);
  const K6=RoomSum-X6;

  let black6Reason="";

  if(D4>=5){
    black6Reason="6号黑结构：D4>=5，D强压E，尾端承接弱";
  }else if(D1<=-6){
    black6Reason="6号黑结构：D1<=-6，前端A被B强压，尾端不稳";
  }else if(D5<=-5){
    black6Reason="6号黑结构：D5<=-5，E明显弱于A，首尾闭环差";
  }else if(rank6===2&&D3>0&&D4<0){
    black6Reason="6号黑结构：rank2伪强，D3>0且D4<0，容易被中轴抢走";
  }else if(D3>0&&D4<=-4&&D5<=0){
    black6Reason="6号黑结构：D3>0且D4<=-4且D5<=0，尾端强负但闭环不足";
  }

  if(!black6Reason){
    if(D4===0&&D3<=0){
      addCandidate(6,7,"强结构","6号白结构：D4=0且D3<=0，尾部归零承接","正常试跑");
    }

    if(D3===0&&D4<0){
      addCandidate(6,7,"强结构","6号白结构：D3=0且D4<0，D3归零后尾反压","正常试跑");
    }

    if(rank6===1&&(D3<=0||D4===0||D5>=2)){
      addCandidate(6,6,"强结构","6号白结构：rank1尾强承接","谨慎正常试跑；若实战亏≤-300需暂停复盘");
    }

    if(rank6===3&&between(E,D,A)&&D4>=-3&&D4<=-1){
      addCandidate(6,5,"观察","6号白结构：rank3中承接轻负，E在D/A之间承接","观察结构，小注");
    }

    if(X6===7&&rank6===2&&D3===0&&D4<0){
      addCandidate(6,7,"强结构","6号白结构：X=7、rank2、D3=0、D4<0","正常试跑");
    }

    if(D5>=6&&D4<=-4&&D1<0){
      addCandidate(6,6,"观察","6号强尾观察：D5>=6、D4<=-4、D1<0","观察结构，小注");
    }
  }

  // =========================
  // 最终选择：同分 5 > 3 > 4 > 6
  // =========================
  if(candidates.length===0){
    const blackReasons=[];
    if(black3Reason)blackReasons.push(black3Reason);
    if(black4Reason)blackReasons.push(black4Reason);
    if(black5Reason)blackReasons.push(black5Reason);
    if(black6Reason)blackReasons.push(black6Reason);

    return {
      status:"跳",
      seat:null,
      title:"跳",
      message:"无有效主推位，建议跳过",
      reason:blackReasons.length?blackReasons.join("；"):"没有命中任何白结构",
      risk:"无主推直接跳",
      data:{A,B,C,D,E,RoomSum,D1,D2,D3,D4,D5,root,ranks:{seat3:rank3,seat4:rank4,seat5:rank5,seat6:rank6}}
    };
  }

  const priority={5:1,3:2,4:3,6:4};

  candidates.sort((a,b)=>{
    if(b.score!==a.score)return b.score-a.score;
    return priority[a.seat]-priority[b.seat];
  });

  const best=candidates[0];

  let status="主推";
  if(best.level==="观察")status="观察";
  if(best.level==="高波结构")status="高波";

  return {
    status,
    seat:best.seat,
    title:`${best.seat}号位 ${status}`,
    message:`推荐：${best.seat}号位`,
    reason:best.reason,
    risk:best.risk,
    score:best.score,
    level:best.level,
    allCandidates:candidates,
    data:{A,B,C,D,E,RoomSum,D1,D2,D3,D4,D5,root,ranks:{seat3:rank3,seat4:rank4,seat5:rank5,seat6:rank6},K:{seat3:K3,seat4:K4,seat5:K5,seat6:K6}}
  };
}

function runEvaluate(){
  const input=document.getElementById("roomInput");
  const room=input.value.trim();
  const result=evaluateRanZai66660(room);
  renderResult(room,result);

  if(result.status!=="无效"){
    saveHistory(room,result);
  }
}

function renderResult(room,result){
  const box=document.getElementById("resultBox");
  box.className="result-box show";

  if(result.status==="无效"){
    box.classList.add("result-invalid");
  }else if(result.status==="跳"){
    box.classList.add("result-skip");
  }else if(result.status==="观察"){
    box.classList.add("result-watch");
  }else if(result.status==="高波"){
    box.classList.add("result-risk");
  }else{
    box.classList.add("result-go");
  }

  let mainText="";

  if(result.status==="无效"){
    mainText="房号无效";
  }else if(result.status==="跳"){
    mainText="跳";
  }else{
    mainText=`${result.seat}号位 ${result.status}`;
  }

  let dataHtml="";
  if(result.data){
    const d=result.data;
    dataHtml=`
      <div class="grid">
        <div class="mini">A<b>${d.A}</b></div>
        <div class="mini">B<b>${d.B}</b></div>
        <div class="mini">C<b>${d.C}</b></div>
        <div class="mini">D<b>${d.D}</b></div>
        <div class="mini">E<b>${d.E}</b></div>
        <div class="mini">D1<b>${d.D1}</b></div>
        <div class="mini">D2<b>${d.D2}</b></div>
        <div class="mini">D3<b>${d.D3}</b></div>
        <div class="mini">D4<b>${d.D4}</b></div>
        <div class="mini">D5<b>${d.D5}</b></div>
      </div>
    `;
  }

  let candidateHtml="";
  if(result.allCandidates&&result.allCandidates.length>1){
    candidateHtml=`
      <br><b>候选评分：</b><br>
      ${result.allCandidates.map(c=>`${c.seat}号｜${c.level}｜${c.score}分｜${c.reason}`).join("<br>")}
    `;
  }

  box.innerHTML=`
    <div class="big">${mainText}</div>
    <div class="line">
      <span class="tag">房号：${room||"-"}</span><br><br>
      <b>原因：</b>${result.reason||"-"}<br>
      <b>风险：</b>${result.risk||"-"}<br>
      ${result.score!==undefined?`<b>评分：</b>${result.score}分<br>`:""}
      ${candidateHtml}
      ${dataHtml}
    </div>
    <div class="btn-row">
      <button class="secondary" onclick="copyCurrentResult()">复制本次结果</button>
    </div>
  `;

  window.currentResultText=`房号：${room}\n结果：${mainText}\n原因：${result.reason||"-"}\n风险：${result.risk||"-"}${result.score!==undefined?`\n评分：${result.score}分`:""}`;
}

function saveHistory(room,result){
  const item={
    room,
    time:new Date().toLocaleString(),
    status:result.status,
    seat:result.seat,
    reason:result.reason,
    risk:result.risk,
    score:result.score
  };

  const list=JSON.parse(localStorage.getItem("ranzai66660_v2_history")||"[]");
  list.unshift(item);
  if(list.length>80)list.pop();

  localStorage.setItem("ranzai66660_v2_history",JSON.stringify(list));
  renderHistory();
}

function renderHistory(){
  const box=document.getElementById("historyList");
  const list=JSON.parse(localStorage.getItem("ranzai66660_v2_history")||"[]");

  if(!list.length){
    box.innerHTML='<div class="muted">暂无历史记录</div>';
    return;
  }

  box.innerHTML=list.map(item=>{
    const resultText=item.status==="跳"?"跳":`${item.seat}号位 ${item.status}`;
    return `
      <div class="history-item">
        <div class="history-top">
          <span>${item.room}｜${resultText}</span>
          <span>${item.score!==undefined?item.score+"分":""}</span>
        </div>
        <div>原因：${item.reason||"-"}</div>
        <div>风险：${item.risk||"-"}</div>
        <div class="muted">${item.time}</div>
      </div>
    `;
  }).join("");
}

function clearHistory(){
  localStorage.removeItem("ranzai66660_v2_history");
  renderHistory();
}

function copyText(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>alert("已复制"));
  }else{
    const ta=document.createElement("textarea");
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    alert("已复制");
  }
}

function copyCurrentResult(){
  copyText(window.currentResultText||"暂无结果");
}

function copyHistory(){
  const list=JSON.parse(localStorage.getItem("ranzai66660_v2_history")||"[]");
  if(!list.length){
    alert("暂无历史可复制");
    return;
  }

  const text=list.map(item=>{
    const resultText=item.status==="跳"?"跳":`${item.seat}号位 ${item.status}`;
    return `${item.room}｜${resultText}｜${item.score!==undefined?item.score+"分":""}\n原因：${item.reason||"-"}\n风险：${item.risk||"-"}\n时间：${item.time}`;
  }).join("\n\n");

  copyText(text);
}

document.getElementById("roomInput").addEventListener("input",function(e){
  e.target.value=e.target.value.replace(/\D/g,"").slice(0,5);
});

document.getElementById("roomInput").addEventListener("keydown",function(e){
  if(e.key==="Enter")runEvaluate();
});

renderHistory();
</script>
</body>
</html>
