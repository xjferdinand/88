<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5130004｜v28-Pro Max</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f5f1ea;
  color:#2b2118;
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.title{
  text-align:center;
  font-size:24px;
  font-weight:900;
  margin-bottom:10px;
}

.panel{
  background:#fff;
  padding:16px;
  border-radius:14px;
  border:1px solid #e5d6c8;
  margin-bottom:14px;
}

input{
  width:100%;
  font-size:22px;
  padding:10px;
  text-align:center;
  border-radius:10px;
  border:2px solid #e7d2c0;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  background:#d94b3d;
  color:#fff;
  font-weight:900;
  border:none;
  border-radius:10px;
}

.result{
  margin-top:12px;
}

.main{
  font-size:18px;
  font-weight:900;
  color:#d94b3d;
}

.sub{
  margin-top:6px;
  color:#6b5644;
}

.item{
  font-size:13px;
  padding:5px 0;
  border-bottom:1px dashed #eee;
}
</style>

</head>

<body>

<div class="wrap">

<div class="title">5130004｜v28-Pro Max</div>

<div class="panel">

<input 
  id="room"
  type="tel"
  inputmode="numeric"
  maxlength="5"
  placeholder="输入5位房号"
  autocomplete="off"
/>

<button onclick="run()">生成推荐</button>

<div id="result" class="result"></div>

</div>

<div class="panel">
<b>预测记录</b>
<div id="history">暂无记录</div>
</div>

</div>

<script>

// 输入过滤
document.getElementById("room").addEventListener("input",function(){
  this.value=this.value.replace(/\D/g,"").slice(0,5);
});

// =========================
// v28-Pro Max 风险系统
// =========================
function risk(d){

  const A=d[0],B=d[1],C=d[2],D=d[3],E=d[4];
  let r=0;

  // 中轴极值
  if(C===Math.max(...d)||C===Math.min(...d)) r+=2;

  // 左右失衡
  if(Math.abs(A+B-(D+E))>=8) r+=2;

  // 镜像轻偏
  if(Math.abs(B-D)<=1) r+=1;

  // 尾部极值
  if(E===Math.max(...d)||E===Math.min(...d)) r+=1;

  return r;
}

// =========================
// v28-Pro Max 评分系统
// =========================
function score(d,i){

  const x=d[i];
  let s=0;

  for(let j=0;j<5;j++){
    if(i===j) continue;

    s+=Math.abs(x-d[j]);

    if(x+d[j]<=9) s+=1;
  }

  // 稳定加权（防止过激）
  s+=2;

  return s;
}

// =========================
// 主逻辑
// =========================
function run(){

  const r=document.getElementById("room").value.trim();

  if(r.length!==5){
    show("不推荐","请输入5位房号");
    return;
  }

  const d=r.split("").map(Number);

  const riskScore=risk(d);

  const list=[0,1,2,3,4].map(i=>({
    seat:i+1,
    score:score(d,i)
  }));

  list.sort((a,b)=>b.score-a.score);

  const top1=list[0];
  const top2=list[1];
  const top3=list[2];

  let label="命中推荐";

  if(riskScore>=4){
    label="⚠️高风险结构（仍可进房）";
  }

  const html=`
    <div class="main">主推：${top1.seat}号</div>
    <div class="sub">副推：${top2.seat}号 / ${top3.seat}号</div>
    <div class="sub">风险值：${riskScore}</div>
  `;

  show(html,label);
  save(r,`${top1.seat}/${top2.seat}/${top3.seat}`);
}

// =========================
// UI
// =========================
function show(html,label){
  document.getElementById("result").innerHTML=`
    <div><b>${label}</b></div>
    ${html}
  `;
  render();
}

// =========================
// 记录
// =========================
function save(room,res){
  let d=JSON.parse(localStorage.getItem("v28pm")||"[]");
  d.unshift({
    room,
    res,
    time:new Date().toLocaleString()
  });

  localStorage.setItem("v28pm",JSON.stringify(d.slice(0,30)));
  render();
}

// =========================
// 历史
// =========================
function render(){
  let d=JSON.parse(localStorage.getItem("v28pm")||"[]");

  document.getElementById("history").innerHTML=
    d.length ? d.map(x=>`
      <div class="item">
        ${x.room} → ${x.res}<br>
        <span style="color:#999">${x.time}</span>
      </div>
    `).join("") : "暂无记录";
}

render();

</script>

</body>
</html>
