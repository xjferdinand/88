<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#b00000"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="小狗v0.9">
  <title>小狗·5130004 v0.9 AB档模型</title>

  <style>
    :root{
      --bg:#0b0b0f;
      --card:#11111a;
      --line:rgba(255,255,255,.10);
      --text:#f5f5f7;
      --muted:rgba(255,255,255,.50);
      --red:#ff2d2d;
      --gold:#ffb020;
      --green:#5cff9a;
      --blue:#8bb8ff;
      --purple:#d59bff;
    }

    *{box-sizing:border-box;margin:0;padding:0;}

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(800px 400px at 50% 15%,rgba(255,45,45,.22),transparent 60%),
        radial-gradient(900px 500px at 50% 110%,rgba(176,0,0,.28),transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
      padding:12px;
    }

    .app{width:min(430px,100%);}

    .title{
      font-size:16px;
      font-weight:900;
      margin:0 0 12px;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .title::before{
      content:"";
      flex-shrink:0;
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--red);
      box-shadow:0 0 12px rgba(255,45,45,.9);
    }

    .version{
      font-size:10px;
      color:rgba(255,45,45,.65);
      margin-left:4px;
      font-weight:500;
    }

    .panel{
      background:linear-gradient(160deg,rgba(255,45,45,.08),transparent 55%),var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      box-shadow:0 20px 60px rgba(0,0,0,.55);
    }

    input{
      width:100%;
      padding:12px 14px;
      font-size:22px;
      letter-spacing:5px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.40);
      color:var(--text);
      outline:none;
      text-align:center;
      font-weight:800;
    }

    input:focus{
      border-color:rgba(255,45,45,.65);
      box-shadow:0 0 0 3px rgba(255,45,45,.12);
    }

    input::placeholder{
      font-size:13px;
      letter-spacing:1px;
      font-weight:400;
    }

    .btn-wrap{
      display:flex;
      justify-content:center;
      margin:14px 0 8px;
    }

    .btn-circle{
      width:66px;
      height:66px;
      border-radius:50%;
      border:2px solid rgba(255,45,45,.55);
      background:radial-gradient(circle at 38% 32%,rgba(255,90,90,.95),rgba(155,0,0,.95));
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:1px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 18px rgba(255,45,45,.40),inset 0 1px 0 rgba(255,255,255,.18);
      transition:transform .1s,box-shadow .1s;
    }

    .btn-circle:active{transform:scale(.92);}

    .msg{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      min-height:14px;
      margin-bottom:8px;
    }

    .result{
      display:none;
      margin-top:4px;
    }

    .result-hdr{
      text-align:center;
      font-size:10px;
      color:var(--muted);
      margin-bottom:8px;
      letter-spacing:.3px;
    }

    .hit-list{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .hit{
      display:grid;
      grid-template-columns:auto 52px 1fr auto;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(0,0,0,.22);
    }

    .hit.a{
      border-color:rgba(255,176,32,.55);
      background:rgba(255,176,32,.10);
    }

    .hit.b{
      border-color:rgba(92,255,154,.45);
      background:rgba(92,255,154,.08);
    }

    .hit.skip{
      border-color:rgba(255,45,45,.55);
      background:rgba(255,45,45,.11);
    }

    .hit.info{
      border-color:rgba(255,255,255,.09);
      background:rgba(255,255,255,.03);
    }

    .hit-lbl{
      font-size:9px;
      font-weight:900;
      padding:2px 6px;
      border-radius:999px;
      white-space:nowrap;
      letter-spacing:.2px;
      background:rgba(255,255,255,.08);
      color:rgba(255,255,255,.60);
    }

    .hit.a .hit-lbl{
      background:rgba(255,176,32,.28);
      color:#ffd18a;
    }

    .hit.b .hit-lbl{
      background:rgba(92,255,154,.20);
      color:rgba(140,255,185,.95);
    }

    .hit.skip .hit-lbl{
      background:rgba(255,45,45,.35);
      color:#ff9898;
    }

    .hit-seat{
      font-size:22px;
      font-weight:1000;
      color:var(--red);
      text-shadow:0 0 12px rgba(255,45,45,.35);
      line-height:1.05;
      text-align:center;
      white-space:nowrap;
    }

    .hit.a .hit-seat{
      color:var(--gold);
      text-shadow:0 0 12px rgba(255,176,32,.25);
    }

    .hit.b .hit-seat{
      color:var(--green);
      text-shadow:0 0 12px rgba(92,255,154,.25);
    }

    .hit.skip .hit-seat{
      color:#ff7b7b;
      text-shadow:0 0 12px rgba(255,45,45,.25);
    }

    .hit.info .hit-seat{
      color:rgba(255,255,255,.25);
      text-shadow:none;
    }

    .hit-body{
      line-height:1.4;
      min-width:0;
    }

    .hit-body .row1{
      font-size:11px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .hit-body .row2{
      font-size:10px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .hit-body .row3{
      font-size:9px;
      color:rgba(255,255,255,.34);
      margin-top:1px;
      line-height:1.25;
    }

    .hit-right{
      text-align:right;
      min-width:42px;
    }

    .hit-wr{
      font-size:11px;
      font-weight:900;
      color:rgba(92,255,154,.88);
    }

    .hit-avg{
      font-size:9px;
      color:rgba(255,255,255,.36);
      margin-top:1px;
    }

    .bigSkip{
      display:none;
      text-align:center;
      padding:18px;
      font-size:30px;
      font-weight:1000;
      color:rgba(255,255,255,.18);
      letter-spacing:4px;
    }

    .history{
      margin-top:12px;
      padding:10px 11px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
    }

    .histHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:7px;
    }

    .histTitle{
      font-size:11px;
      font-weight:800;
      color:var(--muted);
    }

    .clearBtn{
      font-size:10px;
      padding:4px 8px;
      border-radius:7px;
      cursor:pointer;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      color:rgba(255,100,100,.85);
    }

    .histList{
      display:flex;
      flex-direction:column;
      gap:5px;
      max-height:180px;
      overflow:auto;
    }

    .histItem{
      border:1px solid rgba(255,255,255,.05);
      border-radius:9px;
      padding:7px 9px;
      background:rgba(0,0,0,.14);
    }

    .histTop{
      display:flex;
      justify-content:space-between;
      font-size:10px;
      color:rgba(255,255,255,.35);
      margin-bottom:2px;
    }

    .histMain{
      font-size:11px;
      color:rgba(255,255,255,.62);
      line-height:1.35;
    }

    .pill{
      display:inline-block;
      padding:1px 6px;
      border-radius:999px;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      font-weight:800;
      color:var(--red);
      margin-right:3px;
    }

    .tiny{
      margin-top:12px;
      padding-top:10px;
      border-top:1px solid var(--line);
      font-size:10px;
      color:rgba(255,255,255,.30);
      line-height:1.6;
      white-space:pre-line;
    }

    @media (max-width:430px){
      body{padding:10px;}
      .app{width:100%;}
      .panel{padding:10px;border-radius:15px;}
      .hit{
        grid-template-columns:auto 46px 1fr auto;
        gap:6px;
        padding:7px 8px;
      }
      .hit-seat{font-size:19px;}
      .result-hdr{font-size:10px;}
      .histMain{font-size:10px;}
      .tiny{font-size:9px;}
    }
  </style>
</head>

<body>
<div class="app">
  <div class="title">小狗·5130004<span class="version">AB档 v0.9</span></div>

  <div class="panel">
    <input id="room" inputmode="numeric" placeholder="输入5位房号" maxlength="5"/>

    <div class="btn-wrap">
      <button class="btn-circle" id="go">开干</button>
    </div>

    <div class="msg" id="msg"></div>

    <div class="result" id="result">
      <div class="result-hdr" id="resultHdr">— 小狗 v0.9 结果 —</div>
      <div class="hit-list" id="hitList"></div>
    </div>

    <div class="bigSkip" id="skip">跳</div>

    <div class="history">
      <div class="histHead">
        <span class="histTitle">最近记录</span>
        <button class="clearBtn" id="clearBtn">清空</button>
      </div>
      <div class="histList" id="histList"></div>
    </div>

    <div class="tiny">
【小狗·5130004｜v0.9 AB档扩容模型】

当前回测：
总样本100局；命中30局；进房率30.0%；
命中净分 +16590；
正分26局；胜率86.7%；
大赢≥500：16局；
大输≤-500：0局。

A档主进：
2号：X偶；
3号：无0 + 跨度＜7；
4号：和值S=25~30；
5号：X偶 + 无重号。

B档短打：
3号：X偶 + X第5名；
2号：X第3名；
6号：X奇 + X第5名。

执行：
A档正常进；
B档只短打一局，不追；
无A/B命中直接跳。
    </div>
  </div>
</div>

<script>
const HISTORY_KEY = 'xiaogou_5130004_ab_v09';
const HISTORY_LIMIT = 30;

const roomEl     = document.getElementById('room');
const goEl       = document.getElementById('go');
const msgEl      = document.getElementById('msg');
const resultEl   = document.getElementById('result');
const resultHdr  = document.getElementById('resultHdr');
const hitListEl  = document.getElementById('hitList');
const skipEl     = document.getElementById('skip');
const histListEl = document.getElementById('histList');
const clearBtnEl = document.getElementById('clearBtn');

const SEAT_PRIORITY_A = [4,3,2,5];
const SEAT_PRIORITY_B = [3,2,6];

function getDigits(room){
  return room.split('').map(Number);
}

function getBase(room){
  const [A,B,C,D,E] = getDigits(room);
  const digits = [A,B,C,D,E];
  const sum = A+B+C+D+E;
  const max = Math.max(...digits);
  const min = Math.min(...digits);
  const range = max - min;
  const hasZero = digits.includes(0);
  const xMap = {1:A,2:B,3:C,4:D,5:E,6:E};
  const repeat = getRepeatInfo(digits);
  const rankMap = getUniqueRankMap(digits);

  return {
    A,B,C,D,E,
    digits,
    sum,
    max,
    min,
    range,
    hasZero,
    xMap,
    repeat,
    rankMap
  };
}

function getRepeatInfo(digits){
  const count = {};
  digits.forEach(n => count[n] = (count[n] || 0) + 1);

  const groups = Object.entries(count)
    .map(([num,c]) => ({num:Number(num), count:c}))
    .sort((a,b)=>b.count-a.count || a.num-b.num);

  const hasRepeat = groups.some(g => g.count >= 2);
  const repeatedNums = groups.filter(g => g.count >= 2).map(g => g.num);

  let type = '无重号';
  const shape = groups.map(g => g.count).sort((a,b)=>b-a).join('');

  if(shape === '2111') type = '单对子';
  else if(shape === '221') type = '双对子';
  else if(shape === '311') type = '三重号';
  else if(shape === '32') type = '三带二';
  else if(shape === '41') type = '四重号';
  else if(shape === '5') type = '五重号';

  return {
    type,
    hasRepeat,
    repeatedNums,
    groups
  };
}

function getUniqueRankMap(digits){
  const pos = ['A','B','C','D','E'];

  const arr = digits.map((v,i)=>({
    pos:pos[i],
    v,
    i
  }));

  arr.sort((a,b)=>{
    if(b.v !== a.v) return b.v - a.v;
    return b.i - a.i;
  });

  const rankMap = {};
  arr.forEach((item,index)=>{
    rankMap[item.pos] = index + 1;
  });

  return rankMap;
}

function seatPos(seat){
  if(seat === 1) return 'A';
  if(seat === 2) return 'B';
  if(seat === 3) return 'C';
  if(seat === 4) return 'D';
  if(seat === 5) return 'E';
  if(seat === 6) return 'E';
  return '';
}

function getSeatRank(seat,d){
  return d.rankMap[seatPos(seat)];
}

function isEven(n){
  return n % 2 === 0;
}

function isOdd(n){
  return n % 2 === 1;
}

function xText(seat,d){
  const x = d.xMap[seat];
  const pos = seatPos(seat);
  const rank = getSeatRank(seat,d);
  const oe = isEven(x) ? '偶' : '奇';
  return `X=${pos}${x}｜${oe}｜第${rank}名`;
}

function addCandidate(list, seat, grade, name, reason, d){
  list.push({
    seat,
    grade,
    name,
    reason,
    xText:xText(seat,d)
  });
}

function evaluate(room){
  const d = getBase(room);
  const A = [];
  const B = [];

  // =========================
  // A档主进
  // =========================

  // A档：2号 X偶
  if(isEven(d.xMap[2])){
    addCandidate(
      A,
      2,
      'A档',
      '2号｜X偶',
      'A档主进：2号只看X偶；当前100局回测该条件0大输。',
      d
    );
  }

  // A档：3号 无0 + 跨度<7
  if(!d.hasZero && d.range < 7){
    addCandidate(
      A,
      3,
      'A档',
      '3号｜无0 + 小跨度',
      'A档主进：房号无0，且最大数字-最小数字＜7。',
      d
    );
  }

  // A档：4号 S=25~30
  if(d.sum >= 25 && d.sum <= 30){
    addCandidate(
      A,
      4,
      'A档',
      '4号｜和值25-30',
      'A档主进：4号看总能量，和值S在25到30之间。',
      d
    );
  }

  // A档：5号 X偶 + 无重号
  if(isEven(d.xMap[5]) && !d.repeat.hasRepeat){
    addCandidate(
      A,
      5,
      'A档',
      '5号｜X偶 + 无重号',
      'A档主进：5号必须X偶且房号无重号。',
      d
    );
  }

  // =========================
  // B档短打
  // =========================

  // B档：3号 X偶 + X第5名
  if(isEven(d.xMap[3]) && getSeatRank(3,d) === 5){
    addCandidate(
      B,
      3,
      'B档',
      '3号｜X偶 + 第5名',
      'B档短打：3号X偶且X唯一排名第5名，只打一局，不追。',
      d
    );
  }

  // B档：2号 X第3名
  if(getSeatRank(2,d) === 3){
    addCandidate(
      B,
      2,
      'B档',
      '2号｜X第3名',
      'B档短打：2号X唯一排名第3名，只打一局，不追。',
      d
    );
  }

  // B档：6号 X奇 + X第5名
  if(isOdd(d.xMap[6]) && getSeatRank(6,d) === 5){
    addCandidate(
      B,
      6,
      'B档',
      '6号｜X奇 + 第5名',
      'B档短打：6号X奇且X唯一排名第5名，只打一局，不追。',
      d
    );
  }

  // A档去重和排序
  const aMap = new Map();
  A.forEach(item => {
    if(!aMap.has(item.seat)) aMap.set(item.seat,item);
  });

  let aList = Array.from(aMap.values()).sort((x,y)=>{
    return SEAT_PRIORITY_A.indexOf(x.seat) - SEAT_PRIORITY_A.indexOf(y.seat);
  });

  // B档去重，且如果同座位已在A档出现，则不重复显示为B
  const aSeats = new Set(aList.map(i => i.seat));
  const bMap = new Map();

  B.forEach(item => {
    if(aSeats.has(item.seat)) return;
    if(!bMap.has(item.seat)) bMap.set(item.seat,item);
  });

  let bList = Array.from(bMap.values()).sort((x,y)=>{
    return SEAT_PRIORITY_B.indexOf(x.seat) - SEAT_PRIORITY_B.indexOf(y.seat);
  });

  const best = aList[0] || bList[0] || null;

  return {
    room,
    data:d,
    aList,
    bList,
    best,
    ok:!!best
  };
}

function buildCard(item,d,index){
  const cls = item.grade === 'A档' ? 'a' : 'b';
  const label = index === 0
    ? (item.grade === 'A档' ? 'A主推' : 'B短打')
    : item.grade;

  const div = document.createElement('div');
  div.className = `hit ${cls}`;

  div.innerHTML = `
    <div class="hit-lbl">${label}</div>
    <div class="hit-seat">${item.seat}</div>
    <div class="hit-body">
      <div class="row1">${item.name}</div>
      <div class="row2">${item.xText}｜S=${d.sum}｜跨度=${d.range}</div>
      <div class="row3">${item.reason}</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">${item.grade === 'A档' ? '进' : '短'}</div>
      <div class="hit-avg">${item.grade}</div>
    </div>
  `;

  return div;
}

function buildSkipCard(res){
  const d = res.data;
  const div = document.createElement('div');
  div.className = 'hit skip';

  div.innerHTML = `
    <div class="hit-lbl">跳</div>
    <div class="hit-seat">跳</div>
    <div class="hit-body">
      <div class="row1">未命中A档/B档</div>
      <div class="row2">S=${d.sum}｜跨度=${d.range}｜${d.hasZero ? '有0' : '无0'}｜${d.repeat.type}</div>
      <div class="row3">无A/B进房条件，直接跳。不要硬打。</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">—</div>
      <div class="hit-avg">无</div>
    </div>
  `;

  return div;
}

function buildInfoCard(res){
  const d = res.data;
  const div = document.createElement('div');
  div.className = 'hit info';

  const repeatNums = d.repeat.repeatedNums.length ? d.repeat.repeatedNums.join('/') : '无';

  div.innerHTML = `
    <div class="hit-lbl">数据</div>
    <div class="hit-seat">数</div>
    <div class="hit-body">
      <div class="row1">A${d.A} B${d.B} C${d.C} D${d.D} E${d.E}</div>
      <div class="row2">S=${d.sum}｜最大=${d.max}｜最小=${d.min}｜跨度=${d.range}｜${d.hasZero ? '有0' : '无0'}</div>
      <div class="row3">重号=${d.repeat.type}｜重复数字=${repeatNums}｜排名：B${d.rankMap.B}/C${d.rankMap.C}/D${d.rankMap.D}/E${d.rankMap.E}</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">v0.9</div>
      <div class="hit-avg">AB档</div>
    </div>
  `;

  return div;
}

function buildSummaryCard(res){
  const div = document.createElement('div');
  div.className = 'hit info';

  const aText = res.aList.length
    ? res.aList.map(i => `${i.seat}号-${i.name}`).join('；')
    : '无';

  const bText = res.bList.length
    ? res.bList.map(i => `${i.seat}号-${i.name}`).join('；')
    : '无';

  div.innerHTML = `
    <div class="hit-lbl">汇总</div>
    <div class="hit-seat">${res.aList.length + res.bList.length}</div>
    <div class="hit-body">
      <div class="row1">A档：${aText}</div>
      <div class="row2">B档：${bText}</div>
      <div class="row3">A档优先；无A才看B；B档只短打一局，不追。</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">${res.ok ? '有' : '无'}</div>
      <div class="hit-avg">命中</div>
    </div>
  `;

  return div;
}

function render(room){
  const res = evaluate(room);

  resultEl.style.display = 'none';
  skipEl.style.display = 'none';
  hitListEl.innerHTML = '';

  if(!res.ok){
    resultHdr.textContent = `小狗 v0.9｜直接跳`;
    hitListEl.appendChild(buildSkipCard(res));
    hitListEl.appendChild(buildInfoCard(res));
    resultEl.style.display = 'block';
    skipEl.style.display = 'block';
    return res;
  }

  const bestGrade = res.best.grade;
  resultHdr.textContent = `小狗 v0.9｜${bestGrade}｜主推 ${res.best.seat}号`;

  let index = 0;

  res.aList.forEach(item => {
    hitListEl.appendChild(buildCard(item,res.data,index));
    index++;
  });

  res.bList.forEach(item => {
    hitListEl.appendChild(buildCard(item,res.data,index));
    index++;
  });

  hitListEl.appendChild(buildSummaryCard(res));
  hitListEl.appendChild(buildInfoCard(res));

  resultEl.style.display = 'block';
  return res;
}

function run(){
  const raw = roomEl.value.trim().replace(/\s+/g,'');

  if(!/^\d{5}$/.test(raw)){
    msgEl.textContent = '请输入正确的5位数字';
    return;
  }

  msgEl.textContent = '';

  const res = render(raw);
  pushHistory(raw,res);

  setTimeout(()=>{
    roomEl.value = '';
    roomEl.focus();
  },180);
}

function loadHist(){
  try{
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  }catch{
    return [];
  }
}

function saveHist(items){
  localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0,HISTORY_LIMIT)));
}

function renderHist(){
  const items = loadHist();
  histListEl.innerHTML = '';

  if(!items.length){
    histListEl.innerHTML = `<div class="histItem"><div class="histMain" style="color:rgba(255,255,255,.2)">暂无记录</div></div>`;
    return;
  }

  items.forEach(item=>{
    const div = document.createElement('div');
    div.className = 'histItem';

    const text = item.ok
      ? `${item.grade}｜${item.seat}号｜${item.name}`
      : '跳';

    div.innerHTML = `
      <div class="histTop"><span>房号 <span class="pill">${item.room}</span></span><span>${item.time}</span></div>
      <div class="histMain">小狗v0.9 → ${text}</div>
    `;

    histListEl.appendChild(div);
  });
}

function pushHistory(room,res){
  const items = loadHist();
  const ok = res.ok && res.best;

  items.unshift({
    room,
    ok,
    grade:ok ? res.best.grade : '跳',
    seat:ok ? res.best.seat : null,
    name:ok ? res.best.name : '跳',
    time:new Date().toLocaleString('zh-CN',{hour12:false})
  });

  saveHist(items);
  renderHist();
}

goEl.addEventListener('click', run);

roomEl.addEventListener('keydown', e=>{
  if(e.key === 'Enter') run();
});

roomEl.addEventListener('input', e=>{
  e.target.value = e.target.value.replace(/\D/g,'').slice(0,5);
});

clearBtnEl.addEventListener('click', ()=>{
  localStorage.removeItem(HISTORY_KEY);
  renderHist();
});

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

renderHist();
roomEl.focus();
</script>
</body>
</html>
