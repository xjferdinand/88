<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#b00000"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="然崽零大输">
  <title>然崽·多结构零大输筛选模型 v1.0</title>
  <style>
    :root{
      --bg:#0b0b0f;
      --card:#11111a;
      --line:rgba(255,255,255,.10);
      --text:#f5f5f7;
      --muted:rgba(255,255,255,.50);
      --red:#ff2d2d;
      --gold:#ffb020;
      --green:#5cff9a;
      --blue:#8bb8ff;
    }
    *{box-sizing:border-box;margin:0;padding:0;}

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(800px 400px at 50% 15%,rgba(255,45,45,.22),transparent 60%),
        radial-gradient(900px 500px at 50% 110%,rgba(176,0,0,.28),transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
      padding:12px;
    }

    .app{width:min(430px,100%);}

    .title{
      font-size:16px;
      font-weight:900;
      margin:0 0 12px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .title::before{
      content:"";
      flex-shrink:0;
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--red);
      box-shadow:0 0 12px rgba(255,45,45,.9);
    }
    .version{
      font-size:10px;
      color:rgba(255,45,45,.65);
      margin-left:4px;
      font-weight:500;
    }

    .panel{
      background:linear-gradient(160deg,rgba(255,45,45,.08),transparent 55%),var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      box-shadow:0 20px 60px rgba(0,0,0,.55);
    }

    input{
      width:100%;
      padding:12px 14px;
      font-size:22px;
      letter-spacing:5px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.40);
      color:var(--text);
      outline:none;
      text-align:center;
      font-weight:800;
    }
    input:focus{
      border-color:rgba(255,45,45,.65);
      box-shadow:0 0 0 3px rgba(255,45,45,.12);
    }
    input::placeholder{
      font-size:13px;
      letter-spacing:1px;
      font-weight:400;
    }

    .btn-wrap{
      display:flex;
      justify-content:center;
      margin:14px 0 8px;
    }
    .btn-circle{
      width:66px;
      height:66px;
      border-radius:50%;
      border:2px solid rgba(255,45,45,.55);
      background:radial-gradient(circle at 38% 32%,rgba(255,90,90,.95),rgba(155,0,0,.95));
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:1px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 18px rgba(255,45,45,.40),inset 0 1px 0 rgba(255,255,255,.18);
      transition:transform .1s,box-shadow .1s;
    }
    .btn-circle:active{transform:scale(.92);}

    .msg{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      min-height:14px;
      margin-bottom:8px;
    }

    .result{
      display:none;
      margin-top:4px;
    }
    .result-hdr{
      text-align:center;
      font-size:10px;
      color:var(--muted);
      margin-bottom:8px;
      letter-spacing:.3px;
    }
    .hit-list{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .hit{
      display:grid;
      grid-template-columns:auto 52px 1fr auto;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(0,0,0,.22);
    }

    .hit.a{
      border-color:rgba(255,176,32,.50);
      background:rgba(255,176,32,.10);
    }
    .hit.b{
      border-color:rgba(92,255,154,.45);
      background:rgba(92,255,154,.08);
    }
    .hit.c{
      border-color:rgba(139,184,255,.35);
      background:rgba(139,184,255,.07);
    }
    .hit.d{
      border-color:rgba(255,45,45,.55);
      background:rgba(255,45,45,.11);
    }
    .hit.info{
      border-color:rgba(255,255,255,.09);
      background:rgba(255,255,255,.03);
    }

    .hit-lbl{
      font-size:9px;
      font-weight:900;
      padding:2px 6px;
      border-radius:999px;
      white-space:nowrap;
      letter-spacing:.2px;
      background:rgba(255,255,255,.08);
      color:rgba(255,255,255,.60);
    }
    .hit.a .hit-lbl{
      background:rgba(255,176,32,.28);
      color:#ffd18a;
    }
    .hit.b .hit-lbl{
      background:rgba(92,255,154,.20);
      color:rgba(140,255,185,.95);
    }
    .hit.c .hit-lbl{
      background:rgba(139,184,255,.20);
      color:rgba(175,205,255,.95);
    }
    .hit.d .hit-lbl{
      background:rgba(255,45,45,.35);
      color:#ff9898;
    }

    .hit-seat{
      font-size:22px;
      font-weight:1000;
      color:var(--red);
      text-shadow:0 0 12px rgba(255,45,45,.35);
      line-height:1.05;
      text-align:center;
      white-space:nowrap;
    }
    .hit.a .hit-seat{
      color:var(--gold);
      text-shadow:0 0 12px rgba(255,176,32,.25);
    }
    .hit.b .hit-seat{
      color:var(--green);
      text-shadow:0 0 12px rgba(92,255,154,.25);
    }
    .hit.c .hit-seat{
      color:var(--blue);
      text-shadow:0 0 12px rgba(139,184,255,.25);
    }
    .hit.info .hit-seat{
      color:rgba(255,255,255,.22);
      text-shadow:none;
    }

    .hit-body{
      line-height:1.4;
      min-width:0;
    }
    .hit-body .row1{
      font-size:11px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hit-body .row2{
      font-size:10px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hit-body .row3{
      font-size:9px;
      color:rgba(255,255,255,.34);
      margin-top:1px;
      line-height:1.25;
    }

    .hit-right{
      text-align:right;
      min-width:42px;
    }
    .hit-wr{
      font-size:11px;
      font-weight:900;
      color:rgba(92,255,154,.88);
    }
    .hit-avg{
      font-size:9px;
      color:rgba(255,255,255,.36);
      margin-top:1px;
    }

    .bigSkip{
      display:none;
      text-align:center;
      padding:18px;
      font-size:30px;
      font-weight:1000;
      color:rgba(255,255,255,.18);
      letter-spacing:4px;
    }

    .history{
      margin-top:12px;
      padding:10px 11px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
    }
    .histHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:7px;
    }
    .histTitle{
      font-size:11px;
      font-weight:800;
      color:var(--muted);
    }
    .clearBtn{
      font-size:10px;
      padding:4px 8px;
      border-radius:7px;
      cursor:pointer;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      color:rgba(255,100,100,.85);
    }
    .histList{
      display:flex;
      flex-direction:column;
      gap:5px;
      max-height:180px;
      overflow:auto;
    }
    .histItem{
      border:1px solid rgba(255,255,255,.05);
      border-radius:9px;
      padding:7px 9px;
      background:rgba(0,0,0,.14);
    }
    .histTop{
      display:flex;
      justify-content:space-between;
      font-size:10px;
      color:rgba(255,255,255,.35);
      margin-bottom:2px;
    }
    .histMain{
      font-size:11px;
      color:rgba(255,255,255,.62);
      line-height:1.35;
    }
    .pill{
      display:inline-block;
      padding:1px 6px;
      border-radius:999px;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      font-weight:800;
      color:var(--red);
      margin-right:3px;
    }

    .tiny{
      margin-top:12px;
      padding-top:10px;
      border-top:1px solid var(--line);
      font-size:10px;
      color:rgba(255,255,255,.30);
      line-height:1.6;
      white-space:pre-line;
    }

    @media (max-width:430px){
      body{padding:10px;}
      .app{width:100%;}
      .panel{padding:10px;border-radius:15px;}
      .hit{
        grid-template-columns:auto 46px 1fr auto;
        gap:6px;
        padding:7px 8px;
      }
      .hit-seat{font-size:19px;}
      .result-hdr{font-size:10px;}
      .histMain{font-size:10px;}
      .tiny{font-size:9px;}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="title">然崽·5130004<span class="version">多结构零大输 v1.0</span></div>
  <div class="panel">

    <input id="room" inputmode="numeric" placeholder="输入5位房号" maxlength="5"/>

    <div class="btn-wrap">
      <button class="btn-circle" id="go">开干</button>
    </div>

    <div class="msg" id="msg"></div>

    <div class="result" id="result">
      <div class="result-hdr" id="resultHdr">— 然崽 v1.0 结果 —</div>
      <div class="hit-list" id="hitList"></div>
    </div>
    <div class="bigSkip" id="skip">跳</div>

    <div class="history">
      <div class="histHead">
        <span class="histTitle">最近记录</span>
        <button class="clearBtn" id="clearBtn">清空</button>
      </div>
      <div class="histList" id="histList"></div>
    </div>

    <div class="tiny">
【然崽·5130004｜多结构零大输筛选模型 v1.0】
旧模型全部作废。

定位：低频短打，不是强打模型。
目标：命中结构不能混入 ≤-200 亏损；若命中 ≤-500 大输，模型摧毁。

反推口径：
82局样本；命中22局；进房率约26.8%；
命中大赢15/15；最大命中亏损 -60；
未命中 ≤-200；未命中大输。

网页输出口径：
命中硬跳 = 最终直接跳，不再显示主推。
命中A档 = 短打偏强，只打一局。
命中B档 = 短打一局，不追。
没命中A/B = 直接跳。
    </div>

  </div>
</div>

<script>
const HISTORY_KEY = 'ranzai_5130004_multi_zero_loss_v10_final';
const HISTORY_LIMIT = 30;

const roomEl     = document.getElementById('room');
const goEl       = document.getElementById('go');
const msgEl      = document.getElementById('msg');
const resultEl   = document.getElementById('result');
const resultHdr  = document.getElementById('resultHdr');
const hitListEl  = document.getElementById('hitList');
const skipEl     = document.getElementById('skip');
const histListEl = document.getElementById('histList');
const clearBtnEl = document.getElementById('clearBtn');

const POS = ['A','B','C','D','E'];

function getDigits(room){
  return room.split('').map(Number);
}

function parityBit(n){
  return n % 2 === 1 ? '1' : '0';
}

function parityPattern(digits){
  return digits.map(parityBit).join('');
}

function getSeatX(seat, d){
  if(seat === 1) return d.A;
  if(seat === 2) return d.B;
  if(seat === 3) return d.C;
  if(seat === 4) return d.D;
  if(seat === 5) return d.E;
  if(seat === 6) return d.E;
  return null;
}

function getSeatPos(seat){
  if(seat === 1) return 'A';
  if(seat === 2) return 'B';
  if(seat === 3) return 'C';
  if(seat === 4) return 'D';
  if(seat === 5) return 'E';
  if(seat === 6) return 'E';
  return '';
}

function uniqueRanks(digits){
  const arr = POS.map((p,i)=>({p, v:digits[i], idx:i}));

  arr.sort((a,b)=>{
    if(b.v !== a.v) return b.v - a.v;
    return b.idx - a.idx;
  });

  const rankMap = {};
  arr.forEach((item, idx)=>{
    rankMap[item.p] = idx + 1;
  });

  const rankShape = POS.map(p => rankMap[p]).join('');
  const rankToPos = {};

  for(const p of POS){
    rankToPos[rankMap[p]] = p;
  }

  return {
    rankMap,
    rankShape,
    top1:rankToPos[1],
    top2:[rankToPos[1], rankToPos[2]].join('+'),
    bottom1:rankToPos[5],
    bottom2:[rankToPos[4], rankToPos[5]].join('+')
  };
}

function getRankOfSeat(seat, rankMap){
  const p = getSeatPos(seat);
  return rankMap[p];
}

function seatGroup(seat){
  if([3,5].includes(seat)) return '35组';
  if([2,4,6].includes(seat)) return '246组';
  return '其他';
}

function getTrendType(seat, d){
  const r = d.rankMap;
  const xRank = getRankOfSeat(seat, r);

  if(xRank >= 4) return '低位反爆型';
  if(r.E === 1) return '尾冲型';
  if(r.A <= 2 || r.B <= 2) return '前冲型';
  if(r.C <= 2 || r.D <= 2) return '中轴型';

  const ranks = [r.A,r.B,r.C,r.D,r.E];
  let jumps = 0;
  for(let i=1;i<ranks.length;i++){
    if(Math.abs(ranks[i]-ranks[i-1]) >= 3) jumps++;
  }
  if(jumps >= 2) return '断崖型';

  return '平台型';
}

function getBaseData(room5){
  const [A,B,C,D,E] = getDigits(room5);
  const digits = [A,B,C,D,E];
  const sum = A+B+C+D+E;
  const ranks = uniqueRanks(digits);
  const pattern = parityPattern(digits);

  return {
    A,B,C,D,E,digits,sum,pattern,
    rankMap:ranks.rankMap,
    rankShape:ranks.rankShape,
    top1:ranks.top1,
    top2:ranks.top2,
    bottom1:ranks.bottom1,
    bottom2:ranks.bottom2
  };
}

function xText(seat,d){
  const p = getSeatPos(seat);
  const x = getSeatX(seat,d);
  const rk = d.rankMap[p];
  return `X=${p}${x}｜X第${rk}名`;
}

function addTrigger(list, seat, grade, name, reason, score, d){
  list.push({
    seat,
    grade,
    name,
    reason,
    score,
    xText:xText(seat,d),
    group:seatGroup(seat),
    trend:getTrendType(seat,d)
  });
}

function samePair(pair, a, b){
  return pair === `${a}+${b}` || pair === `${b}+${a}`;
}

function evaluateV10(room5){
  const d = getBaseData(room5);
  const triggers = [];
  const hard = [];

  // =========================
  // 硬跳 / 删除结构
  // =========================

  if(['00001','01000','01010','00101','11001'].includes(d.pattern)){
    hard.push(`奇偶${d.pattern} 历史混入大输/不可接受输，硬跳`);
  }

  if(d.pattern === '00000' && d.rankMap.E === 2){
    hard.push('00000 + 6号E第2名 属于历史大雷结构，6号禁进');
  }

  if(d.pattern === '01110' && d.rankMap.D === 5){
    hard.push('01110 + 4号D第5名 历史大雷，4号禁进');
  }

  if(d.pattern === '10001' && d.rankMap.E === 1){
    hard.push('10001 + 6号E第1名 历史混输，6号禁进');
  }

  if(d.pattern === '00001' && d.rankMap.E === 1){
    hard.push('00001 + 5号E第1名 孤奇尾失败结构，5号禁进');
  }

  // =========================
  // A档：短打偏强结构
  // =========================

  if(samePair(d.bottom2,'A','C')){
    addTrigger(
      triggers,
      5,
      'A档',
      'Bottom2=A+C + 5号',
      '最低两位落在A/C，尾部E不塌，5号承接；历史2局大赢无≤-200',
      96,
      d
    );
  }

  if(samePair(d.bottom2,'E','A')){
    addTrigger(
      triggers,
      3,
      'A档',
      'Bottom2=E+A + 3号',
      '低位落在首尾A/E，中轴C被托起；历史无≤-200',
      95,
      d
    );
  }

  if(samePair(d.bottom2,'C','B')){
    addTrigger(
      triggers,
      3,
      'A档',
      'Bottom2=C+B + 3号',
      '低位底盘集中B/C，3号同类最大亏损仅-60；符合零大输口径',
      94,
      d
    );
  }

  if(samePair(d.top2,'E','B')){
    addTrigger(
      triggers,
      2,
      'A档',
      'Top2=E+B + 2号',
      '最高点在E，第二高在B，2号吃B高位承接；历史无≤-200',
      93,
      d
    );
  }

  if(samePair(d.top2,'E','A')){
    addTrigger(
      triggers,
      3,
      'A档',
      'Top2=E+A + 3号',
      '高位落在首尾E/A，3号中段承接；历史无≤-200',
      92,
      d
    );
  }

  if(d.pattern === '10011'){
    addTrigger(
      triggers,
      2,
      'A档',
      '10011 + 246组辅助｜2号',
      '10011为历史强爆结构；2号/246组可短打',
      91,
      d
    );
    addTrigger(
      triggers,
      6,
      'A档',
      '10011 + 246组辅助｜6号',
      '10011为历史强爆结构；6号/246组可短打',
      90,
      d
    );
  }

  if(d.pattern === '10000'){
    addTrigger(
      triggers,
      4,
      'A档',
      '10000 + 246组前冲｜4号',
      '10000在246组前冲结构里历史不亏；4号短打',
      89,
      d
    );
  }

  // =========================
  // B档：单样本大赢短打一局
  // =========================

  if(d.pattern === '00000' && d.rankMap.E === 5){
    addTrigger(
      triggers,
      6,
      'B档',
      '00000 + 6号 + X第5名',
      '全偶结构里只取6号最低位反爆；同结构X第2名禁止',
      84,
      d
    );
  }

  if(d.pattern === '00100' && d.rankMap.C === 5){
    addTrigger(
      triggers,
      3,
      'B档',
      '00100 + 3号 + X第5名',
      '3号低位反爆观察结构；只打一局',
      83,
      d
    );
  }

  if(d.pattern === '00110' && d.rankMap.E === 1){
    addTrigger(
      triggers,
      6,
      'B档',
      '00110 + 6号 + X第1名',
      '6号尾部最高位爆发结构；单样本短打',
      82,
      d
    );
  }

  if(d.pattern === '10111' && d.rankMap.C === 4){
    addTrigger(
      triggers,
      3,
      'B档',
      '10111 + 3号 + X第4名',
      '3号X第4名被结构托起；单样本短打',
      81,
      d
    );
  }

  if(d.pattern === '01001' && d.rankMap.E === 1){
    addTrigger(
      triggers,
      5,
      'B档',
      '01001 + 5号 + X第1名',
      '5号尾部第一名只在01001结构中保留；00001同类已硬跳',
      80,
      d
    );
  }

  if(d.pattern === '11111' && d.rankMap.B === 3){
    addTrigger(
      triggers,
      2,
      'B档',
      '11111 + 2号 + X第3名',
      '11111粗结构高危，只保留2号X第3名单样本短打',
      79,
      d
    );
  }

  // =========================
  // 精确硬跳过滤
  // =========================

  let filtered = triggers.filter(t => {
    const s = t.seat;

    if(d.pattern === '00001') return false;
    if(['01000','01010','00101','11001'].includes(d.pattern)) return false;

    if(d.pattern === '00000' && s === 6 && d.rankMap.E === 2) return false;
    if(d.pattern === '01110' && s === 4 && d.rankMap.D === 5) return false;
    if(d.pattern === '10001' && s === 6 && d.rankMap.E === 1) return false;

    return true;
  });

  const seen = new Set();
  filtered = filtered.filter(t=>{
    const key = `${t.seat}-${t.name}`;
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  filtered.sort((a,b)=>b.score-a.score);

  return {
    ok: filtered.length > 0,
    data:d,
    hard,
    triggers:filtered,
    best:filtered[0] || null
  };
}

function cardClass(grade){
  if(grade === 'A档') return 'a';
  if(grade === 'B档') return 'b';
  if(grade === '硬跳') return 'd';
  return 'c';
}

function buildTriggerCard(t, d, room5, index){
  const div = document.createElement('div');
  div.className = `hit ${cardClass(t.grade)}`;

  const label = index === 0
    ? (t.grade === 'A档' ? '主推' : '短打')
    : t.grade;

  const advice = t.grade === 'A档'
    ? '短打偏强；只打一局，不追。'
    : 'B档短打；只打一局，不追。';

  div.innerHTML = `
    <div class="hit-lbl">${label}</div>
    <div class="hit-seat">${t.seat}</div>
    <div class="hit-body">
      <div class="row1">${t.name}｜房号=${room5}</div>
      <div class="row2">A${d.A} B${d.B} C${d.C} D${d.D} E${d.E}｜${t.xText}</div>
      <div class="row3">${t.reason}｜${t.group}｜${t.trend}｜${advice}</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">${t.score}</div>
      <div class="hit-avg">${t.grade}</div>
    </div>
  `;
  return div;
}

function buildHardCard(text, d, room5){
  const div = document.createElement('div');
  div.className = 'hit d';

  div.innerHTML = `
    <div class="hit-lbl">硬跳</div>
    <div class="hit-seat">跳</div>
    <div class="hit-body">
      <div class="row1">${text}</div>
      <div class="row2">房号=${room5}｜奇偶=${d.pattern}｜排名=${d.rankShape}</div>
      <div class="row3">人工口径：硬跳优先级最高；命中硬跳后不再输出主推。</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">禁</div>
      <div class="hit-avg">硬跳</div>
    </div>
  `;
  return div;
}

function buildSkipCard(res, room5){
  const d = res.data;
  const div = document.createElement('div');
  div.className = 'hit info';

  div.innerHTML = `
    <div class="hit-lbl">跳</div>
    <div class="hit-seat">跳</div>
    <div class="hit-body">
      <div class="row1">未命中A/B短打结构</div>
      <div class="row2">房号=${room5}｜奇偶=${d.pattern}｜排名=${d.rankShape}</div>
      <div class="row3">Top2=${d.top2}｜Bottom2=${d.bottom2}｜无可用结构，直接跳。</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">—</div>
      <div class="hit-avg">无</div>
    </div>
  `;
  return div;
}

function buildDataCard(res){
  const d = res.data;
  const div = document.createElement('div');
  div.className = 'hit c';

  const triggerText = res.triggers && res.triggers.length
    ? res.triggers.map(t=>`${t.seat}号-${t.name}`).join('；')
    : '无';

  div.innerHTML = `
    <div class="hit-lbl">数据</div>
    <div class="hit-seat">${res.triggers ? res.triggers.length : 0}</div>
    <div class="hit-body">
      <div class="row1">奇偶=${d.pattern}｜排名形态=${d.rankShape}｜和值=${d.sum}</div>
      <div class="row2">Top1=${d.top1}｜Top2=${d.top2}｜Bottom1=${d.bottom1}｜Bottom2=${d.bottom2}</div>
      <div class="row3">全部触发：${triggerText}</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">v1.0</div>
      <div class="hit-avg">多结构</div>
    </div>
  `;
  return div;
}

function buildOtherTriggersCard(triggers){
  const div = document.createElement('div');
  div.className = 'hit info';

  const otherText = triggers
    .slice(1)
    .map(t => `${t.seat}号-${t.name}`)
    .join('；');

  div.innerHTML = `
    <div class="hit-lbl">备注</div>
    <div class="hit-seat">备</div>
    <div class="hit-body">
      <div class="row1">其他命中结构，仅作参考，不作为主推</div>
      <div class="row2">${otherText}</div>
      <div class="row3">实战只按主推座位执行，不建议多座位乱换。</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">参考</div>
      <div class="hit-avg">非主推</div>
    </div>
  `;
  return div;
}

function render(room5){
  const res = evaluateV10(room5);

  resultEl.style.display = 'none';
  skipEl.style.display = 'none';
  hitListEl.innerHTML = '';

  // 最高优先级：只要命中硬跳，最终直接跳
  if(res.hard.length){
    resultHdr.textContent = `然崽 v1.0｜硬跳，直接跳`;

    res.hard.forEach(h=>{
      hitListEl.appendChild(buildHardCard(h, res.data, room5));
    });

    hitListEl.appendChild(buildDataCard({
      ...res,
      triggers:[]
    }));

    resultEl.style.display = 'block';
    skipEl.style.display = 'block';

    return {
      ...res,
      ok:false,
      best:null,
      triggers:[]
    };
  }

  // 没命中A/B结构，直接跳
  if(!res.ok){
    resultHdr.textContent = `然崽 v1.0｜无命中，直接跳`;
    hitListEl.appendChild(buildSkipCard(res, room5));
    hitListEl.appendChild(buildDataCard(res));
    resultEl.style.display = 'block';
    skipEl.style.display = 'block';
    return res;
  }

  // 命中A/B结构，只输出一个主推
  resultHdr.textContent = `然崽 v1.0｜主推 ${res.best.seat}号｜${res.best.grade}`;

  hitListEl.appendChild(buildTriggerCard(res.best, res.data, room5, 0));

  if(res.triggers.length > 1){
    hitListEl.appendChild(buildOtherTriggersCard(res.triggers));
  }

  hitListEl.appendChild(buildDataCard(res));
  resultEl.style.display = 'block';

  return res;
}

function run(){
  const raw = roomEl.value.trim().replace(/\s+/g, '');
  if(!/^\d{5}$/.test(raw)){
    msgEl.textContent = '请输入正确的5位数字';
    return;
  }

  msgEl.textContent = '';
  const res = render(raw);
  pushHistory(raw, res);

  setTimeout(()=>{
    roomEl.value='';
    roomEl.focus();
  }, 180);
}

function loadHist(){
  try{
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  }catch{
    return [];
  }
}

function saveHist(items){
  localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0,HISTORY_LIMIT)));
}

function renderHist(){
  const items = loadHist();
  histListEl.innerHTML = '';

  if(!items.length){
    histListEl.innerHTML = `<div class="histItem"><div class="histMain" style="color:rgba(255,255,255,.2)">暂无记录</div></div>`;
    return;
  }

  items.forEach(item=>{
    const div = document.createElement('div');
    div.className = 'histItem';

    const resText = item.ok
      ? `${item.seat}号｜${item.name}`
      : '跳';

    div.innerHTML = `
      <div class="histTop"><span>房号 <span class="pill">${item.room}</span></span><span>${item.time}</span></div>
      <div class="histMain">然崽v1.0 → ${resText}</div>
    `;
    histListEl.appendChild(div);
  });
}

function pushHistory(room,res){
  const items = loadHist();

  const isOk = res.ok && res.best;

  items.unshift({
    room,
    ok:isOk,
    seat:isOk ? res.best.seat : null,
    name:isOk ? `${res.best.grade}｜${res.best.name}` : '跳',
    time:new Date().toLocaleString('zh-CN',{hour12:false})
  });

  saveHist(items);
  renderHist();
}

goEl.addEventListener('click', run);

roomEl.addEventListener('keydown', e=>{
  if(e.key === 'Enter') run();
});

roomEl.addEventListener('input', e=>{
  e.target.value = e.target.value.replace(/\D/g,'').slice(0,5);
});

clearBtnEl.addEventListener('click', ()=>{
  localStorage.removeItem(HISTORY_KEY);
  renderHist();
});

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

renderHist();
roomEl.focus();
</script>
</body>
</html>
