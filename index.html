<script>
const LOCAL_RULES = {
  3: [
    { local:'OEO', ranks:new Set([1,2,3]), tag:'主打' },
    { local:'EEE', ranks:new Set([3]), tag:'次打' },
    { local:'OEE', ranks:new Set([3]), tag:'观察' },
    { local:'OOO', ranks:new Set([2]), tag:'观察' },
    { local:'EOE', ranks:new Set([3]), tag:'观察' }
  ],
  4: [
    { local:'EEE', ranks:new Set([3]), tag:'主打' },
    { local:'OEO', ranks:new Set([3,5]), tag:'主打' },
    { local:'OOO', ranks:new Set([2]), tag:'次打' },
    { local:'EOO', ranks:new Set([2]), tag:'次打' }
  ],
  5: [
    { local:'EEO', ranks:new Set([3]), tag:'主打' },
    { local:'EOE', ranks:new Set([2]), tag:'主打' },
    { local:'OEE', ranks:new Set([1]), tag:'主打' },
    { local:'OOE', ranks:new Set([2]), tag:'高波动' },
    { local:'OOO', ranks:new Set([3]), tag:'高波动' },
    { local:'EOO', ranks:new Set([2]), tag:'观察' },
    { local:'OEO', ranks:new Set([1]), tag:'主打' }
  ],
  6: [
    { local:'OOE', ranks:new Set([1,5]), tag:'主打' },
    { local:'OEE', ranks:new Set([1]), tag:'次打' },
    { local:'OEO', ranks:new Set([2,5]), tag:'次打' },
    { local:'EOO', ranks:new Set([4]), tag:'观察' }
  ]
};

const HISTORY_KEY='model_72050_compact_v1';
const HISTORY_LIMIT=30;

const roomEl=document.getElementById('room');
const goEl=document.getElementById('go');
const msgEl=document.getElementById('msg');
const resultEl=document.getElementById('result');
const resultHdr=document.getElementById('resultHdr');
const hitListEl=document.getElementById('hitList');
const ranzaiResultEl=document.getElementById('ranzaiResult');
const ranzaiResultHdr=document.getElementById('ranzaiResultHdr');
const ranzaiHitListEl=document.getElementById('ranzaiHitList');
const logicResultEl=document.getElementById('logicResult');
const logicResultHdr=document.getElementById('logicResultHdr');
const logicHitListEl=document.getElementById('logicHitList');
const skipEl=document.getElementById('skip');
const histListEl=document.getElementById('histList');
const clearBtnEl=document.getElementById('clearBtn');

function getParityPattern(room){ return room.split('').map(n => (parseInt(n,10)%2===0?'偶':'奇')).join(''); }
function getDigits(room){ return room.split('').map(Number); }
function getSeatX(room, seat){
  const digits=getDigits(room);
  return seat>=5 ? digits[4] : digits[seat-1];
}
function getSeatM(room, seat){
  const [A,B,C,D,E]=getDigits(room);
  if(seat===2) return A+C-B;
  if(seat===3) return B+D-C;
  if(seat===4) return C+E-D;
  if(seat===5||seat===6) return D+A-E;
  return null;
}
function getRulesForPattern(pattern){
  const rules=STRUCT_RULES_72050[pattern]||[];
  if(pattern==='奇偶偶奇奇'){
    return [...rules,...(STRUCT_RULES_72050['奇偶偶奇奇_2号补充']||[])];
  }
  return rules;
}
function getStructureModel(room5){
  const pattern=getParityPattern(room5);
  const rules=getRulesForPattern(pattern);
  if(!rules.length) return {ok:false,pattern,reason:'无结构命中'};
  const hits=rules.slice(0,2).map(rule=>({
    seat:rule.seat,
    X:getSeatX(room5,rule.seat),
    tag:rule.tag,
    n:rule.n,
    net:rule.net,
    wr:rule.wr,
    avg:rule.avg
  }));
  return {ok:true,pattern,hits};
}
function getStructureStrongXModel(room5){
  const base=getStructureModel(room5);
  if(!base.ok) return {ok:false,pattern:base.pattern,reason:base.reason};
  const passed=base.hits.filter(hit=>STRONG_X_72050[hit.seat]&&STRONG_X_72050[hit.seat].has(hit.X));
  if(!passed.length) return {ok:false,pattern:base.pattern,reason:'强X未命中'};
  return {ok:true,pattern:base.pattern,hits:passed.slice(0,2)};
}
function getMModel(room5){
  const pattern=getParityPattern(room5);
  const hits=[];
  for(let seat=2;seat<=6;seat++){
    const M=getSeatM(room5,seat);
    if(M_BLACK[seat]&&M_BLACK[seat].has(M)) continue;
    if(M_STRONG[seat]&&M_STRONG[seat].has(M)){
      const meta=M_META[`${seat}_${M}`]||{tag:'M模型',n:'—',net:'—',wr:'—',avg:'—'};
      hits.push({seat,M,tag:meta.tag,n:meta.n,net:meta.net,wr:meta.wr,avg:meta.avg});
    }
  }
  if(!hits.length) return {ok:false,pattern,reason:'M未命中'};
  const priority={4:1,5:2,2:3,3:4,6:5};
  hits.sort((a,b)=>(priority[a.seat]||9)-(priority[b.seat]||9));
  return {ok:true,pattern,hits:hits.slice(0,2)};
}
function getABPattern(room5){
  return room5.split('').map(c=>parseInt(c)<=4?'A':'B').join('');
}
function getABModel(room5){
  const abPat=getABPattern(room5);
  const rules=AB_RULES[abPat];
  if(!rules||!rules.length) return {ok:false,abPat,reason:'AB无命中'};
  return {
    ok:true,
    abPat,
    hits:rules.map(r=>({seat:r.seat,tag:r.tag,wr:r.wr,avg:r.avg,n:r.n,net:r.net}))
  };
}
function oe(n){ return n%2===0 ? 'E' : 'O'; }
function getLocalPattern(room5, seat){
  const [A,B,C,D,E]=getDigits(room5);
  if(seat===3) return `${oe(B)}${oe(C)}${oe(D)}`;
  if(seat===4) return `${oe(C)}${oe(D)}${oe(E)}`;
  if(seat===5 || seat===6) return `${oe(A)}${oe(D)}${oe(E)}`;
  return '';
}
function getXRank(room5, seat){
  const digits=getDigits(room5);
  const x=getSeatX(room5, seat);
  let greater=0;
  for(const d of digits){
    if(d>x) greater++;
  }
  return greater+1;
}

function getRanzaiModel(room5){
  const hits=[];
  for(const seat of [3,4,5,6]){
    const local=getLocalPattern(room5, seat);
    const rank=getXRank(room5, seat);
    const X=getSeatX(room5, seat);
    const rule=(LOCAL_RULES[seat]||[]).find(r=>r.local===local && r.ranks.has(rank));
    if(!rule) continue;
    hits.push({
      seat,
      X,
      rank,
      local,
      tag:rule.tag,
      note:`${seat}号｜${local}｜第${rank}名`
    });
  }
  if(!hits.length) return {ok:false,reason:'然仔未命中'};
  const priority={3:1,4:2,5:3,6:4};
  hits.sort((a,b)=>(priority[a.seat]||9)-(priority[b.seat]||9));
  return {
    ok:true,
    hits,
    main:hits[0],
    others:hits.slice(1)
  };
}

function getHardLogicModel(room5){
  const hits=[];
  for(const seat of [3,4,5,6]){
    const local=getLocalPattern(room5, seat);
    const rank=getXRank(room5, seat);
    const X=getSeatX(room5, seat);
    const rule=(LOCAL_RULES[seat]||[]).find(r=>r.local===local && r.ranks.has(rank));
    if(!rule) continue;
    hits.push({
      seat,
      X,
      rank,
      local,
      level:rule.tag,
      reason:`${seat}号看${seat===3?'BCD':seat===4?'CDE':'ADE'}`
    });
  }
  if(!hits.length) return {ok:false,reason:'局部结构未命中'};
  const priority={3:1,4:2,5:3,6:4};
  hits.sort((a,b)=>(priority[a.seat]||9)-(priority[b.seat]||9));
  return {
    ok:true,
    hits,
    main:hits[0],
    others:hits.slice(1)
  };
}

function formatSeats(hits){ return hits.map(h=>`${h.seat}`).join('/'); }
function formatXs(hits){ return hits.map(h=>`${h.X}`).join('/'); }
function formatMs(hits){ return hits.map(h=>`${h.M}`).join('/'); }
function formatWrAvg(hits){
  if(!hits.length) return {wr:'—',avg:'—'};
  if(hits.length===1) return {wr:hits[0].wr,avg:hits[0].avg};
  return {wr:`${hits[0].wr}/${hits[1].wr}`,avg:`${hits[0].avg}/${hits[1].avg}`};
}
function buildModelCard({label,seatsText,pattern,row2Text,note,wr,avg},rank=1){
  const cls=rank<=6?`r${rank}`:'';
  const div=document.createElement('div');
  div.className=`hit ${cls}`;
  div.innerHTML=`
    <div class="hit-lbl">${label}</div>
    <div class="hit-seat">${seatsText}</div>
    <div class="hit-body">
      <div class="row1">${pattern}</div>
      <div class="row2">${row2Text}</div>
      <div class="row3">${note}</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">${wr}</div>
      <div class="hit-avg">${avg}</div>
    </div>`;
  return div;
}

function render(room5){
  const structRes=getStructureModel(room5);
  const strongRes=getStructureStrongXModel(room5);
  const mRes=getMModel(room5);
  const abRes=getABModel(room5);
  const ranzaiRes=getRanzaiModel(room5);
  const logicRes=getHardLogicModel(room5);

  resultEl.style.display='none';
  ranzaiResultEl.style.display='none';
  logicResultEl.style.display='none';
  skipEl.style.display='none';

  hitListEl.innerHTML='';
  ranzaiHitListEl.innerHTML='';
  logicHitListEl.innerHTML='';

  let shown=0, ranzaiShown=0, logicShown=0;

  if(structRes.ok){
    const stat=formatWrAvg(structRes.hits);
    hitListEl.appendChild(buildModelCard({
      label:'结构',
      seatsText:formatSeats(structRes.hits),
      pattern:`结构=${structRes.pattern}`,
      row2Text:`位=${formatSeats(structRes.hits)}  X=${formatXs(structRes.hits)}`,
      note:'72050结构命中',
      wr:stat.wr,
      avg:stat.avg
    },1));
    shown++;
  }
  if(strongRes.ok){
    const stat=formatWrAvg(strongRes.hits);
    hitListEl.appendChild(buildModelCard({
      label:'结构+X',
      seatsText:formatSeats(strongRes.hits),
      pattern:`结构=${strongRes.pattern}`,
      row2Text:`位=${formatSeats(strongRes.hits)}  X=${formatXs(strongRes.hits)}`,
      note:'结构后再命中强X',
      wr:stat.wr,
      avg:stat.avg
    },2));
    shown++;
  }
  if(mRes.ok){
    const stat=formatWrAvg(mRes.hits);
    hitListEl.appendChild(buildModelCard({
      label:'M模型',
      seatsText:formatSeats(mRes.hits),
      pattern:`结构=${mRes.pattern}`,
      row2Text:`位=${formatSeats(mRes.hits)}  M=${formatMs(mRes.hits)}`,
      note:'独立M结果',
      wr:stat.wr,
      avg:stat.avg
    },3));
    shown++;
  }
  if(abRes.ok){
    const stat=formatWrAvg(abRes.hits);
    hitListEl.appendChild(buildModelCard({
      label:'AB结构',
      seatsText:formatSeats(abRes.hits),
      pattern:`AB=${abRes.abPat}`,
      row2Text:`位=${formatSeats(abRes.hits)}  ${abRes.hits.map(h=>h.tag).join('/')}`,
      note:`${abRes.hits.map(h=>`${h.n}验证`).join('  ')}`,
      wr:stat.wr,
      avg:stat.avg
    },4));
    shown++;
  }

  if(ranzaiRes.ok){
    const main=ranzaiRes.main;
    const others=ranzaiRes.others.length
      ? `候选位=${ranzaiRes.others.map(h=>`${h.seat}号`).join('/')}`
      : '无候选位';
    ranzaiHitListEl.appendChild(buildModelCard({
      label:'然仔',
      seatsText:`${main.seat}`,
      pattern:`局部=${main.local}`,
      row2Text:`推荐位=${main.seat}号  X=${main.X}  排名第${main.rank}名`,
      note:`${main.tag}｜${others}`,
      wr:'v1.0',
      avg:'主推荐'
    },5));
    ranzaiShown++;
  }

  if(logicRes.ok){
    const main=logicRes.main;
    const others=logicRes.others.length
      ? `候选位=${logicRes.others.map(h=>`${h.seat}号`).join('/')}`
      : '无候选位';
    logicHitListEl.appendChild(buildModelCard({
      label:'选位',
      seatsText:`${main.seat}`,
      pattern:`局部=${main.local}`,
      row2Text:`主推荐=${main.seat}号  X=${main.X}  排名第${main.rank}名`,
      note:`${main.level}｜${main.reason}｜${others}`,
      wr:'v1.0',
      avg:'主输出'
    },6));
    logicShown++;
  }

  const pp=getParityPattern(room5), ab=getABPattern(room5);
  if(shown===0 && ranzaiShown===0 && logicShown===0){
    resultHdr.textContent=`${pp} / AB:${ab}　全部模型未命中`;
    skipEl.style.display='block';
    return [];
  }

  if(shown>0){
    resultHdr.textContent=`${pp} / AB:${ab}　八戒四模型，共命中 ${shown} 项`;
    resultEl.style.display='block';
  }
  if(ranzaiShown>0){
    ranzaiResultHdr.textContent='— 然仔账号独立命中 —';
    ranzaiResultEl.style.display='block';
  }
  if(logicShown>0){
    logicResultHdr.textContent='— 然仔推荐位子输出 —';
    logicResultEl.style.display='block';
  }

  const seats=[];
  if(structRes.ok) seats.push(...structRes.hits.map(h=>h.seat));
  if(strongRes.ok) seats.push(...strongRes.hits.map(h=>h.seat));
  if(mRes.ok) seats.push(...mRes.hits.map(h=>h.seat));
  if(abRes.ok) seats.push(...abRes.hits.map(h=>h.seat));
  if(ranzaiRes.ok) seats.push(mainSeatFrom(ranzaiRes));
  if(logicRes.ok) seats.push(mainSeatFrom(logicRes));
  return [...new Set(seats)].filter(Boolean).slice(0,5);
}

function mainSeatFrom(res){
  return res && res.main ? res.main.seat : null;
}

function run(){
  const raw=roomEl.value.trim().replace(/\s+/g,'');
  if(!/^\d{5}$/.test(raw)){
    msgEl.textContent='请输入正确的5位数字';
    return;
  }
  msgEl.textContent='';
  const seats=render(raw);
  pushHistory(raw,seats);
  setTimeout(()=>{ roomEl.value=''; roomEl.focus(); },180);
}
function loadHist(){ try{return JSON.parse(localStorage.getItem(HISTORY_KEY))||[]}catch{return[]} }
function saveHist(items){ localStorage.setItem(HISTORY_KEY,JSON.stringify(items.slice(0,HISTORY_LIMIT))); }
function renderHist(){
  const items=loadHist(); histListEl.innerHTML='';
  if(!items.length){
    histListEl.innerHTML=`<div class="histItem"><div class="histMain" style="color:rgba(255,255,255,.2)">暂无记录</div></div>`;
    return;
  }
  items.forEach(item=>{
    const div=document.createElement('div');
    div.className='histItem';
    const res=item.seats.length ? item.seats.map(s=>`${s}号`).join(' / ') : '跳';
    div.innerHTML=`<div class="histTop"><span>房号 <span class="pill">${item.room}</span></span><span>${item.time}</span></div><div class="histMain">${item.pattern||''} → ${res}</div>`;
    histListEl.appendChild(div);
  });
}
function pushHistory(room,seats){
  const items=loadHist();
  items.unshift({
    room,
    seats,
    pattern:getParityPattern(room),
    time:new Date().toLocaleString('zh-CN',{hour12:false})
  });
  saveHist(items);
  renderHist();
}
goEl.addEventListener('click',run);
roomEl.addEventListener('keydown',e=>{ if(e.key==='Enter') run(); });
clearBtnEl.addEventListener('click',()=>{ localStorage.removeItem(HISTORY_KEY); renderHist(); });
if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
renderHist();
roomEl.focus();
</script>
</body>
</html>
