<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>5130004｜然仔 v24 全位能量模型</title>

  <style>
    :root {
      --bg: #f7f3ec;
      --card: #fffaf2;
      --text: #2b2118;
      --muted: #8a7664;
      --red: #d94b3d;
      --green: #1f9d67;
      --border: #eadccc;
      --shadow: 0 14px 36px rgba(70, 48, 28, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      font-family: -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei";
      padding: 20px;
      color: var(--text);
    }

    .wrap { max-width: 860px; margin: auto; }

    .title {
      text-align: center;
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .panel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    input {
      width: 100%;
      font-size: 26px;
      text-align: center;
      padding: 10px;
      border-radius: 12px;
      border: 2px solid #e7d2c0;
      font-weight: 900;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: var(--red);
      color: white;
      font-weight: 900;
      font-size: 16px;
    }

    .pick {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
      background: #fff8ef;
    }

    .main { border: 2px solid var(--red); }

    .muted { color: var(--muted); font-size: 13px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .stat {
      background: #fff;
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 12px;
      text-align: center;
    }

    .v { font-size: 18px; font-weight: 900; }
  </style>
</head>

<body>
<div class="wrap">

  <div class="title">5130004｜v24 全位能量分布模型</div>

  <div class="panel">
    <input id="room" placeholder="输入5位房号" maxlength="5">
    <button onclick="run()">生成 v24 推荐</button>

    <div id="out"></div>
  </div>

</div>

<script>

function count(arr){
  const m={};
  arr.forEach(v=>m[v]=(m[v]||0)+1);
  return m;
}

function seatData(d, idx){
  const x=d[idx];
  const others=d.filter((_,i)=>i!==idx);

  const diffs=others.map(v=>Math.abs(x-v));
  const sums=others.map(v=>x+v).filter(v=>v<=9);

  const diffC=count(diffs);
  const sumC=count(sums);

  const diffCount=diffs.length;
  const sumCount=sums.length;

  const hasRepeat = new Set(d).size<d.length;
  const oneWay = sums.length===0;

  return {
    x,
    diffCount,
    sumCount,
    hasRepeat,
    oneWay,
    diffC,
    sumC
  };
}

/* =========================
   v24 核心：能量评分
========================= */
function energy(s){

  let score=0;

  score += s.diffCount*2;
  score += s.sumCount*1;

  if(s.hasRepeat) score += 2;
  if(s.oneWay) score += 1;

  // 稳定奖励
  if(s.diffCount>=3) score += 2;
  if(s.sumCount>=3) score += 1;

  return score;
}

function run(){

  const r=document.getElementById("room").value.trim();
  if(r.length!==5){
    alert("请输入5位房号");
    return;
  }

  const d=r.split("").map(Number);

  const seats=[];

  for(let i=0;i<5;i++){
    const s=seatData(d,i);
    seats.push({
      seat:i+1,
      energy:energy(s),
      raw:s
    });
  }

  // 排序
  seats.sort((a,b)=>b.energy-a.energy);

  const top3=seats.slice(0,3);

  let html="";

  top3.forEach((s,i)=>{
    html+=`
      <div class="pick ${i===0?'main':''}">
        <b>${i===0?'🔥主推':'⚡副推'}</b>｜${s.seat}号
        <div class="muted">能量值：${s.energy}</div>
      </div>
    `;
  });

  const best = top3[0];

  if(best.energy<=3){
    html = `<div class="pick"><b>不命中</b></div>`;
  }

  document.getElementById("out").innerHTML=html;
}

</script>

</body>
</html>
