<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>然仔｜v4.2闭环一致系统</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC";
  background:radial-gradient(circle at 20% 20%, #1b1f3a, #0b0b0f 60%);
  color:#fff;
}

.container{
  max-width:520px;
  margin:0 auto;
  padding:18px;
}

.title{
  font-size:20px;
  font-weight:900;
  margin-bottom:10px;
}

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:14px;
  margin-top:12px;
}

input{
  width:100%;
  padding:14px;
  font-size:18px;
  text-align:center;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:#fff;
  font-weight:700;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#00d4ff,#7a5cff);
  color:#fff;
  font-weight:800;
}

.good{color:#00e5ff;font-weight:800}
.mid{color:#ffb020;font-weight:800}

.seatBox{
  display:flex;
  gap:8px;
}

.seat{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  font-size:20px;
  font-weight:900;
  background:rgba(255,255,255,0.08);
}

.main{
  background:#00e5ff;
  color:#000;
}

.sub{
  background:#ffb020;
  color:#000;
}

.small{
  font-size:12px;
  opacity:0.75;
  line-height:1.5;
}
</style>
</head>

<body>
<div class="container">

<div class="title">🔥 然仔｜v4.2闭环一致系统</div>

<input id="room" placeholder="输入5位房号"/>
<button onclick="run()">开始分析</button>

<div id="out"></div>

</div>

<script>

//////////////////////////////////////////////////////
// 🧠 统一规则（唯一核心）
//////////////////////////////////////////////////////

function detect(r){

  let d=r.split("").map(Number);

  let hitSet=new Set();

  for(let i=0;i<5;i++){
    for(let j=i+1;j<5;j++){

      let diff=Math.abs(d[i]-d[j]);
      let sum=d[i]+d[j];

      // 核心组合（严格固定）
      if(diff===6) hitSet.add("A2");
      if(diff===5) hitSet.add("B2");
      if(sum===7) hitSet.add("A1");

      if(diff===1) hitSet.add("N1");
      if(diff===2) hitSet.add("N3");
      if(diff===4) hitSet.add("N4");
      if(diff===5) hitSet.add("N5");
      if(sum===9) hitSet.add("N2");
      if(sum===9 && diff===4) hitSet.add("N6");

    }
  }

  return [...hitSet];
}

//////////////////////////////////////////////////////
// 🧠 唯一决策（不叠加）
//////////////////////////////////////////////////////

function decide(hits){

  // 🔥 优先级锁死
  const priority=[
    "B2","A2","A1",
    "N3","N4","N5",
    "N2","N1","N6"
  ];

  let main=null;

  for(let p of priority){
    if(hits.includes(p)){
      main=p;
      break;
    }
  }

  // 🎯 主副位映射（唯一输出）
  const map={
    B2:{main:5,sub:3},
    A2:{main:2,sub:5},
    A1:{main:3,sub:2},
    N3:{main:2,sub:3},
    N4:{main:2,sub:0},
    N5:{main:2,sub:4},
    N2:{main:2,sub:4},
    N1:{main:1,sub:3},
    N6:{main:3,sub:0}
  };

  return {
    combo:main,
    res:map[main]||{main:0,sub:0}
  };
}

//////////////////////////////////////////////////////
// 🧠 主函数
//////////////////////////////////////////////////////

function run(){

  let r=document.getElementById("room").value.trim();
  if(r.length!==5)return;

  let hits=detect(r);
  let out=decide(hits);

  let html="";

  html+=`<div class="card">
    <div class="good">🔥 主推位</div>
    <div class="seatBox">
      <div class="seat main">${out.res.main || "无"}</div>
    </div>
  </div>`;

  html+=`<div class="card">
    <div class="mid">⚡ 副推位</div>
    <div class="seatBox">
      <div class="seat sub">${out.res.sub || "无"}</div>
    </div>
  </div>`;

  html+=`<div class="card small">
    ✔ v4.2闭环一致模型<br>
    ✔ 命中组合：${out.combo || "无"}<br>
    ✔ 输出固定：主推 + 副推<br>
    ✔ 无评分 / 无叠加 / 无偏置2号
  </div>`;

  document.getElementById("out").innerHTML=html;
}

</script>
</body>
</html>
