<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>然仔｜v9终极锁死系统</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC";
}

.container{
  max-width:520px;
  margin:0 auto;
  padding:20px;
  text-align:center;
}

input{
  width:70%;
  padding:14px;
  font-size:18px;
  text-align:center;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:#fff;
}

button{
  margin-top:18px;
  width:100px;
  height:100px;
  border-radius:50%;
  border:none;
  background:radial-gradient(circle,#ff4d4d,#8b0000);
  color:#fff;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 0 25px rgba(255,0,0,0.4);
}

.card{
  margin-top:20px;
  padding:14px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<h3>🔥 然仔｜v9终极锁死系统</h3>

<input id="room" placeholder="输入5位房号"/><br/>

<button onclick="run()">开干</button>

<div id="out"></div>

</div>

<script>

//////////////////////////////////////////////////////
// 🧠 Step1：组合识别
//////////////////////////////////////////////////////

function detect(r){

  let d = r.split("").map(Number);

  let strong=[], mid=[], weak=[];

  for(let i=0;i<5;i++){
    for(let j=i+1;j<5;j++){

      let diff=Math.abs(d[i]-d[j]);
      let sum=d[i]+d[j];

      if(diff===6) strong.push("A2");
      if(diff===5 && sum===9) strong.push("B2");

      if(sum===7) mid.push("A1");
      if(sum===9) mid.push("N2");
      if(diff===2) mid.push("N3");

      if(diff===1) weak.push("N1");
      if(diff===4) weak.push("N4");
      if(diff===5) weak.push("N5");

    }
  }

  return {
    strong:[...new Set(strong)],
    mid:[...new Set(mid)],
    weak:[...new Set(weak)]
  };
}

//////////////////////////////////////////////////////
// 🧠 Step2：唯一决策
//////////////////////////////////////////////////////

function decide(s,m,w){

  if(s.includes("B2")) return "B2";
  if(s.includes("A2")) return "A2";

  if(m.includes("A1")) return "A1";
  if(m.includes("N2")) return "N2";
  if(m.includes("N3")) return "N3";

  return "WEAK";
}

//////////////////////////////////////////////////////
// 🧠 Step3：确定性位子系统（锁死）
//////////////////////////////////////////////////////

function getSeat(room, combo){

  const hash = parseInt(room) % 6;

  const map = {
    B2:[5,3],
    A2:[2,5],
    A1:[3,2],
    N2:[2,4],
    N3:[3,1],
    WEAK:[1,0]
  };

  let arr = map[combo] || [0,0];

  let i = hash % arr.length;

  return {
    main:arr[i],
    sub:arr[(i+1)%arr.length]
  };
}

//////////////////////////////////////////////////////
// 🧠 主函数
//////////////////////////////////////////////////////

function run(){

  let r=document.getElementById("room").value.trim();
  if(r.length!==5)return;

  let res=detect(r);
  let combo=decide(res.strong,res.mid,res.weak);
  let seat=getSeat(r,combo);

  document.getElementById("out").innerHTML=`
    <div class="card">
      🔥 主推：${seat.main}<br/>
      ⚡ 副推：${seat.sub}<br/>
      📦 组合：${combo}<br/>
      🧠 状态：v9锁死版
    </div>
  `;
}

</script>

</body>
</html>
