<script>
// ══════════════════════════════════════════════════════
//  三元组规则：座位 + X + K（已去掉A）
//  K = S - X
// ══════════════════════════════════════════════════════
const RULES = {
  1: {
    3: { 18: true },
    8: { 8: true, 9: true, 10: true, 15: true, 19: true },
    9: { 7: true, 14: true, 26: true, 28: true },
  },
  2: {
    2: { 16: true, 17: true },
    3: { 10: true },
    4: { 18: true, 27: true },
    6: { 12: true },
    7: { 17: true },
    8: { 15: true, 20: true, 24: true },
  },
  3: {
    2: { 3: true, 23: true },
    5: { 14: true },
    6: { 11: true, 22: true },
    7: { 10: true, 18: true, 19: true, 21: true },
    8: { 17: true, 20: true, 26: true },
  },
  4: {
    0: { 12: true, 17: true, 20: true, 23: true },
    2: { 15: true, 22: true },
    3: { 12: true },
    4: { 12: true, 19: true },
    5: { 17: true },
    6: { 14: true, 20: true, 24: true },
    7: { 15: true },
    8: { 21: true, 30: true },
  },
  5: {
    0: { 15: true, 16: true, 19: true, 22: true },
    1: { 19: true, 32: true, 34: true },
    2: { 13: true, 27: true },
    3: { 11: true, 15: true, 17: true, 18: true },
    4: { 21: true },
    5: { 14: true, 21: true, 22: true },
    6: { 22: true },
    7: { 18: true },
    8: { 22: true },
    9: { 13: true, 17: true, 22: true, 24: true },
  },
  6: {
    0: { 13: true },
    1: { 9: true, 17: true, 24: true },
    2: { 23: true },
    4: { 10: true },
    5: { 21: true },
    6: { 30: true },
    8: { 11: true, 22: true, 31: true },
    9: { 16: true, 26: true },
  },
};

// 座位优先级
const PRIORITY = {5:1, 4:2, 6:3, 2:4, 3:5, 1:6};

function getS(room){
  return room.split('').reduce((a,c)=>a+parseInt(c),0);
}
function getX(digits, seat){
  return (seat >= 5) ? digits[4] : digits[seat-1];
}

// ✅ 核心逻辑（已删除A）
function analyze(room5){
  const digits = room5.split('').map(Number);
  const S = getS(room5);
  const hits = [];

  for(let seat = 1; seat <= 6; seat++){
    const X = getX(digits, seat);
    const K = S - X;

    const seatRules = RULES[seat];
    if(!seatRules) continue;

    const xRules = seatRules[X];
    if(!xRules) continue;

    if(!xRules[K]) continue;

    hits.push({seat, X, K, S});
  }

  hits.sort((a,b)=>(PRIORITY[a.seat]||9)-(PRIORITY[b.seat]||9));
  return {hits, S};
}
</script>
