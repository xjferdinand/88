<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#b00000"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="然仔66660高进房">
  <title>然仔66660高进房差值链</title>
  <style>
    :root{
      --bg:#0b0b0f;
      --card:#11111a;
      --line:rgba(255,255,255,.10);
      --text:#f5f5f7;
      --muted:rgba(255,255,255,.50);
      --red:#ff2d2d;
    }
    *{box-sizing:border-box;margin:0;padding:0;}

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(800px 400px at 50% 15%,rgba(255,45,45,.20),transparent 60%),
        radial-gradient(900px 500px at 50% 110%,rgba(176,0,0,.25),transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
      padding:12px;
    }

    .app{
      width:min(430px,100%);
    }

    .title{
      font-size:16px;
      font-weight:900;
      margin:0 0 12px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .title::before{
      content:"";
      flex-shrink:0;
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--red);
      box-shadow:0 0 12px rgba(255,45,45,.9);
    }
    .version{
      font-size:10px;
      color:rgba(255,45,45,.6);
      margin-left:4px;
      font-weight:400;
    }

    .panel{
      background:linear-gradient(160deg,rgba(255,45,45,.07),transparent 55%),var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      box-shadow:0 20px 60px rgba(0,0,0,.55);
    }

    input{
      width:100%;
      padding:12px 14px;
      font-size:22px;
      letter-spacing:5px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.40);
      color:var(--text);
      outline:none;
      text-align:center;
      font-weight:700;
    }
    input:focus{
      border-color:rgba(255,45,45,.65);
      box-shadow:0 0 0 3px rgba(255,45,45,.12);
    }
    input::placeholder{
      font-size:13px;
      letter-spacing:1px;
      font-weight:400;
    }

    .btn-wrap{
      display:flex;
      justify-content:center;
      margin:14px 0 8px;
    }
    .btn-circle{
      width:66px;
      height:66px;
      border-radius:50%;
      border:2px solid rgba(255,45,45,.55);
      background:radial-gradient(circle at 38% 32%,rgba(255,90,90,.95),rgba(155,0,0,.95));
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:1px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 18px rgba(255,45,45,.40),inset 0 1px 0 rgba(255,255,255,.18);
      transition:transform .1s,box-shadow .1s;
    }
    .btn-circle:active{transform:scale(.92);}

    .msg{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      min-height:14px;
      margin-bottom:8px;
    }

    .result{
      display:none;
      margin-top:4px;
    }
    .result-hdr{
      text-align:center;
      font-size:10px;
      color:var(--muted);
      margin-bottom:8px;
      letter-spacing:.3px;
    }
    .hit-list{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .hit{
      display:grid;
      grid-template-columns:auto 52px 1fr auto;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(0,0,0,.22);
    }
    .hit.r1{border-color:rgba(255,45,45,.50);background:rgba(255,45,45,.10);}
    .hit.r2{border-color:rgba(255,140,0,.28);}
    .hit.r3{border-color:rgba(255,255,255,.10);}

    .hit-lbl{
      font-size:9px;
      font-weight:900;
      padding:2px 6px;
      border-radius:999px;
      background:rgba(255,45,45,.20);
      color:#ff8080;
      white-space:nowrap;
      letter-spacing:.2px;
    }
    .hit.r1 .hit-lbl{
      background:rgba(255,45,45,.38);
      color:#ff9090;
    }

    .hit-seat{
      font-size:21px;
      font-weight:1000;
      color:var(--red);
      text-shadow:0 0 12px rgba(255,45,45,.35);
      line-height:1.05;
      text-align:center;
      white-space:nowrap;
    }

    .hit-body{
      line-height:1.4;
      min-width:0;
    }
    .hit-body .row1{
      font-size:11px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hit-body .row2{
      font-size:10px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hit-body .row3{
      font-size:9px;
      color:rgba(255,255,255,.30);
      margin-top:1px;
      line-height:1.25;
    }

    .hit-right{
      text-align:right;
      min-width:42px;
    }
    .hit-wr{
      font-size:11px;
      font-weight:900;
      color:rgba(80,255,140,.85);
    }
    .hit-avg{
      font-size:9px;
      color:rgba(255,255,255,.35);
      margin-top:1px;
    }

    .skip{
      display:none;
      text-align:center;
      padding:18px;
      font-size:30px;
      font-weight:1000;
      color:rgba(255,255,255,.18);
      letter-spacing:4px;
    }

    .history{
      margin-top:12px;
      padding:10px 11px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
    }
    .histHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:7px;
    }
    .histTitle{
      font-size:11px;
      font-weight:800;
      color:var(--muted);
    }
    .clearBtn{
      font-size:10px;
      padding:4px 8px;
      border-radius:7px;
      cursor:pointer;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      color:rgba(255,100,100,.85);
    }
    .histList{
      display:flex;
      flex-direction:column;
      gap:5px;
      max-height:180px;
      overflow:auto;
    }
    .histItem{
      border:1px solid rgba(255,255,255,.05);
      border-radius:9px;
      padding:7px 9px;
      background:rgba(0,0,0,.14);
    }
    .histTop{
      display:flex;
      justify-content:space-between;
      font-size:10px;
      color:rgba(255,255,255,.35);
      margin-bottom:2px;
    }
    .histMain{
      font-size:11px;
      color:rgba(255,255,255,.60);
      line-height:1.35;
    }
    .pill{
      display:inline-block;
      padding:1px 6px;
      border-radius:999px;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      font-weight:800;
      color:var(--red);
      margin-right:3px;
    }

    .tiny{
      margin-top:12px;
      padding-top:10px;
      border-top:1px solid var(--line);
      font-size:10px;
      color:rgba(255,255,255,.28);
      line-height:1.6;
      white-space:pre-line;
    }

    @media (max-width: 430px){
      body{padding:10px;}
      .app{width:100%;}
      .panel{padding:10px;border-radius:15px;}
      .hit{
        grid-template-columns:auto 46px 1fr auto;
        gap:6px;
        padding:7px 8px;
      }
      .hit-seat{font-size:19px;}
      .result-hdr{font-size:10px;}
      .histMain{font-size:10px;}
      .tiny{font-size:9px;}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="title">然仔66660<span class="version">高进房差值链 v1.2.1</span></div>
  <div class="panel">

    <input id="room" inputmode="numeric" placeholder="输入5位房号" maxlength="5"/>

    <div class="btn-wrap">
      <button class="btn-circle" id="go">开干</button>
    </div>

    <div class="msg" id="msg"></div>

    <div class="result" id="result">
      <div class="result-hdr" id="resultHdr">— 然仔66660高进房结果 —</div>
      <div class="hit-list" id="hitList"></div>
    </div>
    <div class="skip" id="skip">跳</div>

    <div class="history">
      <div class="histHead">
        <span class="histTitle">最近记录</span>
        <button class="clearBtn" id="clearBtn">清空</button>
      </div>
      <div class="histList" id="histList"></div>
    </div>

    <div class="tiny">
【然仔·66660 高进房差值链模型 v1.2.1】
D1=A-B，D2=B-C，D3=C-D，D4=D-E，D5=E-A

强进优先：
5号 > 6号 > 3号 > 4号

观察优先：
6号 > 3号 > 5号 > 4号

v1.2.1新增：
6号观察若 D4<=-4 且 D3>0，过滤。

显示规则：
强进 = 正常主推
观察 = 小注观察
高波降级 = 谨慎小注
无命中 = 跳

本模型是高进房试跑版，不是重注模型。
    </div>

  </div>
</div>

<script>
const HISTORY_KEY   = 'ranzai_66660_high_entry_diff_v121';
const HISTORY_LIMIT = 30;

const roomEl     = document.getElementById('room');
const goEl       = document.getElementById('go');
const msgEl      = document.getElementById('msg');
const resultEl   = document.getElementById('result');
const resultHdr  = document.getElementById('resultHdr');
const hitListEl  = document.getElementById('hitList');
const skipEl     = document.getElementById('skip');
const histListEl = document.getElementById('histList');
const clearBtnEl = document.getElementById('clearBtn');

function getDigits(room){
  return room.split('').map(Number);
}

function getDiffData(room){
  const [A,B,C,D,E] = getDigits(room);
  const roomSum = A + B + C + D + E;

  const D1 = A - B;
  const D2 = B - C;
  const D3 = C - D;
  const D4 = D - E;
  const D5 = E - A;

  return { A,B,C,D,E,roomSum,D1,D2,D3,D4,D5 };
}

function evaluateRanZai66660(room){
  if(!/^\d{5}$/.test(room)){
    return {
      ok:false,
      reason:'请输入正确的5位数字'
    };
  }

  const d = getDiffData(room);
  const {D1,D2,D3,D4,D5} = d;

  const candidates = [];

  function addCandidate(seat, valid, label, level, wr, avg, note, strength){
    candidates.push({ seat, valid, label, level, wr, avg, note, strength });
  }

  // ===============================
  // 5号强进 + 观察
  // ===============================
  let hit5Strong = false;
  let hit5Observe = false;
  let reason5 = '';

  if(D3 === 5 && (D4 === -4 || D4 === -6)){
    hit5Strong = true;
    reason5 = `5号强进：D3=5 且 D4=${D4}`;
  }

  if(D3 <= -4 && D4 === 1){
    hit5Strong = true;
    reason5 = `5号强进：D3≤-4 且 D4=1`;
  }

  if(!hit5Strong){
    if(D3 === 5 && D4 < 0){
      hit5Observe = true;
      reason5 = `5号观察：D3=5 且 D4<0`;
    }

    if(D3 <= -3 && D4 === 1){
      hit5Observe = true;
      reason5 = `5号观察：D3≤-3 且 D4=1`;
    }

    if(D3 <= -4 && D4 > 0){
      hit5Observe = true;
      reason5 = `5号观察：D3≤-4 且 D4>0`;
    }
  }

  if(hit5Strong || hit5Observe){
    if(D5 === 0){
      addCandidate(
        5,
        false,
        '5号过滤',
        '过滤',
        '过滤',
        `D5=0`,
        `${reason5}；但D5=0，5号首尾闭死，不做主推。`,
        0
      );
    }else if(D4 <= -8){
      addCandidate(
        5,
        false,
        '5号过滤',
        '过滤',
        '过滤',
        `D4=${D4}`,
        `${reason5}；但D4≤-8，尾部断裂过大，不做主推。`,
        0
      );
    }else if(D4 >= 5){
      addCandidate(
        5,
        false,
        '5号过滤',
        '过滤',
        '过滤',
        `D4=${D4}`,
        `${reason5}；但D4≥5，E被D强压，不做主推。`,
        0
      );
    }else{
      addCandidate(
        5,
        true,
        hit5Strong ? '5号强进' : '5号观察',
        hit5Strong ? (D5 > 0 ? 'H1强信号' : '普通信号') : '观察进',
        hit5Strong ? (D5 > 0 ? '强' : '进') : '观察',
        `D5=${D5}`,
        `${reason5}；D5=${D5}，未触发5号过滤。`,
        hit5Strong ? 100 : 50
      );
    }
  }

  // ===============================
  // 6号强进 + 观察
  // ===============================
  let hit6Strong = false;
  let hit6Observe = false;
  let reason6 = '';

  if(D4 === 0){
    hit6Strong = true;
    reason6 = '6号强进：D4=0，尾部D/E稳定';
  }

  if(D4 < 0 && D1 > 0 && Math.abs(D1) <= 4 && Math.abs(D4) <= 3 && D3 >= 0){
    hit6Strong = true;
    reason6 = '6号强进：D4<0 且 D1>0 且 |D1|≤4 且 |D4|≤3 且 D3≥0';
  }

  if(D1 === -2 && D4 === -4){
    hit6Strong = true;
    reason6 = '6号强进：D1=-2 且 D4=-4';
  }

  if(!hit6Strong){
    if(D4 < 0 && Math.abs(D4) <= 4){
      hit6Observe = true;
      reason6 = '6号观察：D4<0 且 |D4|≤4';
    }

    if(D1 > 0 && D3 >= 0){
      hit6Observe = true;
      reason6 = '6号观察：D1>0 且 D3≥0';
    }

    if(D4 === 1 && D5 > 0){
      hit6Observe = true;
      reason6 = '6号观察：D4=1 且 D5>0';
    }
  }

  if(hit6Strong || hit6Observe){
    if(D4 >= 5){
      addCandidate(
        6,
        false,
        '6号过滤',
        '过滤',
        '过滤',
        `D4=${D4}`,
        `${reason6}；但D4≥5，尾部被强压，不做主推。`,
        0
      );
    }else if(D1 <= -6){
      addCandidate(
        6,
        false,
        '6号过滤',
        '过滤',
        '过滤',
        `D1=${D1}`,
        `${reason6}；但D1≤-6，前端启动极弱，不做主推。`,
        0
      );
    }else if(D5 <= -5){
      addCandidate(
        6,
        false,
        '6号过滤',
        '过滤',
        '过滤',
        `D5=${D5}`,
        `${reason6}；但D5≤-5，首尾闭环过弱，不做主推。`,
        0
      );
    }else if(hit6Observe && D4 <= -4 && D3 > 0){
      addCandidate(
        6,
        false,
        '6号观察过滤',
        '过滤',
        '过滤',
        `D3=${D3}/D4=${D4}`,
        `${reason6}；但这是6号观察层，且D4≤-4、D3>0，中轴冲尾，高波过滤。`,
        0
      );
    }else{
      let level = hit6Strong ? '普通信号' : '观察进';
      let wr = hit6Strong ? '进' : '观察';
      let d5Note = '';

      if(D5 >= 0){
        level = hit6Strong ? 'H1强信号' : '观察加强';
        wr = hit6Strong ? '强' : '观察';
        d5Note = `D5=${D5}，6号加强。`;
      }else if(D5 === -1 || D5 === -2){
        d5Note = `D5=${D5}，6号正常允许。`;
      }else{
        level = '高波降级';
        wr = '高波';
        d5Note = `D5=${D5}，6号高波降级。`;
      }

      addCandidate(
        6,
        true,
        hit6Strong ? '6号强进' : '6号观察',
        level,
        wr,
        `D5=${D5}`,
        `${reason6}；${d5Note}`,
        hit6Strong ? 100 : 60
      );
    }
  }

  // ===============================
  // 3号强进 + 观察
  // ===============================
  let hit3Strong = false;
  let hit3Observe = false;
  let reason3 = '';

  if(D2 > 0 && D3 > 0 && D4 < 0){
    hit3Strong = true;
    reason3 = '3号强进：D2>0 且 D3>0 且 D4<0';
  }

  if(D2 < 0 && D3 >= 4 && D4 < 0 && Math.abs(D4) <= 6){
    hit3Strong = true;
    reason3 = '3号强进：D2<0 且 D3≥4 且 D4<0 且 |D4|≤6';
  }

  if(D2 < 0 && D3 === 0 && D4 > 0){
    hit3Strong = true;
    reason3 = '3号强进：D2<0 且 D3=0 且 D4>0';
  }

  if(!hit3Strong){
    if(D2 > 0 && D3 > 0){
      hit3Observe = true;
      reason3 = '3号观察：D2>0 且 D3>0';
    }

    if(D3 >= 4 && D4 < 0){
      hit3Observe = true;
      reason3 = '3号观察：D3≥4 且 D4<0';
    }

    if(D2 < 0 && D4 > 0){
      hit3Observe = true;
      reason3 = '3号观察：D2<0 且 D4>0';
    }
  }

  if(hit3Strong || hit3Observe){
    if(D4 <= -8){
      addCandidate(
        3,
        false,
        '3号过滤',
        '过滤',
        '过滤',
        `D4=${D4}`,
        `${reason3}；但D4≤-8，尾部断裂过大，不做主推。`,
        0
      );
    }else if(D2 > 0 && D3 < 0){
      addCandidate(
        3,
        false,
        '3号过滤',
        '过滤',
        '过滤',
        `D2=${D2}/D3=${D3}`,
        `${reason3}；但D2>0且D3<0，中轴反冲，不做主推。`,
        0
      );
    }else{
      addCandidate(
        3,
        true,
        hit3Strong ? '3号强进' : '3号观察',
        hit3Strong ? '普通信号' : '观察进',
        hit3Strong ? '进' : '观察',
        `D5=${D5}`,
        `${reason3}；D5=${D5}仅作解释项。`,
        hit3Strong ? 100 : 55
      );
    }
  }

  // ===============================
  // 4号强进 + 观察
  // ===============================
  let hit4Strong = false;
  let hit4Observe = false;
  let reason4 = '';

  if(D3 > 0 && D4 > 0){
    hit4Strong = true;
    reason4 = '4号强进：D3>0 且 D4>0';
  }

  if(D3 < 0 && D4 < 0){
    hit4Strong = true;
    reason4 = '4号强进：D3<0 且 D4<0';
  }

  if(!hit4Strong){
    if(D3 >= 0 && D4 >= 0 && !(D3 === 0 && D4 === 0)){
      hit4Observe = true;
      reason4 = '4号观察：D3/D4同向偏正，允许一项为0';
    }

    if(D3 <= 0 && D4 <= 0 && !(D3 === 0 && D4 === 0)){
      hit4Observe = true;
      reason4 = '4号观察：D3/D4同向偏负，允许一项为0';
    }
  }

  if(hit4Strong || hit4Observe){
    if(D3 === 0 && D4 === 0){
      addCandidate(
        4,
        false,
        '4号过滤',
        '过滤',
        '过滤',
        `D3/D4=0/0`,
        `${reason4}；但D3=0且D4=0，缺少动能，不做主推。`,
        0
      );
    }else if(D3 > 0 && D4 < 0){
      addCandidate(
        4,
        false,
        '4号过滤',
        '过滤',
        '过滤',
        `D3=${D3}/D4=${D4}`,
        `${reason4}；但D3>0且D4<0，一正一负反冲，不做主推。`,
        0
      );
    }else if(D3 < 0 && D4 > 0){
      addCandidate(
        4,
        false,
        '4号过滤',
        '过滤',
        '过滤',
        `D3=${D3}/D4=${D4}`,
        `${reason4}；但D3<0且D4>0，一负一正反冲，不做主推。`,
        0
      );
    }else{
      addCandidate(
        4,
        true,
        hit4Strong ? '4号强进' : '4号观察',
        hit4Strong ? '低权重补位' : '观察补位',
        hit4Strong ? '补' : '观察',
        `D5=${D5}`,
        `${reason4}；4号整体高波，D5=${D5}仅作解释项。`,
        hit4Strong ? 80 : 40
      );
    }
  }

  // ===============================
  // 主推优先级
  // 强进优先：5 > 6 > 3 > 4
  // 观察优先：6 > 3 > 5 > 4
  // ===============================
  const validCandidates = candidates.filter(x => x.valid);

  const strongPriority = [5, 6, 3, 4];
  const observePriority = [6, 3, 5, 4];

  let main = null;

  for(const s of strongPriority){
    const found = validCandidates.find(x => x.seat === s && x.strength >= 80);
    if(found){
      main = found;
      break;
    }
  }

  if(!main){
    for(const s of observePriority){
      const found = validCandidates.find(x => x.seat === s && x.strength < 80);
      if(found){
        main = found;
        break;
      }
    }
  }

  return {
    ok:true,
    room,
    ...d,
    candidates,
    main
  };
}

function buildModelCard(hit, data, rank=1){
  const cls = rank <= 3 ? `r${rank}` : '';
  const div = document.createElement('div');
  div.className = `hit ${cls}`;
  div.innerHTML = `
    <div class="hit-lbl">${hit.label}</div>
    <div class="hit-seat">${hit.seat}</div>
    <div class="hit-body">
      <div class="row1">D1/D2/D3/D4/D5=${data.D1}/${data.D2}/${data.D3}/${data.D4}/${data.D5}</div>
      <div class="row2">${hit.level}</div>
      <div class="row3">${hit.note}</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">${hit.wr}</div>
      <div class="hit-avg">${hit.avg}</div>
    </div>
  `;
  return div;
}

function render(room5){
  const data = evaluateRanZai66660(room5);

  resultEl.style.display = 'none';
  skipEl.style.display   = 'none';
  hitListEl.innerHTML    = '';

  if(!data.ok){
    msgEl.textContent = data.reason;
    return [];
  }

  msgEl.textContent = '';

  if(!data.main){
    resultHdr.textContent = `D1/D2/D3/D4/D5=${data.D1}/${data.D2}/${data.D3}/${data.D4}/${data.D5}　未命中`;
    skipEl.style.display = 'block';
    return [];
  }

  resultHdr.textContent = `主推 ${data.main.seat}号｜${data.main.level}`;
  resultEl.style.display = 'block';

  hitListEl.appendChild(buildModelCard(data.main, data, 1));

  const filtered = data.candidates.filter(x => !x.valid);
  filtered.forEach((h, idx) => {
    hitListEl.appendChild(buildModelCard(h, data, idx + 2));
  });

  return [data.main.seat];
}

function run(){
  const raw = roomEl.value.trim().replace(/\s+/g, '');
  if(!/^\d{5}$/.test(raw)){
    msgEl.textContent = '请输入正确的5位数字';
    return;
  }
  msgEl.textContent = '';
  const seats = render(raw);
  pushHistory(raw, seats);
  setTimeout(() => { roomEl.value = ''; roomEl.focus(); }, 180);
}

function loadHist(){
  try{
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  }catch{
    return [];
  }
}

function saveHist(items){
  localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, HISTORY_LIMIT)));
}

function renderHist(){
  const items = loadHist();
  histListEl.innerHTML = '';
  if(!items.length){
    histListEl.innerHTML = `<div class="histItem"><div class="histMain" style="color:rgba(255,255,255,.2)">暂无记录</div></div>`;
    return;
  }

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'histItem';
    const res = item.seats.length ? item.seats.map(s=>`${s}号`).join(' / ') : '跳';
    div.innerHTML = `
      <div class="histTop"><span>房号 <span class="pill">${item.room}</span></span><span>${item.time}</span></div>
      <div class="histMain">${item.diff} → ${res}</div>`;
    histListEl.appendChild(div);
  });
}

function pushHistory(room, seats){
  const data = evaluateRanZai66660(room);
  const items = loadHist();
  items.unshift({
    room,
    seats,
    diff: data.ok ? `D=${data.D1}/${data.D2}/${data.D3}/${data.D4}/${data.D5}` : 'D=—',
    time: new Date().toLocaleString('zh-CN', {hour12:false})
  });
  saveHist(items);
  renderHist();
}

goEl.addEventListener('click', run);
roomEl.addEventListener('keydown', e => { if(e.key === 'Enter') run(); });

clearBtnEl.addEventListener('click', () => {
  localStorage.removeItem(HISTORY_KEY);
  renderHist();
});

if('serviceWorker' in navigator){
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}

renderHist();
roomEl.focus();
</script>

</html>
