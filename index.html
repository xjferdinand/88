<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#b00000"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="然仔66660">
  <title>然仔66660 L2.2</title>
  <style>
    :root{
      --bg:#0b0b0f;
      --card:#11111a;
      --line:rgba(255,255,255,.10);
      --text:#f5f5f7;
      --muted:rgba(255,255,255,.50);
      --red:#ff2d2d;
    }
    *{box-sizing:border-box;margin:0;padding:0;}

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(800px 400px at 50% 15%,rgba(255,45,45,.20),transparent 60%),
        radial-gradient(900px 500px at 50% 110%,rgba(176,0,0,.25),transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
      padding:12px;
    }

    .app{width:min(430px,100%);}

    .title{
      font-size:16px;
      font-weight:900;
      margin:0 0 12px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .title::before{
      content:"";
      flex-shrink:0;
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--red);
      box-shadow:0 0 12px rgba(255,45,45,.9);
    }
    .version{
      font-size:10px;
      color:rgba(255,45,45,.6);
      margin-left:4px;
      font-weight:400;
    }

    .panel{
      background:linear-gradient(160deg,rgba(255,45,45,.07),transparent 55%),var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      box-shadow:0 20px 60px rgba(0,0,0,.55);
    }

    input{
      width:100%;
      padding:12px 14px;
      font-size:22px;
      letter-spacing:5px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.40);
      color:var(--text);
      outline:none;
      text-align:center;
      font-weight:700;
    }
    input:focus{
      border-color:rgba(255,45,45,.65);
      box-shadow:0 0 0 3px rgba(255,45,45,.12);
    }
    input::placeholder{
      font-size:13px;
      letter-spacing:1px;
      font-weight:400;
    }

    .btn-wrap{
      display:flex;
      justify-content:center;
      margin:14px 0 8px;
    }
    .btn-circle{
      width:66px;
      height:66px;
      border-radius:50%;
      border:2px solid rgba(255,45,45,.55);
      background:radial-gradient(circle at 38% 32%,rgba(255,90,90,.95),rgba(155,0,0,.95));
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:1px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 18px rgba(255,45,45,.40),inset 0 1px 0 rgba(255,255,255,.18);
      transition:transform .1s,box-shadow .1s;
    }
    .btn-circle:active{transform:scale(.92);}

    .msg{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      min-height:14px;
      margin-bottom:8px;
    }

    .result{
      display:none;
      margin-top:4px;
    }
    .result-hdr{
      text-align:center;
      font-size:10px;
      color:var(--muted);
      margin-bottom:8px;
      letter-spacing:.3px;
    }
    .hit-list{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .hit{
      display:grid;
      grid-template-columns:auto 52px 1fr auto;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(0,0,0,.22);
    }
    .hit.r1{border-color:rgba(255,45,45,.50);background:rgba(255,45,45,.10);}
    .hit.r2{border-color:rgba(255,140,0,.38);background:rgba(255,140,0,.08);}
    .hit.r3{border-color:rgba(80,255,140,.40);background:rgba(80,255,140,.08);}
    .hit.r4{border-color:rgba(120,180,255,.40);background:rgba(80,120,255,.08);}
    .hit.r5{border-color:rgba(255,255,255,.10);background:rgba(255,255,255,.03);}

    .hit-lbl{
      font-size:9px;
      font-weight:900;
      padding:2px 6px;
      border-radius:999px;
      background:rgba(255,45,45,.20);
      color:#ff8080;
      white-space:nowrap;
      letter-spacing:.2px;
    }
    .hit.r1 .hit-lbl{
      background:rgba(255,45,45,.38);
      color:#ff9090;
    }
    .hit.r2 .hit-lbl{
      background:rgba(255,140,0,.26);
      color:#ffbd6b;
    }
    .hit.r3 .hit-lbl{
      background:rgba(80,255,140,.20);
      color:rgba(120,255,170,.95);
    }
    .hit.r4 .hit-lbl{
      background:rgba(120,180,255,.20);
      color:rgba(160,200,255,.95);
    }

    .hit-seat{
      font-size:21px;
      font-weight:1000;
      color:var(--red);
      text-shadow:0 0 12px rgba(255,45,45,.35);
      line-height:1.05;
      text-align:center;
      white-space:nowrap;
    }
    .hit.r2 .hit-seat{
      color:#ff9f1c;
      text-shadow:0 0 12px rgba(255,159,28,.25);
    }
    .hit.r3 .hit-seat{
      color:rgba(80,255,140,.95);
      text-shadow:0 0 12px rgba(80,255,140,.25);
    }
    .hit.r4 .hit-seat{
      color:rgba(160,200,255,.95);
      text-shadow:0 0 12px rgba(120,180,255,.25);
    }

    .hit-body{
      line-height:1.4;
      min-width:0;
    }
    .hit-body .row1{
      font-size:11px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hit-body .row2{
      font-size:10px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hit-body .row3{
      font-size:9px;
      color:rgba(255,255,255,.30);
      margin-top:1px;
      line-height:1.25;
    }

    .hit-right{
      text-align:right;
      min-width:42px;
    }
    .hit-wr{
      font-size:11px;
      font-weight:900;
      color:rgba(80,255,140,.85);
    }
    .hit-avg{
      font-size:9px;
      color:rgba(255,255,255,.35);
      margin-top:1px;
    }

    .skip{
      display:none;
      text-align:center;
      padding:18px;
      font-size:30px;
      font-weight:1000;
      color:rgba(255,255,255,.18);
      letter-spacing:4px;
    }

    .history{
      margin-top:12px;
      padding:10px 11px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
    }
    .histHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:7px;
    }
    .histTitle{
      font-size:11px;
      font-weight:800;
      color:var(--muted);
    }
    .clearBtn{
      font-size:10px;
      padding:4px 8px;
      border-radius:7px;
      cursor:pointer;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      color:rgba(255,100,100,.85);
    }
    .histList{
      display:flex;
      flex-direction:column;
      gap:5px;
      max-height:180px;
      overflow:auto;
    }
    .histItem{
      border:1px solid rgba(255,255,255,.05);
      border-radius:9px;
      padding:7px 9px;
      background:rgba(0,0,0,.14);
    }
    .histTop{
      display:flex;
      justify-content:space-between;
      font-size:10px;
      color:rgba(255,255,255,.35);
      margin-bottom:2px;
    }
    .histMain{
      font-size:11px;
      color:rgba(255,255,255,.60);
      line-height:1.35;
    }
    .pill{
      display:inline-block;
      padding:1px 6px;
      border-radius:999px;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      font-weight:800;
      color:var(--red);
      margin-right:3px;
    }

    .tiny{
      margin-top:12px;
      padding-top:10px;
      border-top:1px solid var(--line);
      font-size:10px;
      color:rgba(255,255,255,.28);
      line-height:1.6;
      white-space:pre-line;
    }

    @media (max-width: 430px){
      body{padding:10px;}
      .app{width:100%;}
      .panel{padding:10px;border-radius:15px;}
      .hit{
        grid-template-columns:auto 46px 1fr auto;
        gap:6px;
        padding:7px 8px;
      }
      .hit-seat{font-size:19px;}
      .result-hdr{font-size:10px;}
      .histMain{font-size:10px;}
      .tiny{font-size:9px;}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="title">然仔66660<span class="version">局部三连泛化 L2.2</span></div>
  <div class="panel">

    <input id="room" inputmode="numeric" placeholder="输入5位房号" maxlength="5"/>

    <div class="btn-wrap">
      <button class="btn-circle" id="go">开干</button>
    </div>

    <div class="msg" id="msg"></div>

    <div class="result" id="result">
      <div class="result-hdr" id="resultHdr">— 然仔66660 L2.2结果 —</div>
      <div class="hit-list" id="hitList"></div>
    </div>
    <div class="skip" id="skip">跳</div>

    <div class="history">
      <div class="histHead">
        <span class="histTitle">最近记录</span>
        <button class="clearBtn" id="clearBtn">清空</button>
      </div>
      <div class="histList" id="histList"></div>
    </div>

    <div class="tiny">
【然仔66660｜局部三连泛化模型 L2.2 研究版】
逻辑：看当前位子的 左邻-X-右邻，判断承接、平台、反冲、过热、断尾。
新增：63330 5号+1000 的“5号低尾反爆观察”结构。
大输口径：盈亏 ≤ -400 算大输。

当前定位：研究版主模型候选，不是重注模型。
只打主推；无主推跳。
主推亏≤-300暂停复盘；亏≤-400模型降级重做。
    </div>

  </div>
</div>

<script>
const HISTORY_KEY = 'ranzai_66660_l22_local_triplet';
const HISTORY_LIMIT = 30;

const roomEl     = document.getElementById('room');
const goEl       = document.getElementById('go');
const msgEl      = document.getElementById('msg');
const resultEl   = document.getElementById('result');
const resultHdr  = document.getElementById('resultHdr');
const hitListEl  = document.getElementById('hitList');
const skipEl     = document.getElementById('skip');
const histListEl = document.getElementById('histList');
const clearBtnEl = document.getElementById('clearBtn');

function getDigits(room){
  return room.split('').map(Number);
}

function rankDesc(x, digits){
  return digits.filter(n => n > x).length + 1;
}

function abs(n){ return Math.abs(n); }

function numClass(n){
  if([0,2,4].includes(n)) return '小偶';
  if([1,3].includes(n)) return '小奇';
  if([6,8].includes(n)) return '大偶';
  return '大奇';
}

function tripletClass(a,b,c){
  return `${numClass(a)}+${numClass(b)}+${numClass(c)}`;
}

function getBaseData(room5){
  const [A,B,C,D,E] = getDigits(room5);
  const digits = [A,B,C,D,E];

  const RoomSum = A+B+C+D+E;

  const S1 = A+B;
  const S2 = B+C;
  const S3 = C+D;
  const S4 = D+E;
  const S5 = E+A;

  const P1 = A+B+C;
  const P2 = B+C+D;
  const P3 = C+D+E;
  const P4 = D+E+A;
  const P5 = E+A+B;

  const MidPower = S2 + S3;
  const TailPower = S3 + S4;

  const rankA = rankDesc(A,digits);
  const rankB = rankDesc(B,digits);
  const rankC = rankDesc(C,digits);
  const rankD = rankDesc(D,digits);
  const rankE = rankDesc(E,digits);

  return {
    A,B,C,D,E,digits,RoomSum,
    S1,S2,S3,S4,S5,
    P1,P2,P3,P4,P5,
    MidPower,TailPower,
    rankA,rankB,rankC,rankD,rankE,
    t2: tripletClass(A,B,C),
    t3: tripletClass(B,C,D),
    t4: tripletClass(C,D,E),
    t5: tripletClass(D,E,A),
    t6: tripletClass(D,E,A)
  };
}

function evaluateL22(room5){
  const d = getBaseData(room5);
  const {
    A,B,C,D,E,digits,RoomSum,
    S1,S2,S3,S4,S5,
    P1,P2,P3,P4,P5,
    MidPower,
    rankB,rankC,rankD,rankE
  } = d;

  const triggers = [];

  function add(seat, priority, name, reason, risk, score, mode='主推'){
    triggers.push({seat,priority,name,reason,risk,score,mode});
  }

  // =========================
  // 2号｜前低右抬
  // 看 A-B-C
  // =========================
  if(
    A <= 3 &&
    B >= 4 &&
    C > B &&
    E <= 4 &&
    S4 <= 6 &&
    (S2 >= 10 || P1 >= 10)
  ){
    add(
      2, 10,
      '2号前低右抬',
      'A低，B不弱，C右侧抬升，D/E尾段不抢2号',
      '2号极窄承接结构，正常小注',
      96
    );
  }

  // =========================
  // 3号｜中轴高点
  // 看 B-C-D
  // =========================
  if(
    C >= 6 &&
    C >= B &&
    C >= D &&
    MidPower >= 24 &&
    S3 >= 11 &&
    S4 <= S3 + 2 &&
    !(B > C && D > C)
  ){
    add(
      3, 30,
      '3号中轴高点',
      'C为中轴高点，MidPower强，S4不明显压制中轴',
      '3号中轴结构，正常小注',
      90
    );
  }

  // =========================
  // 3号｜首尾环托
  // 泛化87548
  // =========================
  if(
    B >= 5 &&
    C >= 5 &&
    D <= 4 &&
    A >= 6 &&
    E >= 6 &&
    !(B > C && D > C)
  ){
    add(
      3, 31,
      '3号首尾环托',
      'B/C不弱，D低不抢，A/E首尾强托住中轴',
      '3号首尾环托结构，正常小注',
      88
    );
  }

  // =========================
  // 4号｜左托承接
  // 看 C-D-E
  // =========================
  if(
    C >= 6 &&
    D <= 4 &&
    E <= 4 &&
    C > D &&
    D !== 0
  ){
    add(
      4, 40,
      '4号左托承接',
      'C强托D，E低不抢，4号吃左侧承接',
      '4号左托结构，正常小注',
      84
    );
  }

  // =========================
  // 4号｜低位反冲
  // =========================
  if(
    C <= 3 &&
    D >= 3 &&
    D <= 4 &&
    E >= 5 &&
    E > D &&
    rankD !== 1
  ){
    add(
      4, 41,
      '4号低位反冲',
      'C低，D低但不死，E高托起，4号处在反冲承接点',
      '4号反冲结构，正常小注',
      83
    );
  }

  // =========================
  // 4号｜双侧夹持
  // =========================
  if(
    C >= 6 &&
    E >= 6 &&
    D >= 3 &&
    D <= 5 &&
    abs(C-D) <= 4 &&
    abs(E-D) <= 4
  ){
    add(
      4, 42,
      '4号双侧夹持',
      'C/E两侧强，D为中低承接点，形成双侧夹持反冲',
      '4号夹持结构，正常小注',
      82
    );
  }

  // =========================
  // 5号｜后段平台
  // 看 D-E-A，同时看 C-D-E
  // =========================
  if(
    D >= 5 &&
    E >= 5 &&
    A <= 4 &&
    abs(D-E) <= 2 &&
    C >= 5 &&
    abs(C-E) <= 2 &&
    E !== 9
  ){
    add(
      5, 20,
      '5号后段平台',
      'C/D/E形成后段平台，E参与高点，A小不抢尾',
      '5号平台结构，正常小注',
      92
    );
  }

  // =========================
  // 5号｜低D落点
  // =========================
  if(
    D <= 2 &&
    E >= 4 &&
    E <= 8 &&
    C >= 5 &&
    D < E &&
    S4 <= 10 &&
    (
      (E === 4 && A >= 3) ||
      (E === 8 && C >= 7 && A <= 4) ||
      ([5,6].includes(E) && A >= 3)
    )
  ){
    add(
      5, 21,
      '5号低D落点',
      'D低不压E，E形成尾部落点，A端托住或不抢',
      '5号落点结构，正常小注',
      88
    );
  }

  // =========================
  // 5号｜低D强A托尾
  // 补91504，过滤50502
  // =========================
  if(
    numClass(D) === '小偶' &&
    numClass(E) === '小偶' &&
    numClass(A) === '大奇' &&
    D < E &&
    A >= 7 &&
    E >= 4 &&
    S5 >= 12
  ){
    add(
      5, 22,
      '5号低D强A托尾',
      'D低不压E，A端强托尾，S5首尾托力足',
      '5号强A托尾结构，正常小注',
      87
    );
  }

  // =========================
  // 5号｜低尾反爆观察
  // 新增63330，不能重注
  // =========================
  if(
    E === 0 &&
    numClass(D) === '小奇' &&
    numClass(A) === '大偶' &&
    B >= 1 && B <= 4 &&
    C >= 1 && C <= 4 &&
    D >= 1 && D <= 4 &&
    abs(B-C) <= 1 &&
    abs(C-D) <= 1 &&
    A >= 6 &&
    S1 <= 10
  ){
    add(
      5, 23,
      '5号低尾反爆观察',
      'E=0但B/C/D低位平台，D不强压E，A大偶托尾',
      '新增观察结构；只小注，若亏≤-400立即删除',
      75,
      '观察'
    );
  }

  // =========================
  // 6号｜稳定尾平台
  // =========================
  if(
    D >= 5 &&
    E >= 6 &&
    abs(D-E) <= 2 &&
    E !== 0 &&
    !(E === 9 && S4 >= 15)
  ){
    add(
      6, 50,
      '6号稳定尾平台',
      'D/E稳定成平台，E不为0，不是E单点过热',
      '6号稳定尾平台，正常小注',
      86
    );
  }

  // =========================
  // 6号｜首尾闭环承接
  // 补87636
  // =========================
  if(
    numClass(D) === '小奇' &&
    numClass(E) === '大偶' &&
    numClass(A) === '大偶' &&
    D < E &&
    A >= E &&
    E !== 0
  ){
    add(
      6, 51,
      '6号首尾闭环承接',
      'D低，E大偶，A大偶闭环承接，首尾托尾',
      '6号闭环承接，正常小注',
      85
    );
  }

  // =========================
  // 6号｜低位反爆
  // =========================
  if(
    RoomSum <= 12 &&
    E > D &&
    E > 0 &&
    E >= Math.max(A,B,C,D) - 1
  ){
    add(
      6, 52,
      '6号低位反爆',
      '全房低位，E为相对高点，D不压E',
      '6号低位反爆，正常小注',
      84
    );
  }

  // =========================
  // 6号｜低位A托尾
  // 补51201
  // =========================
  if(
    numClass(D) === '小偶' &&
    numClass(E) === '小奇' &&
    numClass(A) === '大奇' &&
    RoomSum <= 12 &&
    D < E &&
    E > 0 &&
    A >= 5
  ){
    add(
      6, 53,
      '6号低位A托尾',
      'D低，E小但不为0，A大奇托尾，形成低位闭环',
      '6号低位A托尾，正常小注',
      83
    );
  }

  // =========================
  // 6号｜尾强反冲
  // =========================
  if(
    D <= 5 &&
    E >= 6 &&
    A <= 4 &&
    E > D &&
    E !== 0 &&
    S4 <= 14 &&
    !(E === 9 && (P3 >= 19 || S5 >= 12))
  ){
    add(
      6, 54,
      '6号尾强反冲',
      'D中低，E抬升，A低不抢，尾强但不过热',
      '6号尾强反冲，正常小注',
      82
    );
  }

  if(!triggers.length){
    return {
      ok:false,
      seat:null,
      label:'跳',
      mode:'跳',
      triggerName:'无触发',
      reason:'未命中L2.2局部三连泛化结构',
      risk:'无主推，直接跳',
      score:null,
      data:d,
      triggers:[]
    };
  }

  triggers.sort((a,b)=>{
    if(a.priority !== b.priority) return a.priority - b.priority;
    return b.score - a.score;
  });

  const best = triggers[0];

  return {
    ok:true,
    seat:best.seat,
    label:best.mode === '观察' ? '观察' : '主推',
    mode:best.mode,
    triggerName:best.name,
    reason:best.reason,
    risk:best.risk,
    score:best.score,
    data:d,
    triggers
  };
}

function buildModelCard(result, room5){
  const div = document.createElement('div');

  if(!result.ok){
    div.className = 'hit r5';
  }else if(result.mode === '观察'){
    div.className = 'hit r2';
  }else if(result.seat === 6){
    div.className = 'hit r1';
  }else if(result.seat === 5){
    div.className = 'hit r2';
  }else if(result.seat === 4){
    div.className = 'hit r4';
  }else{
    div.className = 'hit r3';
  }

  const d = result.data;
  const seatText = result.ok ? `${result.seat}` : '跳';
  const wrText = result.ok ? `${result.score}分` : '—';
  const avgText = result.ok ? result.mode : '跳';

  div.innerHTML = `
    <div class="hit-lbl">${result.label}</div>
    <div class="hit-seat">${seatText}</div>
    <div class="hit-body">
      <div class="row1">房号=${room5}　A${d.A} B${d.B} C${d.C} D${d.D} E${d.E}</div>
      <div class="row2">局部：2=${d.t2}｜3=${d.t3}｜4=${d.t4}｜5/6=${d.t5}</div>
      <div class="row3">${result.triggerName}｜${result.reason}｜${result.risk}</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">${wrText}</div>
      <div class="hit-avg">${avgText}</div>
    </div>
  `;
  return div;
}

function buildDataCard(result){
  const d = result.data;
  const div = document.createElement('div');
  div.className = 'hit r5';

  const allTriggers = result.triggers && result.triggers.length
    ? result.triggers.map(t => `${t.seat}号-${t.name}`).join('；')
    : '无';

  div.innerHTML = `
    <div class="hit-lbl">数据</div>
    <div class="hit-seat">${result.triggers ? result.triggers.length : 0}</div>
    <div class="hit-body">
      <div class="row1">S=${d.S1}/${d.S2}/${d.S3}/${d.S4}/${d.S5}｜RoomSum=${d.RoomSum}</div>
      <div class="row2">P=${d.P1}/${d.P2}/${d.P3}/${d.P4}/${d.P5}</div>
      <div class="row3">全部触发：${allTriggers}</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">L2.2</div>
      <div class="hit-avg">结构</div>
    </div>
  `;
  return div;
}

function render(room5){
  const res = evaluateL22(room5);

  resultEl.style.display = 'none';
  skipEl.style.display   = 'none';
  hitListEl.innerHTML    = '';

  if(!res.ok){
    resultHdr.textContent = `然仔66660 L2.2　无主推`;
    hitListEl.appendChild(buildModelCard(res, room5));
    resultEl.style.display = 'block';
    skipEl.style.display = 'block';
    return res;
  }

  resultHdr.textContent = `然仔66660 L2.2　${res.label} ${res.seat}号｜${res.triggerName}`;
  hitListEl.appendChild(buildModelCard(res, room5));
  hitListEl.appendChild(buildDataCard(res));
  resultEl.style.display = 'block';

  return res;
}

function run(){
  const raw = roomEl.value.trim().replace(/\s+/g, '');
  if(!/^\d{5}$/.test(raw)){
    msgEl.textContent = '请输入正确的5位数字';
    return;
  }
  msgEl.textContent = '';
  const res = render(raw);
  pushHistory(raw, res);
  setTimeout(() => { roomEl.value = ''; roomEl.focus(); }, 180);
}

function loadHist(){
  try{
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  }catch{
    return [];
  }
}

function saveHist(items){
  localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, HISTORY_LIMIT)));
}

function renderHist(){
  const items = loadHist();
  histListEl.innerHTML = '';

  if(!items.length){
    histListEl.innerHTML = `<div class="histItem"><div class="histMain" style="color:rgba(255,255,255,.2)">暂无记录</div></div>`;
    return;
  }

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'histItem';

    const resText = item.ok
      ? `${item.seat}号${item.mode === '观察' ? '观察' : '主推'}｜${item.triggerName}`
      : '跳';

    div.innerHTML = `
      <div class="histTop"><span>房号 <span class="pill">${item.room}</span></span><span>${item.time}</span></div>
      <div class="histMain">L2.2 → ${resText}</div>
    `;
    histListEl.appendChild(div);
  });
}

function pushHistory(room, res){
  const items = loadHist();
  items.unshift({
    room,
    ok: res.ok,
    seat: res.seat,
    mode: res.mode,
    triggerName: res.triggerName,
    time: new Date().toLocaleString('zh-CN', {hour12:false})
  });
  saveHist(items);
  renderHist();
}

goEl.addEventListener('click', run);
roomEl.addEventListener('keydown', e => { if(e.key === 'Enter') run(); });
roomEl.addEventListener('input', e => {
  e.target.value = e.target.value.replace(/\D/g, '').slice(0,5);
});

clearBtnEl.addEventListener('click', () => {
  localStorage.removeItem(HISTORY_KEY);
  renderHist();
});

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

renderHist();
roomEl.focus();
</script>
</body>
</html>
