<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#b00000"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="然仔66660">
  <title>然仔66660 v2.1</title>
  <style>
    :root{
      --bg:#0b0b0f;
      --card:#11111a;
      --line:rgba(255,255,255,.10);
      --text:#f5f5f7;
      --muted:rgba(255,255,255,.50);
      --red:#ff2d2d;
    }
    *{box-sizing:border-box;margin:0;padding:0;}

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(800px 400px at 50% 15%,rgba(255,45,45,.20),transparent 60%),
        radial-gradient(900px 500px at 50% 110%,rgba(176,0,0,.25),transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
      padding:12px;
    }

    .app{width:min(430px,100%);}

    .title{
      font-size:16px;
      font-weight:900;
      margin:0 0 12px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .title::before{
      content:"";
      flex-shrink:0;
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--red);
      box-shadow:0 0 12px rgba(255,45,45,.9);
    }
    .version{
      font-size:10px;
      color:rgba(255,45,45,.6);
      margin-left:4px;
      font-weight:400;
    }

    .panel{
      background:linear-gradient(160deg,rgba(255,45,45,.07),transparent 55%),var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      box-shadow:0 20px 60px rgba(0,0,0,.55);
    }

    input{
      width:100%;
      padding:12px 14px;
      font-size:22px;
      letter-spacing:5px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.40);
      color:var(--text);
      outline:none;
      text-align:center;
      font-weight:700;
    }
    input:focus{
      border-color:rgba(255,45,45,.65);
      box-shadow:0 0 0 3px rgba(255,45,45,.12);
    }
    input::placeholder{
      font-size:13px;
      letter-spacing:1px;
      font-weight:400;
    }

    .btn-wrap{
      display:flex;
      justify-content:center;
      margin:14px 0 8px;
    }
    .btn-circle{
      width:66px;
      height:66px;
      border-radius:50%;
      border:2px solid rgba(255,45,45,.55);
      background:radial-gradient(circle at 38% 32%,rgba(255,90,90,.95),rgba(155,0,0,.95));
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:1px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 18px rgba(255,45,45,.40),inset 0 1px 0 rgba(255,255,255,.18);
      transition:transform .1s,box-shadow .1s;
    }
    .btn-circle:active{transform:scale(.92);}

    .msg{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      min-height:14px;
      margin-bottom:8px;
    }

    .result{
      display:none;
      margin-top:4px;
    }
    .result-hdr{
      text-align:center;
      font-size:10px;
      color:var(--muted);
      margin-bottom:8px;
      letter-spacing:.3px;
    }
    .hit-list{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .hit{
      display:grid;
      grid-template-columns:auto 52px 1fr auto;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(0,0,0,.22);
    }
    .hit.r1{border-color:rgba(255,45,45,.50);background:rgba(255,45,45,.10);}
    .hit.r2{border-color:rgba(255,140,0,.38);background:rgba(255,140,0,.08);}
    .hit.r3{border-color:rgba(255,255,255,.10);}

    .hit-lbl{
      font-size:9px;
      font-weight:900;
      padding:2px 6px;
      border-radius:999px;
      background:rgba(255,45,45,.20);
      color:#ff8080;
      white-space:nowrap;
      letter-spacing:.2px;
    }
    .hit.r1 .hit-lbl{
      background:rgba(255,45,45,.38);
      color:#ff9090;
    }
    .hit.r2 .hit-lbl{
      background:rgba(255,140,0,.26);
      color:#ffbd6b;
    }

    .hit-seat{
      font-size:21px;
      font-weight:1000;
      color:var(--red);
      text-shadow:0 0 12px rgba(255,45,45,.35);
      line-height:1.05;
      text-align:center;
      white-space:nowrap;
    }

    .hit.r2 .hit-seat{
      color:#ff9f1c;
      text-shadow:0 0 12px rgba(255,159,28,.25);
    }

    .hit-body{
      line-height:1.4;
      min-width:0;
    }
    .hit-body .row1{
      font-size:11px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hit-body .row2{
      font-size:10px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hit-body .row3{
      font-size:9px;
      color:rgba(255,255,255,.30);
      margin-top:1px;
      line-height:1.25;
    }

    .hit-right{
      text-align:right;
      min-width:42px;
    }
    .hit-wr{
      font-size:11px;
      font-weight:900;
      color:rgba(80,255,140,.85);
    }
    .hit-avg{
      font-size:9px;
      color:rgba(255,255,255,.35);
      margin-top:1px;
    }

    .skip{
      display:none;
      text-align:center;
      padding:18px;
      font-size:30px;
      font-weight:1000;
      color:rgba(255,255,255,.18);
      letter-spacing:4px;
    }

    .history{
      margin-top:12px;
      padding:10px 11px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
    }
    .histHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:7px;
    }
    .histTitle{
      font-size:11px;
      font-weight:800;
      color:var(--muted);
    }
    .clearBtn{
      font-size:10px;
      padding:4px 8px;
      border-radius:7px;
      cursor:pointer;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      color:rgba(255,100,100,.85);
    }
    .histList{
      display:flex;
      flex-direction:column;
      gap:5px;
      max-height:180px;
      overflow:auto;
    }
    .histItem{
      border:1px solid rgba(255,255,255,.05);
      border-radius:9px;
      padding:7px 9px;
      background:rgba(0,0,0,.14);
    }
    .histTop{
      display:flex;
      justify-content:space-between;
      font-size:10px;
      color:rgba(255,255,255,.35);
      margin-bottom:2px;
    }
    .histMain{
      font-size:11px;
      color:rgba(255,255,255,.60);
      line-height:1.35;
    }
    .pill{
      display:inline-block;
      padding:1px 6px;
      border-radius:999px;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      font-weight:800;
      color:var(--red);
      margin-right:3px;
    }

    .tiny{
      margin-top:12px;
      padding-top:10px;
      border-top:1px solid var(--line);
      font-size:10px;
      color:rgba(255,255,255,.28);
      line-height:1.6;
      white-space:pre-line;
    }

    @media (max-width: 430px){
      body{padding:10px;}
      .app{width:100%;}
      .panel{padding:10px;border-radius:15px;}
      .hit{
        grid-template-columns:auto 46px 1fr auto;
        gap:6px;
        padding:7px 8px;
      }
      .hit-seat{font-size:19px;}
      .result-hdr{font-size:10px;}
      .histMain{font-size:10px;}
      .tiny{font-size:9px;}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="title">然仔66660<span class="version">v2.1 主推 / 观察双档</span></div>
  <div class="panel">

    <input id="room" inputmode="numeric" placeholder="输入5位房号" maxlength="5"/>

    <div class="btn-wrap">
      <button class="btn-circle" id="go">开干</button>
    </div>

    <div class="msg" id="msg"></div>

    <div class="result" id="result">
      <div class="result-hdr" id="resultHdr">— 然仔66660 v2.1结果 —</div>
      <div class="hit-list" id="hitList"></div>
    </div>
    <div class="skip" id="skip">跳</div>

    <div class="history">
      <div class="histHead">
        <span class="histTitle">最近记录</span>
        <button class="clearBtn" id="clearBtn">清空</button>
      </div>
      <div class="histList" id="histList"></div>
    </div>

    <div class="tiny">
【然仔66660｜X排名邻居黑白模型 v2.1】
逻辑：先排雷，再进房。
主推正常试跑；观察只能小注。
无主推/观察直接跳。
亏损 ≤ -400 按大输统计。

回测：92局｜主推52局｜观察10局｜总输出62局
总进房率67.4%｜综合命中32局
综合命中净分 +20870｜≤-400大输命中0
    </div>

  </div>
</div>

<script>
const HISTORY_KEY = 'ranzai_66660_v21_dual_mode';
const HISTORY_LIMIT = 30;

const roomEl     = document.getElementById('room');
const goEl       = document.getElementById('go');
const msgEl      = document.getElementById('msg');
const resultEl   = document.getElementById('result');
const resultHdr  = document.getElementById('resultHdr');
const hitListEl  = document.getElementById('hitList');
const skipEl     = document.getElementById('skip');
const histListEl = document.getElementById('histList');
const clearBtnEl = document.getElementById('clearBtn');

function getDigits(room){
  return room.split('').map(Number);
}

function digitRoot(sum){
  const r = sum % 9;
  return r === 0 ? 9 : r;
}

function rankDesc(x, digits){
  return digits.filter(n => n > x).length + 1;
}

function between(x, left, right){
  return (left >= x && x >= right) || (left <= x && x <= right);
}

function evaluateRanZai66660(room5){
  const [A,B,C,D,E] = getDigits(room5);
  const digits = [A,B,C,D,E];

  const RoomSum = A+B+C+D+E;
  const root = digitRoot(RoomSum);

  const D1 = A-B;
  const D2 = B-C;
  const D3 = C-D;
  const D4 = D-E;
  const D5 = E-A;

  const candidates = [];

  function addCandidate(seat, score, level, reason, risk, mode){
    candidates.push({ seat, score, level, reason, risk, mode });
  }

  // =========================
  // 3号：X=C，邻居B/D
  // =========================
  const X3 = C;
  const rank3 = rankDesc(X3, digits);
  const K3 = RoomSum - X3;

  let black3Reason = "";

  if(D4 <= -8){
    black3Reason = "D4<=-8，尾端E强压D";
  }else if(B > C && D > C){
    black3Reason = "邻居双压，B/D都压C";
  }else if(D3 > 0 && D4 > 0){
    black3Reason = "D3/D4双正，3号历史风险";
  }else if(D3 < 0 && D4 > 0){
    black3Reason = "D3负D4正，C被D压";
  }

  if(!black3Reason){
    // v2.0主推结构
    if(D3 === 0 && D4 > 0){
      addCandidate(3, 7, "主推", "3号主推：D3=0且D4>0，中轴反冲", "正常试跑", "main");
    }

    if(D3 >= 4 && D4 >= -6 && D4 < 0){
      addCandidate(3, 7, "主推", "3号主推：D3>=4且-6<=D4<0，C强压D但尾负不过深", "正常试跑", "main");
    }

    if(rank3 === 4 && D1 >= 0 && D3 > 0 && D4 < 0){
      addCandidate(3, 8, "主推", "3号主推：rank4低位承接爆发", "正常试跑", "main");
    }

    // v2.1新增观察：3号小反冲正闭环
    if(
      (rank3 === 3 || rank3 === 4) &&
      D2 > 0 &&
      D3 >= -3 && D3 < 0 &&
      D4 > 0 && D4 <= 3 &&
      D5 >= 3
    ){
      addCandidate(3, 3, "观察", "3号观察：小反冲正闭环", "观察小注；观察亏≤-300暂停观察档", "observe");
    }
  }

  // =========================
  // 4号：X=D，邻居C/E
  // =========================
  const X4 = D;
  const rank4 = rankDesc(X4, digits);
  const K4 = RoomSum - X4;

  let black4Reason = "";

  if(rank4 === 1){
    black4Reason = "D为rank1，4号历史大输风险";
  }else if(D3 < 0 && D4 > 0){
    black4Reason = "D3负D4正，4号承接断层";
  }else if(C < D && E < D){
    black4Reason = "邻居双低，D孤高无承接";
  }else if(D3 === 0 && D4 < 0){
    black4Reason = "D3=0且D4<0，尾端压走4号";
  }

  if(!black4Reason){
    // v2.0主推结构
    if(rank4 === 2 && D3 > 0 && D4 > 0){
      addCandidate(4, 6, "主推", "4号主推：rank2且D3/D4双正", "正常试跑", "main");
    }

    if(rank4 === 4 && between(D, C, E) && D3 < 0 && D4 < 0){
      addCandidate(4, 8, "主推", "4号主推：rank4中承接双负", "正常试跑", "main");
    }

    if(D1 >= 3 && D2 <= -4 && D3 > 0 && D4 < 0 && D5 > 0){
      addCandidate(4, 8, "高波", "4号高波：特殊反冲结构", "高波小注；亏≤-300暂停复盘", "main");
    }

    // v2.1新增观察：4号rank2弱反冲
    if(rank4 === 2 && D3 < 0 && D4 > 0 && D5 <= -4){
      addCandidate(4, 3, "观察", "4号观察：rank2弱反冲", "观察小注；该结构不做主推", "observe");
    }

    // v2.1新增观察：4号低位D5归零反抽
    if(rank4 === 5 && D3 > 0 && D4 < 0 && D5 === 0 && A <= 2){
      addCandidate(4, 2, "观察", "4号观察：低位D5归零反抽", "高波观察，极小注；观察亏≤-300暂停", "observe");
    }
  }

  // =========================
  // 5号：X=E，邻居D/A
  // =========================
  const X5 = E;
  const rank5 = rankDesc(X5, digits);
  const K5 = RoomSum - X5;

  let black5Reason = "";

  if(D5 === 0){
    black5Reason = "D5=0，首尾闭死";
  }else if([1,2,5,9].includes(X5)){
    black5Reason = "5号X在{1,2,5,9}，历史不稳";
  }

  if(!black5Reason){
    // v2.0主推结构，v2.1不扩5号
    if(X5 === 4 && rank5 === 3 && K5 === 15 && root === 1){
      addCandidate(5, 9, "主推", "5号主推：X=4、rank3、K=15、数根=1", "正常试跑", "main");
    }

    if(X5 === 8 && rank5 === 1 && D3 === 5 && D4 === -6){
      addCandidate(5, 9, "主推", "5号主推：X=8、rank1、D3=5、D4=-6", "正常试跑", "main");
    }
  }

  // =========================
  // 6号：X=E，邻居D/A
  // =========================
  const X6 = E;
  const rank6 = rankDesc(X6, digits);
  const K6 = RoomSum - X6;

  let black6Reason = "";

  if(D4 >= 5){
    black6Reason = "D4>=5，D强压E";
  }else if(D1 <= -6){
    black6Reason = "D1<=-6，前端压制";
  }else if(D5 <= -5){
    black6Reason = "D5<=-5，E弱于A";
  }else if(rank6 === 2 && D3 > 0 && D4 < 0){
    black6Reason = "rank2伪强，中轴抢位";
  }else if(D3 > 0 && D4 <= -4 && D5 <= 0){
    black6Reason = "尾负但闭环不足";
  }

  if(!black6Reason){
    // v2.0主推结构
    if(D4 === 0 && D3 <= 0){
      addCandidate(6, 7, "主推", "6号主推：D4=0且D3<=0，尾部归零承接", "正常试跑", "main");
    }

    if(D3 === 0 && D4 < 0){
      addCandidate(6, 7, "主推", "6号主推：D3=0且D4<0，尾反压", "正常试跑", "main");
    }

    if(rank6 === 1 && (D3 <= 0 || D4 === 0 || D5 >= 2)){
      addCandidate(6, 6, "主推", "6号主推：rank1尾强承接", "谨慎试跑；亏≤-300暂停复盘", "main");
    }

    if(rank6 === 3 && between(E, D, A) && D4 >= -3 && D4 <= -1){
      addCandidate(6, 5, "观察", "6号观察：rank3中承接轻负", "观察小注", "main");
    }

    if(X6 === 7 && rank6 === 2 && D3 === 0 && D4 < 0){
      addCandidate(6, 7, "主推", "6号主推：X=7、rank2、D3=0、D4<0", "正常试跑", "main");
    }

    if(D5 >= 6 && D4 <= -4 && D1 < 0){
      addCandidate(6, 6, "观察", "6号观察：强尾观察", "观察小注", "main");
    }

    // v2.1新增观察：6号弱尾反弹
    if(
      rank6 === 5 &&
      D4 >= 1 && D4 <= 5 &&
      D1 >= -5 && D1 <= 1 &&
      D5 <= -3
    ){
      addCandidate(6, 3, "观察", "6号观察：弱尾反弹", "观察小注；观察亏≤-300暂停观察档", "observe");
    }

    // v2.1新增观察：6号轻承接
    if(
      D4 === 1 &&
      D5 >= 0 &&
      rank6 <= 3 &&
      A >= 6
    ){
      addCandidate(6, 3, "观察", "6号观察：轻承接", "观察小注", "observe");
    }
  }

  if(candidates.length === 0){
    const blackReasons = [];
    if(black3Reason) blackReasons.push("3号黑：" + black3Reason);
    if(black4Reason) blackReasons.push("4号黑：" + black4Reason);
    if(black5Reason) blackReasons.push("5号黑：" + black5Reason);
    if(black6Reason) blackReasons.push("6号黑：" + black6Reason);

    return {
      ok:false,
      seat:null,
      status:"跳",
      label:"跳",
      score:null,
      reason:blackReasons.length ? blackReasons.join("；") : "没有命中任何主推/观察结构",
      risk:"无主推/观察，直接跳",
      data:{ A,B,C,D,E,RoomSum,root,D1,D2,D3,D4,D5,rank3,rank4,rank5,rank6 }
    };
  }

  const mainCandidates = candidates.filter(c => c.mode === "main");
  const observeCandidates = candidates.filter(c => c.mode === "observe");

  const priority = {5:1,3:2,4:3,6:4};

  function sortCandidates(arr){
    arr.sort((a,b)=>{
      if(b.score !== a.score) return b.score - a.score;
      return priority[a.seat] - priority[b.seat];
    });
    return arr;
  }

  let best;
  let outputMode;

  if(mainCandidates.length){
    best = sortCandidates(mainCandidates)[0];
    outputMode = "主推";
  }else{
    best = sortCandidates(observeCandidates)[0];
    outputMode = "观察";
  }

  return {
    ok:true,
    seat:best.seat,
    status:outputMode === "主推" ? best.level : "观察",
    label:outputMode === "主推" ? best.level : "观察",
    mode:outputMode,
    score:best.score,
    reason:best.reason,
    risk:best.risk,
    candidates,
    data:{ A,B,C,D,E,RoomSum,root,D1,D2,D3,D4,D5,rank3,rank4,rank5,rank6,K3,K4,K5,K6 }
  };
}

function buildModelCard(result, room5){
  const div = document.createElement('div');

  if(result.mode === "观察" || result.status === "观察"){
    div.className = 'hit r2';
  }else{
    div.className = 'hit r1';
  }

  const d = result.data;
  const seatText = result.ok ? `${result.seat}` : '跳';
  const label = result.ok ? result.label : '跳';
  const wrText = result.ok ? `${result.score}分` : '—';
  const avgText = result.mode || '跳';

  div.innerHTML = `
    <div class="hit-lbl">${label}</div>
    <div class="hit-seat">${seatText}</div>
    <div class="hit-body">
      <div class="row1">房号=${room5}　A${d.A} B${d.B} C${d.C} D${d.D} E${d.E}</div>
      <div class="row2">D1=${d.D1} D2=${d.D2} D3=${d.D3} D4=${d.D4} D5=${d.D5}</div>
      <div class="row3">${result.reason}｜${result.risk}</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">${wrText}</div>
      <div class="hit-avg">${avgText}</div>
    </div>
  `;
  return div;
}

function render(room5){
  const res = evaluateRanZai66660(room5);

  resultEl.style.display = 'none';
  skipEl.style.display   = 'none';
  hitListEl.innerHTML    = '';

  if(!res.ok){
    resultHdr.textContent = `然仔66660 v2.1　无主推/观察`;
    skipEl.style.display = 'block';
    return [];
  }

  resultHdr.textContent = `然仔66660 v2.1　${res.mode}命中`;
  hitListEl.appendChild(buildModelCard(res, room5));
  resultEl.style.display = 'block';

  return [{
    seat: res.seat,
    mode: res.mode,
    label: res.label
  }];
}

function run(){
  const raw = roomEl.value.trim().replace(/\s+/g, '');
  if(!/^\d{5}$/.test(raw)){
    msgEl.textContent = '请输入正确的5位数字';
    return;
  }
  msgEl.textContent = '';
  const results = render(raw);
  pushHistory(raw, results);
  setTimeout(() => { roomEl.value = ''; roomEl.focus(); }, 180);
}

function loadHist(){
  try{
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  }catch{
    return [];
  }
}

function saveHist(items){
  localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, HISTORY_LIMIT)));
}

function renderHist(){
  const items = loadHist();
  histListEl.innerHTML = '';
  if(!items.length){
    histListEl.innerHTML = `<div class="histItem"><div class="histMain" style="color:rgba(255,255,255,.2)">暂无记录</div></div>`;
    return;
  }
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'histItem';

    let res = '跳';
    if(item.results && item.results.length){
      res = item.results.map(r => `${r.seat}号${r.mode === '观察' ? '观察' : '主推'}`).join(' / ');
    }

    div.innerHTML = `
      <div class="histTop"><span>房号 <span class="pill">${item.room}</span></span><span>${item.time}</span></div>
      <div class="histMain">然仔66660 v2.1 → ${res}</div>`;
    histListEl.appendChild(div);
  });
}

function pushHistory(room, results){
  const items = loadHist();
  items.unshift({
    room,
    results,
    time: new Date().toLocaleString('zh-CN', {hour12:false})
  });
  saveHist(items);
  renderHist();
}

goEl.addEventListener('click', run);
roomEl.addEventListener('keydown', e => { if(e.key === 'Enter') run(); });
roomEl.addEventListener('input', e => {
  e.target.value = e.target.value.replace(/\D/g, '').slice(0,5);
});

clearBtnEl.addEventListener('click', () => {
  localStorage.removeItem(HISTORY_KEY);
  renderHist();
});

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

renderHist();
roomEl.focus();
</script>
</body>
</html>
