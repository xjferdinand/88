<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#b00000"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="然仔66660">
  <title>然仔66660 双模型</title>
  <style>
    :root{
      --bg:#0b0b0f;
      --card:#11111a;
      --line:rgba(255,255,255,.10);
      --text:#f5f5f7;
      --muted:rgba(255,255,255,.50);
      --red:#ff2d2d;
    }
    *{box-sizing:border-box;margin:0;padding:0;}

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(800px 400px at 50% 15%,rgba(255,45,45,.20),transparent 60%),
        radial-gradient(900px 500px at 50% 110%,rgba(176,0,0,.25),transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
      padding:12px;
    }

    .app{width:min(430px,100%);}

    .title{
      font-size:16px;
      font-weight:900;
      margin:0 0 12px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .title::before{
      content:"";
      flex-shrink:0;
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--red);
      box-shadow:0 0 12px rgba(255,45,45,.9);
    }
    .version{
      font-size:10px;
      color:rgba(255,45,45,.6);
      margin-left:4px;
      font-weight:400;
    }

    .panel{
      background:linear-gradient(160deg,rgba(255,45,45,.07),transparent 55%),var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      box-shadow:0 20px 60px rgba(0,0,0,.55);
    }

    input{
      width:100%;
      padding:12px 14px;
      font-size:22px;
      letter-spacing:5px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.40);
      color:var(--text);
      outline:none;
      text-align:center;
      font-weight:700;
    }
    input:focus{
      border-color:rgba(255,45,45,.65);
      box-shadow:0 0 0 3px rgba(255,45,45,.12);
    }
    input::placeholder{
      font-size:13px;
      letter-spacing:1px;
      font-weight:400;
    }

    .btn-wrap{
      display:flex;
      justify-content:center;
      margin:14px 0 8px;
    }
    .btn-circle{
      width:66px;
      height:66px;
      border-radius:50%;
      border:2px solid rgba(255,45,45,.55);
      background:radial-gradient(circle at 38% 32%,rgba(255,90,90,.95),rgba(155,0,0,.95));
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:1px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 18px rgba(255,45,45,.40),inset 0 1px 0 rgba(255,255,255,.18);
      transition:transform .1s,box-shadow .1s;
    }
    .btn-circle:active{transform:scale(.92);}

    .msg{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      min-height:14px;
      margin-bottom:8px;
    }

    .result{
      display:none;
      margin-top:4px;
    }
    .result-hdr{
      text-align:center;
      font-size:10px;
      color:var(--muted);
      margin-bottom:8px;
      letter-spacing:.3px;
    }
    .hit-list{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .hit{
      display:grid;
      grid-template-columns:auto 52px 1fr auto;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(0,0,0,.22);
    }
    .hit.r1{border-color:rgba(255,45,45,.50);background:rgba(255,45,45,.10);}
    .hit.r2{border-color:rgba(255,140,0,.38);background:rgba(255,140,0,.08);}
    .hit.r3{border-color:rgba(80,255,140,.38);background:rgba(80,255,140,.08);}
    .hit.r4{border-color:rgba(255,255,255,.10);background:rgba(255,255,255,.03);}

    .hit-lbl{
      font-size:9px;
      font-weight:900;
      padding:2px 6px;
      border-radius:999px;
      background:rgba(255,45,45,.20);
      color:#ff8080;
      white-space:nowrap;
      letter-spacing:.2px;
    }
    .hit.r1 .hit-lbl{
      background:rgba(255,45,45,.38);
      color:#ff9090;
    }
    .hit.r2 .hit-lbl{
      background:rgba(255,140,0,.26);
      color:#ffbd6b;
    }
    .hit.r3 .hit-lbl{
      background:rgba(80,255,140,.20);
      color:rgba(120,255,170,.95);
    }

    .hit-seat{
      font-size:21px;
      font-weight:1000;
      color:var(--red);
      text-shadow:0 0 12px rgba(255,45,45,.35);
      line-height:1.05;
      text-align:center;
      white-space:nowrap;
    }

    .hit.r2 .hit-seat{
      color:#ff9f1c;
      text-shadow:0 0 12px rgba(255,159,28,.25);
    }
    .hit.r3 .hit-seat{
      color:rgba(80,255,140,.95);
      text-shadow:0 0 12px rgba(80,255,140,.25);
    }

    .hit-body{
      line-height:1.4;
      min-width:0;
    }
    .hit-body .row1{
      font-size:11px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hit-body .row2{
      font-size:10px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hit-body .row3{
      font-size:9px;
      color:rgba(255,255,255,.30);
      margin-top:1px;
      line-height:1.25;
    }

    .hit-right{
      text-align:right;
      min-width:42px;
    }
    .hit-wr{
      font-size:11px;
      font-weight:900;
      color:rgba(80,255,140,.85);
    }
    .hit-avg{
      font-size:9px;
      color:rgba(255,255,255,.35);
      margin-top:1px;
    }

    .skip{
      display:none;
      text-align:center;
      padding:18px;
      font-size:30px;
      font-weight:1000;
      color:rgba(255,255,255,.18);
      letter-spacing:4px;
    }

    .history{
      margin-top:12px;
      padding:10px 11px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
    }
    .histHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:7px;
    }
    .histTitle{
      font-size:11px;
      font-weight:800;
      color:var(--muted);
    }
    .clearBtn{
      font-size:10px;
      padding:4px 8px;
      border-radius:7px;
      cursor:pointer;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      color:rgba(255,100,100,.85);
    }
    .histList{
      display:flex;
      flex-direction:column;
      gap:5px;
      max-height:180px;
      overflow:auto;
    }
    .histItem{
      border:1px solid rgba(255,255,255,.05);
      border-radius:9px;
      padding:7px 9px;
      background:rgba(0,0,0,.14);
    }
    .histTop{
      display:flex;
      justify-content:space-between;
      font-size:10px;
      color:rgba(255,255,255,.35);
      margin-bottom:2px;
    }
    .histMain{
      font-size:11px;
      color:rgba(255,255,255,.60);
      line-height:1.35;
    }
    .pill{
      display:inline-block;
      padding:1px 6px;
      border-radius:999px;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      font-weight:800;
      color:var(--red);
      margin-right:3px;
    }

    .tiny{
      margin-top:12px;
      padding-top:10px;
      border-top:1px solid var(--line);
      font-size:10px;
      color:rgba(255,255,255,.28);
      line-height:1.6;
      white-space:pre-line;
    }

    @media (max-width: 430px){
      body{padding:10px;}
      .app{width:100%;}
      .panel{padding:10px;border-radius:15px;}
      .hit{
        grid-template-columns:auto 46px 1fr auto;
        gap:6px;
        padding:7px 8px;
      }
      .hit-seat{font-size:19px;}
      .result-hdr{font-size:10px;}
      .histMain{font-size:10px;}
      .tiny{font-size:9px;}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="title">然仔66660<span class="version">v2.1 + S1双模型</span></div>
  <div class="panel">

    <input id="room" inputmode="numeric" placeholder="输入5位房号" maxlength="5"/>

    <div class="btn-wrap">
      <button class="btn-circle" id="go">开干</button>
    </div>

    <div class="msg" id="msg"></div>

    <div class="result" id="result">
      <div class="result-hdr" id="resultHdr">— 然仔66660 双模型结果 —</div>
      <div class="hit-list" id="hitList"></div>
    </div>
    <div class="skip" id="skip">跳</div>

    <div class="history">
      <div class="histHead">
        <span class="histTitle">最近记录</span>
        <button class="clearBtn" id="clearBtn">清空</button>
      </div>
      <div class="histList" id="histList"></div>
    </div>

    <div class="tiny">
【模型1：然仔66660｜X排名邻居黑白模型 v2.1】
主推/观察双档；观察只能小注。

【模型2：然仔·66660 邻位和值结构模型 S1】
S1=A+B，S2=B+C，S3=C+D，S4=D+E
强过滤主模型候选；不命中直接跳。
回测：92局｜输出37局｜命中25局｜命中净分+20640｜≤-400大输命中0

两个模型分开输出，不互相覆盖。
亏损 ≤ -400 按大输统计。
    </div>

  </div>
</div>

<script>
const HISTORY_KEY = 'ranzai_66660_v21_plus_s1_dual';
const HISTORY_LIMIT = 30;

const roomEl     = document.getElementById('room');
const goEl       = document.getElementById('go');
const msgEl      = document.getElementById('msg');
const resultEl   = document.getElementById('result');
const resultHdr  = document.getElementById('resultHdr');
const hitListEl  = document.getElementById('hitList');
const skipEl     = document.getElementById('skip');
const histListEl = document.getElementById('histList');
const clearBtnEl = document.getElementById('clearBtn');

function getDigits(room){
  return room.split('').map(Number);
}

function digitRoot(sum){
  const r = sum % 9;
  return r === 0 ? 9 : r;
}

function rankDesc(x, digits){
  return digits.filter(n => n > x).length + 1;
}

function between(x, left, right){
  return (left >= x && x >= right) || (left <= x && x <= right);
}

function getBaseData(room5){
  const [A,B,C,D,E] = getDigits(room5);
  const digits = [A,B,C,D,E];
  const RoomSum = A+B+C+D+E;
  const root = digitRoot(RoomSum);

  const D1 = A-B;
  const D2 = B-C;
  const D3 = C-D;
  const D4 = D-E;
  const D5 = E-A;

  const S1 = A+B;
  const S2 = B+C;
  const S3 = C+D;
  const S4 = D+E;

  return {A,B,C,D,E,digits,RoomSum,root,D1,D2,D3,D4,D5,S1,S2,S3,S4};
}

/* ==================================================
   模型1：当前网页 v2.1 X排名邻居黑白模型
================================================== */
function evaluateV21(room5){
  const base = getBaseData(room5);
  const {A,B,C,D,E,digits,RoomSum,root,D1,D2,D3,D4,D5} = base;

  const candidates = [];

  function addCandidate(seat, score, level, reason, risk, mode){
    candidates.push({ seat, score, level, reason, risk, mode });
  }

  // 3号
  const X3 = C;
  const rank3 = rankDesc(X3, digits);
  const K3 = RoomSum - X3;

  let black3Reason = "";

  if(D4 <= -8){
    black3Reason = "D4<=-8，尾端E强压D";
  }else if(B > C && D > C){
    black3Reason = "邻居双压，B/D都压C";
  }else if(D3 > 0 && D4 > 0){
    black3Reason = "D3/D4双正，3号历史风险";
  }else if(D3 < 0 && D4 > 0){
    black3Reason = "D3负D4正，C被D压";
  }

  if(!black3Reason){
    if(D3 === 0 && D4 > 0){
      addCandidate(3, 7, "主推", "3号主推：D3=0且D4>0，中轴反冲", "正常试跑", "main");
    }
    if(D3 >= 4 && D4 >= -6 && D4 < 0){
      addCandidate(3, 7, "主推", "3号主推：D3>=4且-6<=D4<0，C强压D但尾负不过深", "正常试跑", "main");
    }
    if(rank3 === 4 && D1 >= 0 && D3 > 0 && D4 < 0){
      addCandidate(3, 8, "主推", "3号主推：rank4低位承接爆发", "正常试跑", "main");
    }
    if(
      (rank3 === 3 || rank3 === 4) &&
      D2 > 0 &&
      D3 >= -3 && D3 < 0 &&
      D4 > 0 && D4 <= 3 &&
      D5 >= 3
    ){
      addCandidate(3, 3, "观察", "3号观察：小反冲正闭环", "观察小注；观察亏≤-300暂停观察档", "observe");
    }
  }

  // 4号
  const X4 = D;
  const rank4 = rankDesc(X4, digits);
  const K4 = RoomSum - X4;

  let black4Reason = "";

  if(rank4 === 1){
    black4Reason = "D为rank1，4号历史大输风险";
  }else if(D3 < 0 && D4 > 0){
    black4Reason = "D3负D4正，4号承接断层";
  }else if(C < D && E < D){
    black4Reason = "邻居双低，D孤高无承接";
  }else if(D3 === 0 && D4 < 0){
    black4Reason = "D3=0且D4<0，尾端压走4号";
  }

  if(!black4Reason){
    if(rank4 === 2 && D3 > 0 && D4 > 0){
      addCandidate(4, 6, "主推", "4号主推：rank2且D3/D4双正", "正常试跑", "main");
    }
    if(rank4 === 4 && between(D, C, E) && D3 < 0 && D4 < 0){
      addCandidate(4, 8, "主推", "4号主推：rank4中承接双负", "正常试跑", "main");
    }
    if(D1 >= 3 && D2 <= -4 && D3 > 0 && D4 < 0 && D5 > 0){
      addCandidate(4, 8, "高波", "4号高波：特殊反冲结构", "高波小注；亏≤-300暂停复盘", "main");
    }
    if(rank4 === 2 && D3 < 0 && D4 > 0 && D5 <= -4){
      addCandidate(4, 3, "观察", "4号观察：rank2弱反冲", "观察小注；该结构不做主推", "observe");
    }
    if(rank4 === 5 && D3 > 0 && D4 < 0 && D5 === 0 && A <= 2){
      addCandidate(4, 2, "观察", "4号观察：低位D5归零反抽", "高波观察，极小注；观察亏≤-300暂停", "observe");
    }
  }

  // 5号
  const X5 = E;
  const rank5 = rankDesc(X5, digits);
  const K5 = RoomSum - X5;

  let black5Reason = "";

  if(D5 === 0){
    black5Reason = "D5=0，首尾闭死";
  }else if([1,2,5,9].includes(X5)){
    black5Reason = "5号X在{1,2,5,9}，历史不稳";
  }

  if(!black5Reason){
    if(X5 === 4 && rank5 === 3 && K5 === 15 && root === 1){
      addCandidate(5, 9, "主推", "5号主推：X=4、rank3、K=15、数根=1", "正常试跑", "main");
    }
    if(X5 === 8 && rank5 === 1 && D3 === 5 && D4 === -6){
      addCandidate(5, 9, "主推", "5号主推：X=8、rank1、D3=5、D4=-6", "正常试跑", "main");
    }
  }

  // 6号
  const X6 = E;
  const rank6 = rankDesc(X6, digits);
  const K6 = RoomSum - X6;

  let black6Reason = "";

  if(D4 >= 5){
    black6Reason = "D4>=5，D强压E";
  }else if(D1 <= -6){
    black6Reason = "D1<=-6，前端压制";
  }else if(D5 <= -5){
    black6Reason = "D5<=-5，E弱于A";
  }else if(rank6 === 2 && D3 > 0 && D4 < 0){
    black6Reason = "rank2伪强，中轴抢位";
  }else if(D3 > 0 && D4 <= -4 && D5 <= 0){
    black6Reason = "尾负但闭环不足";
  }

  if(!black6Reason){
    if(D4 === 0 && D3 <= 0){
      addCandidate(6, 7, "主推", "6号主推：D4=0且D3<=0，尾部归零承接", "正常试跑", "main");
    }
    if(D3 === 0 && D4 < 0){
      addCandidate(6, 7, "主推", "6号主推：D3=0且D4<0，尾反压", "正常试跑", "main");
    }
    if(rank6 === 1 && (D3 <= 0 || D4 === 0 || D5 >= 2)){
      addCandidate(6, 6, "主推", "6号主推：rank1尾强承接", "谨慎试跑；亏≤-300暂停复盘", "main");
    }
    if(rank6 === 3 && between(E, D, A) && D4 >= -3 && D4 <= -1){
      addCandidate(6, 5, "观察", "6号观察：rank3中承接轻负", "观察小注", "main");
    }
    if(X6 === 7 && rank6 === 2 && D3 === 0 && D4 < 0){
      addCandidate(6, 7, "主推", "6号主推：X=7、rank2、D3=0、D4<0", "正常试跑", "main");
    }
    if(D5 >= 6 && D4 <= -4 && D1 < 0){
      addCandidate(6, 6, "观察", "6号观察：强尾观察", "观察小注", "main");
    }
    if(
      rank6 === 5 &&
      D4 >= 1 && D4 <= 5 &&
      D1 >= -5 && D1 <= 1 &&
      D5 <= -3
    ){
      addCandidate(6, 3, "观察", "6号观察：弱尾反弹", "观察小注；观察亏≤-300暂停观察档", "observe");
    }
    if(
      D4 === 1 &&
      D5 >= 0 &&
      rank6 <= 3 &&
      A >= 6
    ){
      addCandidate(6, 3, "观察", "6号观察：轻承接", "观察小注", "observe");
    }
  }

  if(candidates.length === 0){
    const blackReasons = [];
    if(black3Reason) blackReasons.push("3号黑：" + black3Reason);
    if(black4Reason) blackReasons.push("4号黑：" + black4Reason);
    if(black5Reason) blackReasons.push("5号黑：" + black5Reason);
    if(black6Reason) blackReasons.push("6号黑：" + black6Reason);

    return {
      ok:false,
      model:"v2.1",
      seat:null,
      status:"跳",
      label:"v2.1跳",
      score:null,
      reason:blackReasons.length ? blackReasons.join("；") : "没有命中任何主推/观察结构",
      risk:"无主推/观察，直接跳",
      data:{...base,rank3,rank4,rank5,rank6}
    };
  }

  const mainCandidates = candidates.filter(c => c.mode === "main");
  const observeCandidates = candidates.filter(c => c.mode === "observe");

  const priority = {5:1,3:2,4:3,6:4};

  function sortCandidates(arr){
    arr.sort((a,b)=>{
      if(b.score !== a.score) return b.score - a.score;
      return priority[a.seat] - priority[b.seat];
    });
    return arr;
  }

  let best;
  let outputMode;

  if(mainCandidates.length){
    best = sortCandidates(mainCandidates)[0];
    outputMode = "主推";
  }else{
    best = sortCandidates(observeCandidates)[0];
    outputMode = "观察";
  }

  return {
    ok:true,
    model:"v2.1",
    seat:best.seat,
    status:outputMode === "主推" ? best.level : "观察",
    label:outputMode === "主推" ? best.level : "观察",
    mode:outputMode,
    score:best.score,
    reason:best.reason,
    risk:best.risk,
    candidates,
    data:{...base,rank3,rank4,rank5,rank6,K3,K4,K5,K6}
  };
}

/* ==================================================
   模型2：S1 邻位和值结构模型
================================================== */
function evaluateS1(room5){
  const base = getBaseData(room5);
  const {A,B,C,D,E,S1,S2,S3,S4} = base;
  const candidates = [];

  function addCandidate(seat, score, level, reason, risk){
    candidates.push({seat, score, level, reason, risk});
  }

  // 3号规则
  if(S2 >= 13 && S3 >= 11){
    addCandidate(3, 90, "S1主推", "3号：S2>=13 且 S3>=11，中轴和值强", "S1强过滤结构");
  }

  if(S1 >= 15 && S2 >= 12 && S4 >= 12){
    addCandidate(3, 88, "S1主推", "3号：S1>=15 且 S2>=12 且 S4>=12，首前高+尾承接", "S1强过滤结构");
  }

  // 4号规则
  if(S3 === 12 && (S4 === 5 || S4 === 6)){
    addCandidate(4, 70, "S1主推", "4号：S3=12 且 S4=5/6，后中轴精准组合", "S1精确组合");
  }

  if(S3 === 5 && S4 === 11){
    addCandidate(4, 70, "S1主推", "4号：S3=5 且 S4=11，后段反冲组合", "S1精确组合");
  }

  if(S3 === 4 && S4 === 10){
    addCandidate(4, 70, "S1主推", "4号：S3=4 且 S4=10，低中轴反冲组合", "S1精确组合");
  }

  if(S2 === 7 && S3 === 10 && S4 === 12){
    addCandidate(4, 72, "S1主推", "4号：S2=7 且 S3=10 且 S4=12，特殊和值反冲", "S1特殊结构");
  }

  // 5号规则
  if(S3 === 5 && S4 === 4){
    addCandidate(5, 80, "S1主推", "5号：S3=5 且 S4=4，尾位落点黄金组合", "5号窄进");
  }

  if(S3 === 9 && S4 === 10){
    addCandidate(5, 80, "S1主推", "5号：S3=9 且 S4=10，尾轴承接黄金组合", "5号窄进");
  }

  if(S3 === 6 && S4 === 9){
    addCandidate(5, 80, "S1主推", "5号：S3=6 且 S4=9，尾位爆发组合", "5号窄进");
  }

  // 6号规则
  if(S4 >= 13 && S3 >= 7){
    addCandidate(6, 85, "S1主推", "6号：S4>=13 且 S3>=7，尾轴和值强", "6号尾轴强结构");
  }

  if(S1 >= 15 && S3 === 9 && S4 === 9){
    addCandidate(6, 82, "S1主推", "6号：S1>=15 且 S3=9 且 S4=9，首端强+尾端平衡", "6号特殊强结构");
  }

  if(S1 <= 6 && S2 <= 3){
    addCandidate(6, 82, "S1主推", "6号：S1<=6 且 S2<=3，前段极低启动结构", "6号特殊低启结构");
  }

  if(candidates.length === 0){
    return {
      ok:false,
      model:"S1",
      seat:null,
      status:"跳",
      label:"S1跳",
      score:null,
      reason:"S1和值模型未命中黄金结构",
      risk:"S1强过滤，无命中直接跳",
      data:base
    };
  }

  const priority = {3:1,6:2,5:3,4:4};

  candidates.sort((a,b)=>{
    if(b.score !== a.score) return b.score - a.score;
    return priority[a.seat] - priority[b.seat];
  });

  const best = candidates[0];

  return {
    ok:true,
    model:"S1",
    seat:best.seat,
    status:best.level,
    label:"S1主推",
    mode:"S1主推",
    score:best.score,
    reason:best.reason,
    risk:best.risk,
    candidates,
    data:base
  };
}

function buildV21Card(result, room5){
  const div = document.createElement('div');

  if(!result.ok){
    div.className = 'hit r4';
  }else if(result.mode === "观察" || result.status === "观察"){
    div.className = 'hit r2';
  }else{
    div.className = 'hit r1';
  }

  const d = result.data;
  const seatText = result.ok ? `${result.seat}` : '跳';
  const label = result.ok ? `v2.1 ${result.label}` : 'v2.1跳';
  const wrText = result.ok ? `${result.score}分` : '—';
  const avgText = result.ok ? result.mode : '跳';

  div.innerHTML = `
    <div class="hit-lbl">${label}</div>
    <div class="hit-seat">${seatText}</div>
    <div class="hit-body">
      <div class="row1">模型1｜房号=${room5}　A${d.A} B${d.B} C${d.C} D${d.D} E${d.E}</div>
      <div class="row2">D1=${d.D1} D2=${d.D2} D3=${d.D3} D4=${d.D4} D5=${d.D5}</div>
      <div class="row3">${result.reason}｜${result.risk}</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">${wrText}</div>
      <div class="hit-avg">${avgText}</div>
    </div>
  `;
  return div;
}

function buildS1Card(result, room5){
  const div = document.createElement('div');

  div.className = result.ok ? 'hit r3' : 'hit r4';

  const d = result.data;
  const seatText = result.ok ? `${result.seat}` : '跳';
  const label = result.ok ? result.label : 'S1跳';
  const wrText = result.ok ? `${result.score}分` : '—';
  const avgText = result.ok ? 'S1' : '跳';

  div.innerHTML = `
    <div class="hit-lbl">${label}</div>
    <div class="hit-seat">${seatText}</div>
    <div class="hit-body">
      <div class="row1">模型2｜S1邻位和值｜房号=${room5}</div>
      <div class="row2">S1=${d.S1} S2=${d.S2} S3=${d.S3} S4=${d.S4}</div>
      <div class="row3">${result.reason}｜${result.risk}</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">${wrText}</div>
      <div class="hit-avg">${avgText}</div>
    </div>
  `;
  return div;
}

function render(room5){
  const v21 = evaluateV21(room5);
  const s1 = evaluateS1(room5);

  resultEl.style.display = 'none';
  skipEl.style.display   = 'none';
  hitListEl.innerHTML    = '';

  const anyHit = v21.ok || s1.ok;

  resultHdr.textContent = `然仔66660 双模型｜v2.1=${v21.ok ? v21.seat + '号' : '跳'}｜S1=${s1.ok ? s1.seat + '号' : '跳'}`;

  hitListEl.appendChild(buildV21Card(v21, room5));
  hitListEl.appendChild(buildS1Card(s1, room5));

  resultEl.style.display = 'block';

  if(!anyHit){
    skipEl.style.display = 'block';
  }

  return { v21, s1 };
}

function run(){
  const raw = roomEl.value.trim().replace(/\s+/g, '');
  if(!/^\d{5}$/.test(raw)){
    msgEl.textContent = '请输入正确的5位数字';
    return;
  }
  msgEl.textContent = '';
  const results = render(raw);
  pushHistory(raw, results);
  setTimeout(() => { roomEl.value = ''; roomEl.focus(); }, 180);
}

function loadHist(){
  try{
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  }catch{
    return [];
  }
}

function saveHist(items){
  localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, HISTORY_LIMIT)));
}

function renderHist(){
  const items = loadHist();
  histListEl.innerHTML = '';
  if(!items.length){
    histListEl.innerHTML = `<div class="histItem"><div class="histMain" style="color:rgba(255,255,255,.2)">暂无记录</div></div>`;
    return;
  }
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'histItem';

    const v21Res = item.v21 && item.v21.ok ? `${item.v21.seat}号${item.v21.mode === '观察' ? '观察' : '主推'}` : '跳';
    const s1Res = item.s1 && item.s1.ok ? `${item.s1.seat}号S1` : '跳';

    div.innerHTML = `
      <div class="histTop"><span>房号 <span class="pill">${item.room}</span></span><span>${item.time}</span></div>
      <div class="histMain">v2.1 → ${v21Res}｜S1 → ${s1Res}</div>`;
    histListEl.appendChild(div);
  });
}

function pushHistory(room, results){
  const items = loadHist();
  items.unshift({
    room,
    v21: {
      ok: results.v21.ok,
      seat: results.v21.seat,
      mode: results.v21.mode || '跳'
    },
    s1: {
      ok: results.s1.ok,
      seat: results.s1.seat,
      mode: results.s1.mode || '跳'
    },
    time: new Date().toLocaleString('zh-CN', {hour12:false})
  });
  saveHist(items);
  renderHist();
}

goEl.addEventListener('click', run);
roomEl.addEventListener('keydown', e => { if(e.key === 'Enter') run(); });
roomEl.addEventListener('input', e => {
  e.target.value = e.target.value.replace(/\D/g, '').slice(0,5);
});

clearBtnEl.addEventListener('click', () => {
  localStorage.removeItem(HISTORY_KEY);
  renderHist();
});

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

renderHist();
roomEl.focus();
</script>
