<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#b00000" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="八戒智能模型">
  <title>八戒别跑 - 精英模型 v4.0</title>
  <style>
    :root{
      --bg:#0b0b0f;--card:#11111a;--line:rgba(255,255,255,.10);
      --text:#f5f5f7;--muted:rgba(255,255,255,.55);--red:#ff2d2d;
      --gold:#f1c40f;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:
        radial-gradient(800px 400px at 50% 15%,rgba(255,45,45,.20),transparent 60%),
        radial-gradient(900px 500px at 50% 110%,rgba(176,0,0,.25),transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      padding:18px;
    }
    .app{width:min(520px,100%);}

    /* 标题 */
    .title{
      font-size:20px;font-weight:900;margin:0 0 14px;
      display:flex;align-items:center;gap:9px;letter-spacing:.3px;
    }
    .title::before{
      content:"";flex-shrink:0;width:9px;height:9px;border-radius:50%;
      background:var(--red);box-shadow:0 0 14px rgba(255,45,45,.9);
    }

    /* 面板 */
    .panel{
      background:linear-gradient(160deg,rgba(255,45,45,.07),transparent 55%),var(--card);
      border:1px solid var(--line);border-radius:20px;padding:18px;
      box-shadow:0 20px 70px rgba(0,0,0,.60);
    }

    /* 输入框 */
    input{
      width:100%;padding:15px 16px;font-size:22px;letter-spacing:3px;
      border-radius:14px;border:1px solid var(--line);
      background:rgba(0,0,0,.40);color:var(--text);outline:none;
      text-align:center;
    }
    input:focus{border-color:rgba(255,45,45,.65);box-shadow:0 0 0 3px rgba(255,45,45,.12);}

    /* 圆形按钮 */
    .btn-wrap{display:flex;justify-content:center;margin:18px 0 10px;}
    .btn-circle{
      width:80px;height:80px;border-radius:50%;
      border:2px solid rgba(255,45,45,.6);
      background:radial-gradient(circle at 40% 35%,rgba(255,80,80,.95),rgba(160,0,0,.95));
      color:#fff;font-size:18px;font-weight:900;
      cursor:pointer;letter-spacing:1px;
      box-shadow:0 0 24px rgba(255,45,45,.45), inset 0 1px 0 rgba(255,255,255,.15);
      transition:transform .12s,box-shadow .12s;
      display:flex;align-items:center;justify-content:center;
    }
    .btn-circle:active{transform:scale(.93);box-shadow:0 0 10px rgba(255,45,45,.3);}

    /* 消息 */
    .msg{text-align:center;font-size:13px;color:var(--muted);min-height:16px;margin-bottom:10px;}

    /* 结果卡 */
    .result{
      display:none;margin-top:4px;padding:16px;border-radius:16px;
      border:1px solid rgba(255,45,45,.30);
      background:linear-gradient(135deg,rgba(255,45,45,.08),rgba(0,0,0,.25));
    }
    .result-header{
      font-size:12px;color:var(--muted);font-weight:700;
      letter-spacing:.5px;margin-bottom:10px;text-align:center;
    }

    /* 命中项 */
    .hit-list{display:flex;flex-direction:column;gap:8px;}
    .hit{
      display:flex;align-items:center;gap:10px;
      padding:10px 12px;border-radius:12px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(0,0,0,.22);
    }
    .hit.rank1{border-color:rgba(255,45,45,.45);background:rgba(255,45,45,.10);}
    .hit.rank2{border-color:rgba(255,180,0,.25);}
    .hit.rank3{border-color:rgba(255,255,255,.10);}

    .hit-rank{
      font-size:11px;font-weight:900;padding:3px 7px;border-radius:999px;
      background:rgba(255,45,45,.25);color:var(--red);letter-spacing:.3px;
      flex-shrink:0;white-space:nowrap;
    }
    .hit.rank1 .hit-rank{background:rgba(255,45,45,.35);color:#ff6b6b;}

    .hit-seat{
      font-size:36px;font-weight:1000;color:var(--red);
      text-shadow:0 0 14px rgba(255,45,45,.4);line-height:1;
      flex-shrink:0;width:50px;text-align:center;
    }
    .hit-detail{font-size:12px;color:var(--muted);line-height:1.7;}
    .hit-profit{
      margin-left:auto;font-size:13px;font-weight:800;
      color:rgba(100,255,150,.85);flex-shrink:0;
    }

    /* 跳 */
    .skip{
      display:none;text-align:center;padding:18px;
      font-size:32px;font-weight:1000;color:rgba(255,255,255,.25);
      letter-spacing:2px;
    }

    /* 历史 */
    .history{
      margin-top:14px;padding:12px 14px;border-radius:14px;
      border:1px solid var(--line);background:rgba(255,255,255,.025);
    }
    .historyHeader{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:8px;
    }
    .historyTitle{font-weight:800;font-size:13px;color:var(--muted);}
    .smallBtn{
      padding:5px 10px;font-size:11px;font-weight:700;border-radius:8px;
      border:1px solid rgba(255,45,45,.4);
      background:rgba(255,45,45,.12);color:rgba(255,100,100,.9);
      cursor:pointer;
    }
    .smallBtn:active{opacity:.7;}
    .historyList{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow:auto;}
    .historyItem{
      border:1px solid rgba(255,255,255,.06);border-radius:10px;
      padding:8px 10px;background:rgba(0,0,0,.15);
    }
    .historyTop{
      display:flex;justify-content:space-between;
      font-size:11px;color:rgba(255,255,255,.4);margin-bottom:3px;
    }
    .historyMain{font-size:12px;color:rgba(255,255,255,.65);line-height:1.5;}
    .pill{
      display:inline-block;padding:1px 6px;border-radius:999px;
      border:1px solid rgba(255,45,45,.35);background:rgba(255,45,45,.10);
      font-weight:800;margin-right:4px;color:var(--red);
    }

    /* 文档 */
    .tiny{
      margin-top:14px;font-size:11px;color:rgba(255,255,255,.35);
      line-height:1.8;white-space:pre-line;border-top:1px solid var(--line);
      padding-top:12px;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="title">八戒别跑 — 精英模型 v4.0</div>
  <div class="panel">

    <input id="room" inputmode="numeric" placeholder="输入房号" maxlength="5" />

    <div class="btn-wrap">
      <button class="btn-circle" id="go">开干</button>
    </div>

    <div class="msg" id="msg"></div>

    <!-- 命中展示 -->
    <div class="result" id="result">
      <div class="result-header" id="result-header">— 命中组合 —</div>
      <div class="hit-list" id="hitList"></div>
    </div>

    <!-- 跳 -->
    <div class="skip" id="skip">跳</div>

    <!-- 历史 -->
    <div class="history">
      <div class="historyHeader">
        <div class="historyTitle">最近记录</div>
        <button class="smallBtn" id="clearHistory">清空</button>
      </div>
      <div class="historyList" id="historyList"></div>
    </div>

    <div class="tiny">
【八戒别跑 精英模型 v4.0】
54个纯净组合 | 64场历史全赢 | 平均+951¥/场

规则：座位 + X值 + S值 三重精准匹配
X值：座位1-4看对应位，座位5-6看末位
S值：房号五位数字之和

命中时按平均利润强度排序，🔥强（≥1000）⭐强（≥600）
    </div>

  </div>
</div>

<script>
  const roomEl       = document.getElementById("room");
  const goEl         = document.getElementById("go");
  const msgEl        = document.getElementById("msg");
  const resultEl     = document.getElementById("result");
  const resultHeader = document.getElementById("result-header");
  const hitListEl    = document.getElementById("hitList");
  const skipEl       = document.getElementById("skip");
  const historyListEl= document.getElementById("historyList");
  const clearHistEl  = document.getElementById("clearHistory");

  const HISTORY_KEY   = "bajie_v40_elite";
  const HISTORY_LIMIT = 30;

  // ═══════════════════════════════════════════════════════════
  //  54个精英纯净组合 [seat, x, s, avgProfit]  按avgProfit降序
  // ═══════════════════════════════════════════════════════════
  const ELITE = [
    [1,8,27,3060],
    [5,3,14,2690],
    [2,8,23,2310],
    [4,3,15,2030],
    [3,6,28,1510],
    [5,0,19,1440],
    [4,8,38,1380],
    [6,1,25,1350],
    [4,0,12,1220],
    [3,8,25,1140],
    [3,7,28,1010],
    [4,0,20,1010],
    [6,8,19,1007],
    [4,2,24, 990],
    [6,4,14, 990],
    [5,4,25, 990],
    [5,5,27, 980],
    [4,4,23, 970],
    [5,0,15, 960],
    [2,3,13, 940],
    [5,5,19, 940],
    [1,9,35, 910],
    [3,7,17, 900],
    [4,6,26, 860],
    [3,8,28, 830],
    [4,0,23, 830],
    [3,2, 5, 820],
    [5,6,28, 810],
    [3,5,19, 790],
    [2,7,24, 760],
    [4,8,29, 750],
    [5,8,30, 740],
    [5,1,22, 735],
    [2,2,18, 730],
    [5,3,18, 730],
    [1,8,17, 725],
    [2,4,22, 710],
    [6,9,25, 710],
    [3,8,34, 700],
    [5,1,20, 675],
    [5,2,29, 670],
    [5,0,16, 655],
    [4,2,17, 650],
    [2,4,31, 640],
    [5,9,22, 640],
    [6,1,10, 640],
    [1,8,16, 630],
    [1,9,37, 620],
    [5,9,33, 620],
    [3,7,25, 620],
    [1,8,18, 610],
    [6,0,13, 600],
    [6,6,36, 600],
    [6,9,35, 560],  // 保留但标注较弱
  ];

  function getS(r){ return r.split("").reduce((a,c)=>a+parseInt(c),0); }
  function getX(r, seat){
    const d = r.split("").map(Number);
    return (seat>=5) ? d[4] : d[seat-1];
  }

  function analyze(room5){
    const S    = getS(room5);
    const hits = [];

    for(const [seat,x,s,avg] of ELITE){
      if(getX(room5, seat)===x && S===s){
        hits.push({seat, x, s, avg});
      }
    }

    // 已经按avgProfit降序（ELITE数组本身有序），但防止乱序再排一次
    hits.sort((a,b)=>b.avg - a.avg);
    return { S, hits };
  }

  function render(room5){
    const {S, hits} = analyze(room5);

    resultEl.style.display = "none";
    skipEl.style.display   = "none";
    hitListEl.innerHTML    = "";

    if(hits.length === 0){
      skipEl.style.display = "block";
      return [];
    }

    const top = hits.slice(0,3);
    resultHeader.textContent = `S=${S}　命中 ${top.length} 个强组合`;
    resultEl.style.display = "block";

    top.forEach((h, idx)=>{
      const div = document.createElement("div");
      div.className = `hit rank${idx+1}`;

      const rankLabel = idx===0 ? "最强" : (idx===1 ? "次强" : "第三");
      const star      = h.avg>=1000 ? "🔥强" : "⭐强";

      div.innerHTML = `
        <div class="hit-rank">${star}${rankLabel}</div>
        <div class="hit-seat">${h.seat}</div>
        <div class="hit-detail">${h.seat}号位<br>X=${h.x}  S=${h.s}</div>
        <div class="hit-profit">+${h.avg}¥</div>
      `;
      hitListEl.appendChild(div);
    });

    return top.map(h=>h.seat);
  }

  function run(){
    const raw = roomEl.value.trim().replace(/\s+/g,"");
    if(!/^\d{5}$/.test(raw)){
      msgEl.textContent="请输入正确的5位数字";
      return;
    }
    msgEl.textContent="";
    const seats = render(raw);
    pushHistory(raw, seats);
    setTimeout(()=>{ roomEl.value=""; roomEl.focus(); }, 200);
  }

  // ── 历史记录 ─────────────────────────────────────
  function loadHistory(){
    try{ return JSON.parse(localStorage.getItem(HISTORY_KEY))||[]; }catch{ return []; }
  }
  function saveHistory(items){
    localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0,HISTORY_LIMIT)));
  }
  function renderHistory(){
    const items = loadHistory();
    historyListEl.innerHTML = "";
    if(!items.length){
      historyListEl.innerHTML=`<div class="historyItem"><div class="historyMain" style="color:rgba(255,255,255,.25)">暂无记录</div></div>`;
      return;
    }
    items.forEach(item=>{
      const div = document.createElement("div");
      div.className = "historyItem";
      const res = item.seats.length
        ? item.seats.map(s=>`强${s}号`).join(" → ")
        : "跳";
      div.innerHTML=`
        <div class="historyTop"><span>房号 <span class="pill">${item.room}</span></span><span>${item.time}</span></div>
        <div class="historyMain">${res}</div>`;
      historyListEl.appendChild(div);
    });
  }
  function pushHistory(room, seats){
    const items = loadHistory();
    items.unshift({
      room, seats,
      time: new Date().toLocaleString("zh-CN",{hour12:false})
    });
    saveHistory(items);
    renderHistory();
  }

  // ── 事件绑定 ─────────────────────────────────────
  goEl.addEventListener("click", run);
  roomEl.addEventListener("keydown", e=>{ if(e.key==="Enter") run(); });
  clearHistEl.addEventListener("click",()=>{
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
  });
  if("serviceWorker"in navigator)
    window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js"));

  renderHistory();
  roomEl.focus();
</script>
</body>
</html>
