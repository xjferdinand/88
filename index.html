<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>5130004｜v25 稳定过滤模型</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f6f2ec;
  color:#2b2118;
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.title{
  text-align:center;
  font-size:24px;
  font-weight:900;
  margin-bottom:10px;
}

.panel{
  background:#fff;
  padding:16px;
  border-radius:14px;
  margin-bottom:14px;
  border:1px solid #e5d6c8;
}

input{
  width:100%;
  font-size:22px;
  padding:10px;
  text-align:center;
  border-radius:10px;
  border:2px solid #e7d2c0;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  background:#d94b3d;
  color:white;
  font-weight:900;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.result{
  margin-top:12px;
}

.main{
  font-weight:900;
  color:#d94b3d;
  font-size:18px;
}

.sub{
  margin-top:5px;
  color:#6b5644;
}

.history{
  font-size:13px;
  line-height:1.6;
  border-top:1px dashed #e5d6c8;
  padding-top:10px;
}

.item{
  padding:6px 0;
  border-bottom:1px dashed #eee;
}
</style>

</head>

<body>

<div class="wrap">

<div class="title">5130004｜v25 稳定过滤模型</div>

<div class="panel">
  <input id="room" placeholder="输入5位房号" maxlength="5"/>
  <button onclick="run()">生成推荐</button>

  <div id="result" class="result"></div>
</div>

<div class="panel">
  <b>预测记录</b>
  <div id="history" class="history">暂无记录</div>
</div>

</div>

<script>

// ======================
// v25过滤规则（简化版核心）
// ======================
function filterRisk(d){

  const A=d[0],B=d[1],C=d[2],D=d[3],E=d[4];

  // 中轴极值
  if(C===Math.max(...d) || C===Math.min(...d)) return true;

  // 镜像假稳
  if(Math.abs(B-D)<=1 && Math.abs(A-E)<=1 && Math.abs(C-D)>3) return true;

  // 尾部反转
  if(E===Math.max(...d) && C<D) return true;

  // 左右失衡过度
  const left=A+B,right=D+E;
  if(Math.abs(left-right)>=7) return true;

  return false;
}

// ======================
// 位子评分（v25简化版）
// ======================
function scoreSeat(d, idx){

  const x=d[idx];
  let score=0;

  for(let i=0;i<5;i++){
    if(i===idx) continue;
    score+=Math.abs(x-d[i]);
    if(x+d[i]<=9) score+=1;
  }

  if(new Set(d).size<5) score+=2;

  return score;
}

// ======================
// 主逻辑
// ======================
function run(){

  const r=document.getElementById("room").value.trim();
  if(r.length!==5){
    alert("请输入5位房号");
    return;
  }

  const d=r.split("").map(Number);

  // ❌ 过滤
  if(filterRisk(d)){
    show("不推荐","结构风险过高");
    save(r,"不推荐");
    return;
  }

  // 计算6位（1~6，6=E）
  const seats=[0,1,2,3,4];

  const scored=seats.map(i=>({
    seat:i+1,
    score:scoreSeat(d,i)
  }));

  scored.sort((a,b)=>b.score-a.score);

  const top1=scored[0];
  const top2=scored[1];
  const top3=scored[2];

  const html=`
    <div class="main">主推：${top1.seat}号</div>
    <div class="sub">副推：${top2.seat}号 / ${top3.seat}号</div>
  `;

  show(html,"命中推荐");
  save(r,`${top1.seat}/${top2.seat}/${top3.seat}`);
}

// ======================
// UI
// ======================
function show(main,status){
  document.getElementById("result").innerHTML=`
    <div><b>${status}</b></div>
    <div>${main}</div>
  `;
  renderHistory();
}

// ======================
// 记录
// ======================
function save(room,res){
  let data=JSON.parse(localStorage.getItem("v25_log")||"[]");
  data.unshift({room,res,time:new Date().toLocaleString()});
  localStorage.setItem("v25_log",JSON.stringify(data.slice(0,20)));
  renderHistory();
}

// ======================
// 历史
// ======================
function renderHistory(){
  let data=JSON.parse(localStorage.getItem("v25_log")||"[]");
  document.getElementById("history").innerHTML=
    data.map(x=>`
      <div class="item">
        ${x.room} → ${x.res}<br>
        <span style="color:#999">${x.time}</span>
      </div>
    `).join("");
}

renderHistory();

</script>

</body>
</html>
