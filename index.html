<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>八戒别跑 — 精英模型 v7.0（去A版）</title>
  <style>
    body{background:#0b0b0f;color:#fff;font-family:sans-serif;display:flex;justify-content:center;padding:20px}
    .app{width:400px}
    input{width:100%;padding:12px;font-size:24px;text-align:center;margin-bottom:10px}
    button{width:100%;padding:12px;font-size:18px;background:#ff2d2d;color:#fff;border:none}
    .result{margin-top:15px}
    .hit{padding:10px;border:1px solid #333;margin-bottom:6px}
  </style>
</head>
<body>
<div class="app">
  <input id="room" placeholder="输入5位房号"/>
  <button onclick="run()">开干</button>
  <div class="result" id="result"></div>
</div>

<script>
// ===== 三元组规则（已去掉A）=====
const RULES = {
  1:{3:{18:1},8:{8:1,9:1,10:1,15:1,19:1},9:{7:1,14:1,26:1,28:1}},
  2:{2:{16:1,17:1},3:{10:1},4:{18:1,27:1},6:{12:1},7:{17:1},8:{15:1,20:1,24:1}},
  3:{2:{3:1,23:1},5:{14:1},6:{11:1,22:1},7:{10:1,18:1,19:1,21:1},8:{17:1,20:1,26:1}},
  4:{0:{12:1,17:1,20:1,23:1},2:{15:1,22:1},3:{12:1},4:{12:1,19:1},5:{17:1},6:{14:1,20:1,24:1},7:{15:1},8:{21:1,30:1}},
  5:{0:{15:1,16:1,19:1,22:1},1:{19:1,32:1,34:1},2:{13:1,27:1},3:{11:1,15:1,17:1,18:1},4:{21:1},5:{14:1,21:1,22:1},6:{22:1},7:{18:1},8:{22:1},9:{13:1,17:1,22:1,24:1}},
  6:{0:{13:1},1:{9:1,17:1,24:1},2:{23:1},4:{10:1},5:{21:1},6:{30:1},8:{11:1,22:1,31:1},9:{16:1,26:1}}
};

const PRIORITY = {5:1,4:2,6:3,2:4,3:5,1:6};

function getS(room){
  return room.split('').reduce((a,c)=>a+parseInt(c),0);
}
function getX(d, seat){
  return seat>=5 ? d[4] : d[seat-1];
}

function analyze(room){
  const d = room.split('').map(Number);
  const S = getS(room);
  const hits = [];

  for(let seat=1;seat<=6;seat++){
    const X = getX(d,seat);
    const K = S - X;

    if(!RULES[seat]) continue;
    if(!RULES[seat][X]) continue;
    if(!RULES[seat][X][K]) continue;

    hits.push({seat,X,K});
  }

  hits.sort((a,b)=>(PRIORITY[a.seat]||9)-(PRIORITY[b.seat]||9));
  return hits;
}

function run(){
  const room = document.getElementById('room').value;
  const result = document.getElementById('result');

  if(!/^\d{5}$/.test(room)){
    result.innerHTML = "请输入5位数字";
    return;
  }

  const hits = analyze(room);

  if(!hits.length){
    result.innerHTML = "<h2>跳</h2>";
    return;
  }

  result.innerHTML = hits.map(h =>
    `<div class="hit">${h.seat}号位 ｜ X=${h.X} ｜ K=${h.K}</div>`
  ).join('');
}
</script>
</body>
</html>
