<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#b00000"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="然仔66660 W1">
  <title>然仔66660 W1</title>
  <style>
    :root{
      --bg:#0b0b0f;
      --card:#11111a;
      --line:rgba(255,255,255,.10);
      --text:#f5f5f7;
      --muted:rgba(255,255,255,.50);
      --red:#ff2d2d;
    }
    *{box-sizing:border-box;margin:0;padding:0;}

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(800px 400px at 50% 15%,rgba(255,45,45,.20),transparent 60%),
        radial-gradient(900px 500px at 50% 110%,rgba(176,0,0,.25),transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
      padding:12px;
    }

    .app{width:min(430px,100%);}

    .title{
      font-size:16px;
      font-weight:900;
      margin:0 0 12px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .title::before{
      content:"";
      flex-shrink:0;
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--red);
      box-shadow:0 0 12px rgba(255,45,45,.9);
    }
    .version{
      font-size:10px;
      color:rgba(255,45,45,.6);
      margin-left:4px;
      font-weight:400;
    }

    .panel{
      background:linear-gradient(160deg,rgba(255,45,45,.07),transparent 55%),var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      box-shadow:0 20px 60px rgba(0,0,0,.55);
    }

    input{
      width:100%;
      padding:12px 14px;
      font-size:22px;
      letter-spacing:5px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.40);
      color:var(--text);
      outline:none;
      text-align:center;
      font-weight:700;
    }
    input:focus{
      border-color:rgba(255,45,45,.65);
      box-shadow:0 0 0 3px rgba(255,45,45,.12);
    }
    input::placeholder{
      font-size:13px;
      letter-spacing:1px;
      font-weight:400;
    }

    .btn-wrap{
      display:flex;
      justify-content:center;
      margin:14px 0 8px;
    }
    .btn-circle{
      width:66px;
      height:66px;
      border-radius:50%;
      border:2px solid rgba(255,45,45,.55);
      background:radial-gradient(circle at 38% 32%,rgba(255,90,90,.95),rgba(155,0,0,.95));
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:1px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 18px rgba(255,45,45,.40),inset 0 1px 0 rgba(255,255,255,.18);
      transition:transform .1s,box-shadow .1s;
    }
    .btn-circle:active{transform:scale(.92);}

    .msg{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      min-height:14px;
      margin-bottom:8px;
    }

    .result{
      display:none;
      margin-top:4px;
    }
    .result-hdr{
      text-align:center;
      font-size:10px;
      color:var(--muted);
      margin-bottom:8px;
      letter-spacing:.3px;
    }
    .hit-list{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .hit{
      display:grid;
      grid-template-columns:auto 52px 1fr auto;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(0,0,0,.22);
    }
    .hit.r1{border-color:rgba(255,45,45,.50);background:rgba(255,45,45,.10);}
    .hit.r2{border-color:rgba(255,140,0,.38);background:rgba(255,140,0,.08);}
    .hit.r3{border-color:rgba(80,255,140,.40);background:rgba(80,255,140,.08);}
    .hit.r4{border-color:rgba(120,180,255,.40);background:rgba(80,120,255,.08);}
    .hit.r5{border-color:rgba(255,255,255,.10);background:rgba(255,255,255,.03);}

    .hit-lbl{
      font-size:9px;
      font-weight:900;
      padding:2px 6px;
      border-radius:999px;
      background:rgba(255,45,45,.20);
      color:#ff8080;
      white-space:nowrap;
      letter-spacing:.2px;
    }
    .hit.r1 .hit-lbl{
      background:rgba(255,45,45,.38);
      color:#ff9090;
    }
    .hit.r2 .hit-lbl{
      background:rgba(255,140,0,.26);
      color:#ffbd6b;
    }
    .hit.r3 .hit-lbl{
      background:rgba(80,255,140,.20);
      color:rgba(120,255,170,.95);
    }
    .hit.r4 .hit-lbl{
      background:rgba(120,180,255,.20);
      color:rgba(160,200,255,.95);
    }

    .hit-seat{
      font-size:21px;
      font-weight:1000;
      color:var(--red);
      text-shadow:0 0 12px rgba(255,45,45,.35);
      line-height:1.05;
      text-align:center;
      white-space:nowrap;
    }
    .hit.r2 .hit-seat{
      color:#ff9f1c;
      text-shadow:0 0 12px rgba(255,159,28,.25);
    }
    .hit.r3 .hit-seat{
      color:rgba(80,255,140,.95);
      text-shadow:0 0 12px rgba(80,255,140,.25);
    }
    .hit.r4 .hit-seat{
      color:rgba(160,200,255,.95);
      text-shadow:0 0 12px rgba(120,180,255,.25);
    }

    .hit-body{
      line-height:1.4;
      min-width:0;
    }
    .hit-body .row1{
      font-size:11px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hit-body .row2{
      font-size:10px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hit-body .row3{
      font-size:9px;
      color:rgba(255,255,255,.30);
      margin-top:1px;
      line-height:1.25;
    }

    .hit-right{
      text-align:right;
      min-width:42px;
    }
    .hit-wr{
      font-size:11px;
      font-weight:900;
      color:rgba(80,255,140,.85);
    }
    .hit-avg{
      font-size:9px;
      color:rgba(255,255,255,.35);
      margin-top:1px;
    }

    .skip{
      display:none;
      text-align:center;
      padding:18px;
      font-size:30px;
      font-weight:1000;
      color:rgba(255,255,255,.18);
      letter-spacing:4px;
    }

    .history{
      margin-top:12px;
      padding:10px 11px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
    }
    .histHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:7px;
    }
    .histTitle{
      font-size:11px;
      font-weight:800;
      color:var(--muted);
    }
    .clearBtn{
      font-size:10px;
      padding:4px 8px;
      border-radius:7px;
      cursor:pointer;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      color:rgba(255,100,100,.85);
    }
    .histList{
      display:flex;
      flex-direction:column;
      gap:5px;
      max-height:180px;
      overflow:auto;
    }
    .histItem{
      border:1px solid rgba(255,255,255,.05);
      border-radius:9px;
      padding:7px 9px;
      background:rgba(0,0,0,.14);
    }
    .histTop{
      display:flex;
      justify-content:space-between;
      font-size:10px;
      color:rgba(255,255,255,.35);
      margin-bottom:2px;
    }
    .histMain{
      font-size:11px;
      color:rgba(255,255,255,.60);
      line-height:1.35;
    }
    .pill{
      display:inline-block;
      padding:1px 6px;
      border-radius:999px;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      font-weight:800;
      color:var(--red);
      margin-right:3px;
    }

    .tiny{
      margin-top:12px;
      padding-top:10px;
      border-top:1px solid var(--line);
      font-size:10px;
      color:rgba(255,255,255,.28);
      line-height:1.6;
      white-space:pre-line;
    }

    @media (max-width: 430px){
      body{padding:10px;}
      .app{width:100%;}
      .panel{padding:10px;border-radius:15px;}
      .hit{
        grid-template-columns:auto 46px 1fr auto;
        gap:6px;
        padding:7px 8px;
      }
      .hit-seat{font-size:19px;}
      .result-hdr{font-size:10px;}
      .histMain{font-size:10px;}
      .tiny{font-size:9px;}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="title">然仔66660<span class="version">大赢触发库 W1</span></div>
  <div class="panel">

    <input id="room" inputmode="numeric" placeholder="输入5位房号" maxlength="5"/>

    <div class="btn-wrap">
      <button class="btn-circle" id="go">开干</button>
    </div>

    <div class="msg" id="msg"></div>

    <div class="result" id="result">
      <div class="result-hdr" id="resultHdr">— 然仔66660 W1结果 —</div>
      <div class="hit-list" id="hitList"></div>
    </div>
    <div class="skip" id="skip">跳</div>

    <div class="history">
      <div class="histHead">
        <span class="histTitle">最近记录</span>
        <button class="clearBtn" id="clearBtn">清空</button>
      </div>
      <div class="histList" id="histList"></div>
    </div>

    <div class="tiny">
【然仔66660｜大赢触发库 W1 研究版】
逻辑：命中座位专属“大赢DNA”才进，否则跳。
回测：94局｜输出48局｜命中28局｜净分+22860
≥500大赢命中20/20｜≤-400大输命中0｜最大命中亏-340

实战纪律：
W1是研究版主模型候选，不是重注模型。
只打W1主推；无主推跳。
主推亏≤-300暂停复盘；亏≤-400模型降级重做。
    </div>

  </div>
</div>

<script>
const HISTORY_KEY = 'ranzai_66660_w1_bigwin';
const HISTORY_LIMIT = 30;

const roomEl     = document.getElementById('room');
const goEl       = document.getElementById('go');
const msgEl      = document.getElementById('msg');
const resultEl   = document.getElementById('result');
const resultHdr  = document.getElementById('resultHdr');
const hitListEl  = document.getElementById('hitList');
const skipEl     = document.getElementById('skip');
const histListEl = document.getElementById('histList');
const clearBtnEl = document.getElementById('clearBtn');

function getDigits(room){
  return room.split('').map(Number);
}

function rankDesc(x, digits){
  return digits.filter(n => n > x).length + 1;
}

function uniqueMax(value, arr){
  const max = Math.max(...arr);
  return value === max && arr.filter(n => n === max).length === 1;
}

function isMaxOrNearMax(value, arr, gap=1){
  return value >= Math.max(...arr) - gap;
}

function getBaseData(room5){
  const [A,B,C,D,E] = getDigits(room5);
  const digits = [A,B,C,D,E];

  const S1 = A+B;
  const S2 = B+C;
  const S3 = C+D;
  const S4 = D+E;
  const S5 = E+A;

  const P1 = A+B+C;
  const P2 = B+C+D;
  const P3 = C+D+E;
  const P4 = D+E+A;
  const P5 = E+A+B;

  const PArr = [P1,P2,P3,P4,P5];
  const SArr = [S1,S2,S3,S4];

  const MidPower = S2 + S3;
  const TailPower = S3 + S4;

  const rankA = rankDesc(A,digits);
  const rankB = rankDesc(B,digits);
  const rankC = rankDesc(C,digits);
  const rankD = rankDesc(D,digits);
  const rankE = rankDesc(E,digits);

  const RoomSum = A+B+C+D+E;

  return {
    A,B,C,D,E,digits,
    S1,S2,S3,S4,S5,SArr,
    P1,P2,P3,P4,P5,PArr,
    MidPower,TailPower,RoomSum,
    rankA,rankB,rankC,rankD,rankE
  };
}

function evaluateW1(room5){
  const d = getBaseData(room5);
  const {
    A,B,C,D,E,
    S1,S2,S3,S4,S5,SArr,
    P1,P2,P3,P4,P5,PArr,
    MidPower,RoomSum,
    rankB,rankC,rankD,rankE
  } = d;

  const triggers = [];

  function addTrigger(seat, priority, name, reason, risk, score){
    triggers.push({seat, priority, name, reason, risk, score});
  }

  // =====================
  // 2号｜前中轴爆发
  // =====================
  if(
    uniqueMax(S2, SArr) &&
    rankB <= 2 &&
    B >= 5 &&
    C >= B &&
    S4 <= 4 &&
    A === E &&
    A <= 2
  ){
    addTrigger(
      2,
      1,
      '2号前中轴爆发',
      'S2唯一最大，B排名前2，B/C承接，A=E低位闭环，尾段S4低不抢位',
      '2号极窄爆点，样本少，正常小注，不重注',
      98
    );
  }

  // =====================
  // 6号｜低位反爆
  // =====================
  if(
    RoomSum <= 10 &&
    E === Math.max(...d.digits) &&
    E > D &&
    A <= 5 &&
    E !== 0
  ){
    addTrigger(
      6,
      2,
      '6号低位反爆',
      'RoomSum低，E为全房最大，E>D，A端不压死尾端',
      '低位反爆结构，正常小注',
      95
    );
  }

  // =====================
  // 6号｜低位闭环
  // =====================
  if(
    RoomSum <= 10 &&
    E > 0 &&
    S1 <= 6 &&
    S2 <= 3 &&
    D <= 1
  ){
    addTrigger(
      6,
      3,
      '6号低位闭环',
      '低位房，E>0，S1/S2低启，D低不压E',
      '低位闭环结构，已过滤E=0风险',
      93
    );
  }

  // =====================
  // 3号｜中轴强爆
  // =====================
  if(
    MidPower >= 24 &&
    S3 >= 11 &&
    S4 <= S3 + 2 &&
    !(B > C && D > C)
  ){
    addTrigger(
      3,
      4,
      '3号中轴强爆',
      'MidPower>=24，S3>=11，S4不明显压制中轴，C不被B/D双压',
      '3号中轴强爆，正常小注',
      90
    );
  }

  // =====================
  // 6号｜首尾闭环承接
  // =====================
  if(
    S1 >= 15 &&
    S3 === 9 &&
    S4 === 9 &&
    E !== 0
  ){
    addTrigger(
      6,
      5,
      '6号首尾闭环承接',
      'S1强，S3/S4平衡，E能承接A端',
      '单样本结构，正常小注，不重注',
      88
    );
  }

  // =====================
  // 4号｜后中轴承接
  // =====================
  if(
    S3 >= 10 &&
    rankD !== 1 &&
    (C - D) >= 2 &&
    (C - D) <= 6 &&
    (E - D) >= -2
  ){
    addTrigger(
      4,
      6,
      '4号后中轴承接',
      'S3>=10，D非rank1孤高，C-D承接，E端不过度压低',
      '4号后中轴承接，正常小注',
      84
    );
  }

  // =====================
  // 4号｜反冲承接
  // =====================
  if(
    (P5 === Math.max(...PArr) || P3 === Math.max(...PArr)) &&
    rankD === 4 &&
    (C - D) >= -3 &&
    (C - D) <= 2 &&
    (E - D) >= 2 &&
    (E - D) <= 4
  ){
    addTrigger(
      4,
      7,
      '4号反冲承接',
      'P5或P3为最大窗口，D排名4，C/E形成反冲托举',
      '4号反冲结构，允许小波，正常小注',
      82
    );
  }

  // =====================
  // 5号｜尾部落点
  // =====================
  if(
    (
      E === 4 &&
      D <= 1 &&
      (P1 === Math.max(...PArr) || P5 === Math.max(...PArr))
    ) ||
    (
      E === 8 &&
      rankE === 1 &&
      Math.abs(S4 - S3) <= 2 &&
      D <= C
    ) ||
    (
      E === 4 &&
      P5 === Math.max(...PArr) &&
      D <= E + 1
    )
  ){
    addTrigger(
      5,
      8,
      '5号尾部落点',
      '5号极窄尾部落点结构，E/D/S3/S4/P窗口匹配',
      '5号高波位，只按极窄触发，小注',
      80
    );
  }

  // =====================
  // 6号｜强尾稳定
  // =====================
  if(
    rankE <= 2 &&
    E !== 0 &&
    S4 >= 13 &&
    S3 >= 7 &&
    !(A > E && S4 < 13)
  ){
    addTrigger(
      6,
      9,
      '6号强尾稳定',
      'E排名前2，S4>=13，S3>=7，尾段强且E不为0',
      '6号强尾稳定，正常小注',
      78
    );
  }

  // =====================
  // 6号｜尾段唯一爆
  // =====================
  if(
    uniqueMax(S4, SArr) &&
    rankE <= 2 &&
    S4 >= 10 &&
    E !== 0
  ){
    addTrigger(
      6,
      10,
      '6号尾段唯一爆',
      'S4唯一最大，E排名前2，S4>=10，E不为0',
      '6号尾段补位结构，正常小注',
      76
    );
  }

  // =====================
  // 3号｜首尾环托
  // =====================
  if(
    A >= 7 &&
    E >= 7 &&
    isMaxOrNearMax(P5, PArr, 1) &&
    C >= 4 &&
    !(B > C && D > C)
  ){
    addTrigger(
      3,
      11,
      '3号首尾环托',
      'A/E首尾强托，P5接近最大，C不被B/D双压',
      '3号首尾环托结构，正常小注',
      74
    );
  }

  if(!triggers.length){
    return {
      ok:false,
      seat:null,
      label:'W1跳',
      triggerName:'无触发',
      reason:'未命中任何座位专属大赢DNA',
      risk:'无W1主推，直接跳',
      score:null,
      data:d,
      triggers:[]
    };
  }

  triggers.sort((a,b)=>{
    if(a.priority !== b.priority) return a.priority - b.priority;
    return b.score - a.score;
  });

  const best = triggers[0];

  return {
    ok:true,
    seat:best.seat,
    label:'W1主推',
    triggerName:best.name,
    reason:best.reason,
    risk:best.risk,
    score:best.score,
    data:d,
    triggers
  };
}

function buildModelCard(result, room5){
  const div = document.createElement('div');

  if(!result.ok){
    div.className = 'hit r5';
  }else if(result.seat === 6){
    div.className = 'hit r1';
  }else if(result.seat === 5){
    div.className = 'hit r2';
  }else if(result.seat === 4){
    div.className = 'hit r4';
  }else{
    div.className = 'hit r3';
  }

  const d = result.data;
  const seatText = result.ok ? `${result.seat}` : '跳';
  const wrText = result.ok ? `${result.score}分` : '—';
  const avgText = result.ok ? '主推' : '跳';

  div.innerHTML = `
    <div class="hit-lbl">${result.label}</div>
    <div class="hit-seat">${seatText}</div>
    <div class="hit-body">
      <div class="row1">房号=${room5}　A${d.A} B${d.B} C${d.C} D${d.D} E${d.E}</div>
      <div class="row2">S=${d.S1}/${d.S2}/${d.S3}/${d.S4}/${d.S5}｜P=${d.P1}/${d.P2}/${d.P3}/${d.P4}/${d.P5}</div>
      <div class="row3">${result.triggerName}｜${result.reason}｜${result.risk}</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">${wrText}</div>
      <div class="hit-avg">${avgText}</div>
    </div>
  `;
  return div;
}

function buildTriggerListCard(result){
  const div = document.createElement('div');
  div.className = 'hit r5';

  const list = result.triggers && result.triggers.length
    ? result.triggers.map(t => `${t.seat}号-${t.name}`).join('；')
    : '无';

  div.innerHTML = `
    <div class="hit-lbl">触发</div>
    <div class="hit-seat">${result.triggers ? result.triggers.length : 0}</div>
    <div class="hit-body">
      <div class="row1">全部命中触发</div>
      <div class="row2">${list}</div>
      <div class="row3">多触发时按W1优先级只取一个主推。</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">W1</div>
      <div class="hit-avg">DNA</div>
    </div>
  `;
  return div;
}

function render(room5){
  const res = evaluateW1(room5);

  resultEl.style.display = 'none';
  skipEl.style.display   = 'none';
  hitListEl.innerHTML    = '';

  if(!res.ok){
    resultHdr.textContent = `然仔66660 W1　无大赢触发`;
    hitListEl.appendChild(buildModelCard(res, room5));
    resultEl.style.display = 'block';
    skipEl.style.display = 'block';
    return res;
  }

  resultHdr.textContent = `然仔66660 W1　主推 ${res.seat}号｜${res.triggerName}`;
  hitListEl.appendChild(buildModelCard(res, room5));
  hitListEl.appendChild(buildTriggerListCard(res));
  resultEl.style.display = 'block';

  return res;
}

function run(){
  const raw = roomEl.value.trim().replace(/\s+/g, '');
  if(!/^\d{5}$/.test(raw)){
    msgEl.textContent = '请输入正确的5位数字';
    return;
  }
  msgEl.textContent = '';
  const res = render(raw);
  pushHistory(raw, res);
  setTimeout(() => { roomEl.value = ''; roomEl.focus(); }, 180);
}

function loadHist(){
  try{
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  }catch{
    return [];
  }
}

function saveHist(items){
  localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, HISTORY_LIMIT)));
}

function renderHist(){
  const items = loadHist();
  histListEl.innerHTML = '';

  if(!items.length){
    histListEl.innerHTML = `<div class="histItem"><div class="histMain" style="color:rgba(255,255,255,.2)">暂无记录</div></div>`;
    return;
  }

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'histItem';

    const resText = item.ok ? `${item.seat}号｜${item.triggerName}` : '跳';

    div.innerHTML = `
      <div class="histTop"><span>房号 <span class="pill">${item.room}</span></span><span>${item.time}</span></div>
      <div class="histMain">W1 → ${resText}</div>
    `;
    histListEl.appendChild(div);
  });
}

function pushHistory(room, res){
  const items = loadHist();
  items.unshift({
    room,
    ok: res.ok,
    seat: res.seat,
    triggerName: res.triggerName,
    time: new Date().toLocaleString('zh-CN', {hour12:false})
  });
  saveHist(items);
  renderHist();
}

goEl.addEventListener('click', run);
roomEl.addEventListener('keydown', e => { if(e.key === 'Enter') run(); });
roomEl.addEventListener('input', e => {
  e.target.value = e.target.value.replace(/\D/g, '').slice(0,5);
});

clearBtnEl.addEventListener('click', () => {
  localStorage.removeItem(HISTORY_KEY);
  renderHist();
});

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

renderHist();
roomEl.focus();
</script>
</body>
</html>
